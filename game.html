<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tu Tiên Idle Game - Chuẩn Responsive PC & Mobile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <style>
    * { touch-action: manipulation; } /* Tối ưu cảm ứng trên mobile */
    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: #0b1120;
      color: #f8fafc;
      background-image: radial-gradient(circle at 50% 0%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 50% 100%, rgba(255, 215, 0, 0.05) 0%, transparent 50%);
      background-attachment: fixed;
    }
    .font-serif { font-family: 'Cinzel', serif; }
    @keyframes floatUp {
      0% { transform: translateY(110vh) scale(0); opacity: 0; }
      20% { opacity: 1; }
      80% { opacity: 0.8; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }
    .animate-float-up { animation: floatUp linear infinite; }
    @keyframes floatFade {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-60px) scale(1.4); opacity: 0; }
    }
    .animate-float-fade { animation: floatFade 0.8s ease-out forwards; }
    @keyframes flashWhite { 0% { opacity: 1; } 100% { opacity: 0; } }
    .animate-flash { animation: flashWhite 0.8s ease-out forwards; }
    @keyframes breakthroughPulse {
      0%, 100% { box-shadow: 0 0 15px #00ffff; border-color: #00ffff; color: #00ffff; }
      33% { box-shadow: 0 0 25px #e94560; border-color: #e94560; color: #e94560; }
      66% { box-shadow: 0 0 20px #ffd700; border-color: #ffd700; color: #ffd700; }
    }
    .breakthrough-pulse { animation: breakthroughPulse 1.5s infinite; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="select-none">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const REALMS = [
      { name: "Phàm Nhân", maxQi: 100 },
      { name: "Luyện Khí Sơ Kỳ", maxQi: 300 }, { name: "Luyện Khí Trung Kỳ", maxQi: 600 }, { name: "Luyện Khí Hậu Kỳ", maxQi: 1000 }, { name: "Luyện Khí Viên Mãn", maxQi: 1500 },
      { name: "Trúc Cơ Sơ Kỳ", maxQi: 3000 }, { name: "Trúc Cơ Trung Kỳ", maxQi: 5000 }, { name: "Trúc Cơ Hậu Kỳ", maxQi: 8000 }, { name: "Trúc Cơ Viên Mãn", maxQi: 12000 },
      { name: "Kim Đan Sơ Kỳ", maxQi: 25000 }, { name: "Kim Đan Trung Kỳ", maxQi: 40000 }, { name: "Kim Đan Hậu Kỳ", maxQi: 60000 }, { name: "Kim Đan Viên Mãn", maxQi: 90000 },
      { name: "Nguyên Anh Sơ Kỳ", maxQi: 150000 }, { name: "Nguyên Anh Trung Kỳ", maxQi: 250000 }, { name: "Nguyên Anh Hậu Kỳ", maxQi: 400000 }, { name: "Nguyên Anh Viên Mãn", maxQi: 600000 },
      { name: "Hóa Thần Sơ Kỳ", maxQi: 1000000 }, { name: "Hóa Thần Trung Kỳ", maxQi: 1600000 }, { name: "Hóa Thần Hậu Kỳ", maxQi: 2500000 }, { name: "Hóa Thần Viên Mãn", maxQi: 4000000 },
      { name: "Luyện Hư Sơ Kỳ", maxQi: 7000000 }, { name: "Luyện Hư Trung Kỳ", maxQi: 11000000 }, { name: "Luyện Hư Hậu Kỳ", maxQi: 16000000 }, { name: "Luyện Hư Viên Mãn", maxQi: 25000000 },
      { name: "Hợp Thể Sơ Kỳ", maxQi: 40000000 }, { name: "Hợp Thể Trung Kỳ", maxQi: 65000000 }, { name: "Hợp Thể Hậu Kỳ", maxQi: 100000000 }, { name: "Hợp Thể Viên Mãn", maxQi: 150000000 },
      { name: "Đại Thừa Sơ Kỳ", maxQi: 250000000 }, { name: "Đại Thừa Trung Kỳ", maxQi: 400000000 }, { name: "Đại Thừa Hậu Kỳ", maxQi: 600000000 }, { name: "Đại Thừa Viên Mãn", maxQi: 900000000 },
      { name: "Độ Kiếp Sơ Kỳ", maxQi: 1500000000 }, { name: "Độ Kiếp Trung Kỳ", maxQi: 2500000000 }, { name: "Độ Kiếp Hậu Kỳ", maxQi: 4000000000 }, { name: "Độ Kiếp Viên Mãn", maxQi: 6000000000 },
      { name: "Chân Tiên Sơ Kỳ", maxQi: 10000000000 }, { name: "Chân Tiên Trung Kỳ", maxQi: 16000000000 }, { name: "Chân Tiên Hậu Kỳ", maxQi: 25000000000 }, { name: "Chân Tiên Viên Mãn", maxQi: 40000000000 },
      { name: "Kim Tiên Sơ Kỳ", maxQi: 70000000000 }, { name: "Kim Tiên Trung Kỳ", maxQi: 110000000000 }, { name: "Kim Tiên Hậu Kỳ", maxQi: 160000000000 }, { name: "Kim Tiên Viên Mãn", maxQi: 250000000000 },
      { name: "Thái Ất Sơ Kỳ", maxQi: 400000000000 }, { name: "Thái Ất Trung Kỳ", maxQi: 650000000000 }, { name: "Thái Ất Hậu Kỳ", maxQi: 1000000000000 }, { name: "Thái Ất Viên Mãn", maxQi: 1500000000000 },
      { name: "Chuẩn Thánh Sơ Kỳ", maxQi: 2500000000000 }, { name: "Chuẩn Thánh Trung Kỳ", maxQi: 4000000000000 }, { name: "Chuẩn Thánh Hậu Kỳ", maxQi: 6500000000000 }, { name: "Chuẩn Thánh Viên Mãn", maxQi: 10000000000000 },
      { name: "Thánh Nhân Sơ Kỳ", maxQi: 20000000000000 }, { name: "Thánh Nhân Trung Kỳ", maxQi: 35000000000000 }, { name: "Thánh Nhân Hậu Kỳ", maxQi: 50000000000000 }, { name: "Thánh Nhân Viên Mãn", maxQi: 80000000000000 },
      { name: "Đạo Tổ", maxQi: Infinity }
    ];

    const SHOP_ITEMS = [
      { id: "tu-linh-dan", name: "Tụ Linh Đan", desc: "Tự động gom linh khí cơ bản", baseCost: 50, qpsBonus: 1 },
      { id: "linh-thach", name: "Linh Thạch", desc: "Chứa đựng linh lực thuần khiết", baseCost: 500, qpsBonus: 8 },
      { id: "than-khi", name: "Cổ Đại Thần Khí", desc: "Bảo vật tự hấp thu thiên địa linh khí", baseCost: 5000, qpsBonus: 50 },
      { id: "de-tu", name: "Thu Nhận Đệ Tử", desc: "Đệ tử tu luyện thay sư phụ", baseCost: 50000, qpsBonus: 300 }
    ];

    const MONSTERS = [
      { id: 'rabbit', name: 'Yêu Thỏ Tinh', hp: 100, atk: 10, rewardQi: 150, icon: '🐇' },
      { id: 'wolf', name: 'Xích Nhãn Lang', hp: 500, atk: 25, rewardQi: 800, icon: '🐺' },
      { id: 'snake', name: 'Mãng Xà Cổ', hp: 2500, atk: 60, rewardQi: 4500, icon: '🐍' },
      { id: 'tiger', name: 'Bạch Hổ Vương', hp: 12000, atk: 150, rewardQi: 22000, icon: '🐅' },
      { id: 'dragon', name: 'Thượng Cổ Lôi Long', hp: 80000, atk: 400, rewardQi: 150000, icon: '🐉' }
    ];

    const SKILL_BOOKS = [
      { id: 'basic_skill', name: 'Sơ Nhập Kiếm Quyết', desc: 'Công pháp nhập môn', skillName: 'Thái Nhất Trảm', multiplier: 5, icon: '🗡️' },
      { id: 'fire_skill', name: 'Tam Muội Chân Hỏa', desc: 'Thiêu rụi thần hồn', skillName: 'Hỏa Phượng Trảm', multiplier: 12, icon: '🔥' },
      { id: 'thunder_skill', name: 'Cửu Thiên Âm Lôi', desc: 'Triệu hồi lôi sát', skillName: 'Cuồng Lôi Oanh', multiplier: 25, icon: '⚡' }
    ];

    const INITIAL_NPC_LEADERBOARD = [
      { id: 'npc_1', name: "Hồng Quân Lao Tổ", realmIdx: 57 }, { id: 'npc_2', name: "Nữ Oa Nương Nương", realmIdx: 56 },
      { id: 'npc_3', name: "Thông Thiên Giáo Chủ", realmIdx: 55 }, { id: 'npc_4', name: "Thái Thượng Lão Quân", realmIdx: 54 },
      { id: 'npc_5', name: "Nguyên Thủy Thiên Tôn", realmIdx: 53 }, { id: 'npc_6', name: "Saitama (Áo Mới)", realmIdx: 52 },
      { id: 'npc_7', name: "Son Goku (Vô Cực)", realmIdx: 51 }, { id: 'npc_8', name: "Tôn Ngộ Không", realmIdx: 50 },
      { id: 'npc_9', name: "La Phong (Lĩnh Chủ)", realmIdx: 49 }, { id: 'npc_10', name: "Ryomen Sukuna", realmIdx: 48 },
      { id: 'npc_11', name: "Gojo Satoru", realmIdx: 47 }, { id: 'npc_12', name: "Vegeta (Bản EGO)", realmIdx: 46 },
      { id: 'npc_13', name: "Hàn Lập", realmIdx: 45 }, { id: 'npc_14', name: "Mạnh Hạo", realmIdx: 44 },
      { id: 'npc_15', name: "Bạch Tiểu Thuần", realmIdx: 43 }, { id: 'npc_16', name: "Đông Phương Bất Bại", realmIdx: 42 },
      { id: 'npc_17', name: "Tiêu Viêm (炎帝)", realmIdx: 41 }, { id: 'npc_18', name: "Thần Ma Trọng Lâu", realmIdx: 40 },
      { id: 'npc_19', name: "Sung Jin-Woo", realmIdx: 39 }, { id: 'npc_20', name: "Toji Fushiguro", realmIdx: 38 },
      { id: 'npc_21', name: "Lâm Động", realmIdx: 37 }, { id: 'npc_22', name: "Uchiha Madara", realmIdx: 36 },
      { id: 'npc_23', name: "Aizen Sousuke", realmIdx: 35 }, { id: 'npc_24', name: "Nhị Lang Thần", realmIdx: 34 },
      { id: 'npc_25', name: "Trần Bắc Huyền", realmIdx: 33 }, { id: 'npc_26', name: "Na Tra Tam Thái Tử", realmIdx: 32 },
      { id: 'npc_27', name: "Kiếm Thần Lữ Động Bân", realmIdx: 31 }, { id: 'npc_28', name: "Cửu Thiên Huyền Nữ", realmIdx: 30 },
      { id: 'npc_29', name: "Mục Trần", realmIdx: 29 }, { id: 'npc_30', name: "Ninh Khuyết", realmIdx: 28 },
      { id: 'npc_31', name: "Cố Trường Song", realmIdx: 27 }, { id: 'npc_32', name: "Yến Thập Lục", realmIdx: 26 },
      { id: 'npc_33', name: "Cổ Nguyệt Phương Nguyên", realmIdx: 25 }, { id: 'npc_34', name: "Tào Tháo", realmIdx: 24 },
      { id: 'npc_35', name: "Quan Vũ", realmIdx: 23 }, { id: 'npc_36', name: "Lữ Bố", realmIdx: 22 },
      { id: 'npc_37', name: "Tứ Cửu Tiên Sư", realmIdx: 21 }, { id: 'npc_38', name: "Triệu Vân", realmIdx: 20 },
      { id: 'npc_39', name: "Cự Thần Nhạc Phi", realmIdx: 19 }, { id: 'npc_40', name: "Ma Tôn Vô Danh", realmIdx: 18 },
      { id: 'npc_41', name: "Độc Cô Cầu Bại", realmIdx: 17 }, { id: 'npc_42', name: "Tây Môn Xuy Tuyết", realmIdx: 16 },
      { id: 'npc_43', name: "Diệp Cô Thành", realmIdx: 15 }, { id: 'npc_44', name: "Thiên Cung Cẩm Diệp", realmIdx: 14 },
      { id: 'npc_45', name: "Trương Tam Phong", realmIdx: 13 }, { id: 'npc_46', name: "Thiên Sư Trương Dao", realmIdx: 12 },
      { id: 'npc_47', name: "Sát Thần Bạch Khởi", realmIdx: 11 }, { id: 'npc_48', name: "Vô Danh Tăng", realmIdx: 10 },
      { id: 'npc_49', name: "Diệp Phàm", realmIdx: 9 }, { id: 'npc_50', name: "Tạ Tiêu Phong", realmIdx: 8 },
      { id: 'npc_51', name: "Phong Thanh Dương", realmIdx: 7 }, { id: 'npc_52', name: "Tiêu Phong", realmIdx: 6 },
      { id: 'npc_53', name: "Tô Ngao", realmIdx: 5 }, { id: 'npc_54', name: "Lý Trường Thọ", realmIdx: 4 },
      { id: 'npc_55', name: "Vương Lâm", realmIdx: 3 }, { id: 'npc_56', name: "Sơ Nhập Tiên Đồ", realmIdx: 2 },
      { id: 'npc_57', name: "Tiểu Nhị Mãng Tinh", realmIdx: 1 }, { id: 'npc_58', name: "Tẩy Tủy Học Đồ", realmIdx: 1 },
      { id: 'npc_59', name: "Tân Tiến Đệ Tử", realmIdx: 0 }, { id: 'npc_60', name: "Kiếm Sĩ Vô Danh", realmIdx: 0 },
      { id: 'npc_61', name: "Phàm Nhân Vô Danh", realmIdx: 0 }
    ];

    const INITIAL_STATE = {
      qi: 0,
      realmIndex: 0,
      clickPower: 10,
      shopCounts: {},
      immortalPoints: 0,
      equippedSkillId: 'basic_skill',
      inventory: ['basic_skill', 'fire_skill'],
      npcData: INITIAL_NPC_LEADERBOARD,
      logs: [{ id: 'init', text: '[System]: Bảng Phong Thần sẵn sàng! Bắt đầu tu luyện.', type: 'system', time: Date.now() }]
    };

    function formatNumber(num) {
      if (num < 1000) return Math.floor(num).toString();
      if (num < 1000000) return (num / 1000).toFixed(1) + "k";
      if (num < 1000000000) return (num / 1000000).toFixed(2) + "M";
      if (num < 1000000000000) return (num / 1000000000).toFixed(2) + "B";
      return (num / 1000000000000).toFixed(2) + "T";
    }

    function ParticleBackground() {
      const particles = useMemo(() => Array.from({length: 15}).map((_, i) => ({
        id: i, size: Math.random() * 3 + 2, left: Math.random() * 100,
        duration: Math.random() * 15 + 10, delay: Math.random() * -20, isGold: Math.random() > 0.7
      })), []);

      return (
        <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
          {particles.map(p => (
            <div key={p.id} className={`absolute bottom-0 rounded-full animate-float-up ${p.isGold ? 'bg-yellow-400/30' : 'bg-cyan-400/30'}`}
                 style={{ width: p.size, height: p.size, left: `${p.left}%`, animationDuration: `${p.duration}s`, animationDelay: `${p.delay}s` }} />
          ))}
        </div>
      );
    }

    function App() {
      const [gameState, setGameState] = useState(() => {
        try {
          const saved = localStorage.getItem('xianxia-save');
          if (saved) return { ...INITIAL_STATE, ...JSON.parse(saved) };
        } catch(e) {}
        return INITIAL_STATE;
      });

      const [clicks, setClicks] = useState([]);
      const [isFlashing, setIsFlashing] = useState(false);
      const [activeTab, setActiveTab] = useState('shop');
      const [cdSkill1, setCdSkill1] = useState(0);
      const [cdSkill2, setCdSkill2] = useState(0);
      const [currentMonsterIdx, setCurrentMonsterIdx] = useState(0);
      const [monsterHp, setMonsterHp] = useState(MONSTERS[0].hp);
      
      const maxPlayerHp = useMemo(() => 100 + gameState.realmIndex * 50, [gameState.realmIndex]);
      const [playerHp, setPlayerHp] = useState(maxPlayerHp);
      const [isDead, setIsDead] = useState(false);

      const clickIdRef = useRef(0);
      const stateRef = useRef(gameState);
      useEffect(() => { stateRef.current = gameState; }, [gameState]);

      // NPC Vòng Lặp
      useEffect(() => {
        const npcTimer = setInterval(() => {
          setGameState(prev => {
            const currentNpcs = prev.npcData || INITIAL_NPC_LEADERBOARD;
            const eligibleNpcs = currentNpcs.filter(npc => npc.realmIdx < REALMS.length - 1);
            if (eligibleNpcs.length === 0) return prev;

            const randomNpc = eligibleNpcs[Math.floor(Math.random() * eligibleNpcs.length)];
            let successRate = randomNpc.realmIdx > 50 ? 0.2 : randomNpc.realmIdx > 30 ? 0.4 : 0.7;
            const isSuccess = Math.random() < successRate;
            let newLogs = [...prev.logs];

            const updatedNpcs = currentNpcs.map(npc => {
              if (npc.id === randomNpc.id) {
                if (isSuccess) {
                  newLogs = [{ id: Date.now().toString(), text: `[Đột Phá]: ${npc.name} tiến cấp ${REALMS[npc.realmIdx + 1].name}!`, type: 'breakthrough', time: Date.now() }, ...newLogs].slice(0, 30);
                  return { ...npc, realmIdx: npc.realmIdx + 1 };
                } else {
                  const drop = Math.random() < 0.3 && npc.realmIdx > 0 ? 1 : 0;
                  newLogs = [{ id: Date.now().toString(), text: drop ? `[Tẩu Hỏa]: ${npc.name} đột phá thất bại, bị rớt tầng!` : `[Bình Cảnh]: ${npc.name} thất bại khi đột phá!`, type: 'fail', time: Date.now() }, ...newLogs].slice(0, 30);
                  return { ...npc, realmIdx: Math.max(0, npc.realmIdx - drop) };
                }
              }
              return npc;
            });

            return { ...prev, npcData: updatedNpcs, logs: newLogs };
          });
        }, 9000);
        return () => clearInterval(npcTimer);
      }, []);

      // Skill Cooldown
      useEffect(() => {
        const timer = setInterval(() => {
          setCdSkill1(prev => Math.max(0, prev - 1));
          setCdSkill2(prev => Math.max(0, prev - 1));
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => { setPlayerHp(maxPlayerHp); }, [maxPlayerHp]);

      // Auto Qi Tick
      useEffect(() => {
        const interval = setInterval(() => {
          const state = stateRef.current;
          const baseQps = SHOP_ITEMS.reduce((sum, item) => sum + (state.shopCounts[item.id] || 0) * item.qpsBonus, 0);
          const totalQps = baseQps * (1 + (state.immortalPoints || 0) * 0.5);
          if (totalQps > 0) setGameState(prev => ({ ...prev, qi: prev.qi + totalQps }));
        }, 1000);

        const saveInterval = setInterval(() => {
          localStorage.setItem('xianxia-save', JSON.stringify(stateRef.current));
        }, 5000);

        return () => { clearInterval(interval); clearInterval(saveInterval); };
      }, []);

      const handleCultivate = (e) => {
        const id = clickIdRef.current++;
        const clientX = e.clientX || (e.touches && e.touches[0].clientX) || window.innerWidth / 2;
        const clientY = e.clientY || (e.touches && e.touches[0].clientY) || window.innerHeight / 2;
        
        setClicks(prev => [...prev, { id, x: clientX, y: clientY - 20, val: gameState.clickPower }]);
        setTimeout(() => setClicks(prev => prev.filter(c => c.id !== id)), 800);
        setGameState(prev => ({ ...prev, qi: prev.qi + prev.clickPower }));
      };

      const handleBreakthrough = () => {
        if (Math.random() < 0.7) {
          setGameState(prev => {
            const nextRealm = prev.realmIndex + 1;
            return {
              ...prev, qi: 0, realmIndex: nextRealm, clickPower: Math.floor(prev.clickPower * 1.5),
              logs: [{ id: Date.now().toString(), text: `[Thành Công]: Tiến cấp ${REALMS[nextRealm].name}!`, type: 'breakthrough', time: Date.now() }, ...prev.logs].slice(0, 30)
            };
          });
          setIsFlashing(true);
          setTimeout(() => setIsFlashing(false), 800);
        } else {
          setGameState(prev => ({
            ...prev, qi: prev.qi * 0.7,
            logs: [{ id: Date.now().toString(), text: `[Thất Bại]: Thiên kiếp đánh rớt 30% Linh Khí!`, type: 'fail', time: Date.now() }, ...prev.logs].slice(0, 30)
          }));
        }
      };

      const handleReincarnate = () => {
        if (gameState.realmIndex < 9) return;
        const ptsGained = Math.floor(gameState.realmIndex);
        setGameState(prev => ({
          ...INITIAL_STATE,
          immortalPoints: (prev.immortalPoints || 0) + ptsGained,
          inventory: prev.inventory,
          equippedSkillId: prev.equippedSkillId,
          npcData: prev.npcData,
          logs: [{ id: Date.now().toString(), text: `[Tái Sinh]: Nhận ${ptsGained} Điểm Trường Sinh (+${ptsGained * 50}% Linh Khí).`, type: 'breakthrough', time: Date.now() }, ...prev.logs].slice(0, 30)
        }));
      };

      const buyItem = (itemId) => {
        setGameState(prev => {
          const item = SHOP_ITEMS.find(i => i.id === itemId);
          const count = prev.shopCounts[itemId] || 0;
          const cost = Math.floor(item.baseCost * Math.pow(1.5, count));
          if (prev.qi >= cost) {
            return {
              ...prev, qi: prev.qi - cost, shopCounts: { ...prev.shopCounts, [itemId]: count + 1 },
              logs: [{ id: Date.now().toString(), text: `[Mua]: +1 ${item.name}`, type: 'shop', time: Date.now() }, ...prev.logs].slice(0, 30)
            };
          }
          return prev;
        });
      };

      const attackMonster = (dmgMult = 1, skillType = 0) => {
        if (isDead) return;
        if (skillType === 1) setCdSkill1(5);
        if (skillType === 2) setCdSkill2(12);

        const monster = MONSTERS[currentMonsterIdx];
        const dmg = gameState.clickPower * dmgMult;
        const newMonsterHp = monsterHp - dmg;
        
        if (newMonsterHp <= 0) {
          setGameState(prev => ({
            ...prev, qi: prev.qi + monster.rewardQi,
            logs: [{ id: Date.now().toString(), text: `[Diệt Quái]: Hạ ${monster.name}, nhận +${formatNumber(monster.rewardQi)} Qi!`, type: 'breakthrough', time: Date.now() }, ...prev.logs].slice(0, 30)
          }));
          setMonsterHp(monster.hp);
          setPlayerHp(maxPlayerHp);
        } else {
          setMonsterHp(newMonsterHp);
          const newPlayerHp = playerHp - monster.atk;
          if (newPlayerHp <= 0) {
            setPlayerHp(0);
            setIsDead(true);
            setGameState(prev => ({
              ...prev, logs: [{ id: Date.now().toString(), text: `[Thất Thủ]: Trọng thương trước ${monster.name}!`, type: 'fail', time: Date.now() }, ...prev.logs].slice(0, 30)
            }));
            setTimeout(() => { setPlayerHp(maxPlayerHp); setMonsterHp(monster.hp); setIsDead(false); }, 3000);
          } else {
            setPlayerHp(newPlayerHp);
          }
        }
      };

      const realm = REALMS[gameState.realmIndex];
      const isMaxRealm = gameState.realmIndex === REALMS.length - 1;
      const isBreakthrough = !isMaxRealm && gameState.qi >= realm.maxQi;
      const currentQps = SHOP_ITEMS.reduce((sum, item) => sum + (gameState.shopCounts[item.id] || 0) * item.qpsBonus, 0) * (1 + (gameState.immortalPoints || 0) * 0.5);
      const percent = isMaxRealm ? 100 : Math.min(100, (gameState.qi / realm.maxQi) * 100);
      const equippedBook = SKILL_BOOKS.find(b => b.id === gameState.equippedSkillId) || SKILL_BOOKS[0];

      const fullLeaderboard = useMemo(() => {
        const npcs = gameState.npcData || INITIAL_NPC_LEADERBOARD;
        const formattedNpcs = npcs.map(npc => ({ name: npc.name, realmIdx: npc.realmIdx, title: REALMS[Math.min(npc.realmIdx, REALMS.length - 1)].name, isPlayer: false }));
        const combined = [...formattedNpcs, { name: "BẠN", realmIdx: gameState.realmIndex, title: realm.name, isPlayer: true }];
        return combined.sort((a, b) => b.realmIdx - a.realmIdx);
      }, [gameState.npcData, gameState.realmIndex, realm.name]);

      return (
        <div className="min-h-screen relative flex flex-col font-sans overflow-x-hidden pb-6">
          <ParticleBackground />
          {isFlashing && <div className="fixed inset-0 bg-white z-[100] animate-flash pointer-events-none opacity-50" />}
          
          {clicks.map(click => (
            <div key={click.id} className="fixed pointer-events-none text-cyan-300 font-extrabold text-lg z-50 animate-float-fade" style={{ left: click.x, top: click.y }}>
              +{formatNumber(click.val)}
            </div>
          ))}

          {/* HEADER: Tối ưu nhỏ gọn trên Mobile */}
          <header className="relative z-10 flex flex-col items-center justify-center p-3 border-b border-white/10 bg-black/60 backdrop-blur-md sticky top-0">
            <h1 className="font-serif text-xl sm:text-3xl font-bold tracking-widest text-yellow-400 uppercase text-center">{realm.name}</h1>
            <div className="flex items-center gap-2 text-[10px] sm:text-xs text-slate-400 font-mono mt-0.5">
              <span>Tầng {gameState.realmIndex + 1}/{REALMS.length}</span>
              {gameState.immortalPoints > 0 && <span className="text-yellow-400">| ✨ Buff x{1 + gameState.immortalPoints * 0.5}</span>}
            </div>
            
            {/* Thanh Máu NV */}
            <div className="w-full max-w-xs sm:max-w-md bg-black/80 h-3.5 rounded-full border border-green-500/30 overflow-hidden relative my-1.5">
              <div className="bg-gradient-to-r from-emerald-600 to-green-400 h-full transition-all duration-200" style={{ width: `${Math.max(0, (playerHp / maxPlayerHp) * 100)}%` }} />
              <div className="absolute inset-0 flex items-center justify-center text-[9px] font-mono font-bold text-white">❤️ HP: {playerHp}/{maxPlayerHp}</div>
            </div>

            <div className="text-lg sm:text-2xl font-mono text-cyan-400 font-bold">
              {formatNumber(gameState.qi)} <span className="text-slate-500 font-light text-sm">/</span> {isMaxRealm ? '∞' : formatNumber(realm.maxQi)}
            </div>
          </header>

          {/* MAIN CONTENT: Grid 3 cột trên PC, 1 cột trên Mobile */}
          <main className="relative z-10 flex-1 w-full max-w-7xl mx-auto p-3 sm:p-4 grid grid-cols-1 lg:grid-cols-12 gap-4">
            
            {/* CỘT 1: TU LUYỆN & CLICK */}
            <div className="col-span-1 lg:col-span-4 flex flex-col gap-3">
              <div className="bg-black/40 backdrop-blur-md rounded-xl border border-white/10 p-4 shadow-xl">
                <div className="flex justify-between items-center mb-2">
                  <span className="text-xs font-serif text-slate-300">TIẾN ĐỘ TẦNG</span>
                  <span className="text-xs font-mono font-bold text-cyan-400">{percent.toFixed(1)}%</span>
                </div>
                <div className="w-full h-2.5 rounded-full bg-black/60 overflow-hidden border border-white/10 mb-4">
                  <div className="h-full bg-gradient-to-r from-cyan-500 to-yellow-500 transition-all duration-300" style={{ width: `${percent}%` }} />
                </div>

                {isMaxRealm ? (
                  <div className="p-3 text-center border border-yellow-500/50 rounded-xl bg-yellow-500/10 text-yellow-400 font-serif text-sm">Đạo Tổ Vô Địch</div>
                ) : isBreakthrough ? (
                  <button onClick={handleBreakthrough} className="w-full py-4 text-sm sm:text-base font-bold font-serif rounded-xl breakthrough-pulse bg-black/80 cursor-pointer">
                    ⚡ TÂM MA ĐỘ KIẾP ⚡
                  </button>
                ) : (
                  <button onClick={handleCultivate} className="w-full py-5 text-lg font-bold font-serif text-cyan-400 border border-cyan-500/40 bg-cyan-500/10 active:bg-cyan-500/30 hover:bg-cyan-500/20 rounded-xl transition-all flex flex-col items-center justify-center gap-1 cursor-pointer">
                    <span>THU HOẠCH LINH KHÍ</span>
                    <span className="text-[10px] font-mono text-cyan-300 font-normal border border-cyan-500/30 px-2.5 py-0.5 rounded-full">+{formatNumber(gameState.clickPower)} Qi / Click</span>
                  </button>
                )}

                {gameState.realmIndex >= 9 && (
                  <button onClick={handleReincarnate} className="mt-3 w-full py-2 text-[11px] font-bold font-serif border border-yellow-500/40 bg-yellow-500/10 text-yellow-300 rounded-lg">
                    ✨ TẨY TỦY TRƯỜNG SINH (Chuyển Sinh)
                  </button>
                )}
              </div>

              <div className="bg-black/40 backdrop-blur-md rounded-xl border border-white/10 p-3 text-center">
                <span className="text-slate-400 text-[10px] tracking-widest block">TỰ ĐỘNG GOM LINH KHÍ</span>
                <span className="text-lg font-mono text-cyan-400 font-bold">+{formatNumber(currentQps)} <span className="text-xs text-slate-500">Qi/s</span></span>
              </div>
            </div>

            {/* CỘT 2: TABS NỘI DUNG CHÍNH */}
            <div className="col-span-1 lg:col-span-5 bg-black/40 backdrop-blur-md rounded-xl border border-white/10 p-3 flex flex-col h-[460px] sm:h-[500px]">
              
              {/* Tab Selector */}
              <div className="grid grid-cols-4 gap-1 border-b border-white/10 pb-2.5 mb-2.5">
                <button onClick={() => setActiveTab('shop')} className={`py-1.5 text-[11px] font-bold font-serif rounded-lg border ${activeTab === 'shop' ? 'bg-cyan-500/20 border-cyan-400 text-cyan-300' : 'bg-black/30 border-white/5 text-slate-400'}`}>🏛️ SHOP</button>
                <button onClick={() => setActiveTab('monster')} className={`py-1.5 text-[11px] font-bold font-serif rounded-lg border ${activeTab === 'monster' ? 'bg-red-500/20 border-red-400 text-red-300' : 'bg-black/30 border-white/5 text-slate-400'}`}>⚔️ TRẢM YÊU</button>
                <button onClick={() => setActiveTab('inventory')} className={`py-1.5 text-[11px] font-bold font-serif rounded-lg border ${activeTab === 'inventory' ? 'bg-purple-500/20 border-purple-400 text-purple-300' : 'bg-black/30 border-white/5 text-slate-400'}`}>🎒 TÚI ĐỒ</button>
                <button onClick={() => setActiveTab('leaderboard')} className={`py-1.5 text-[11px] font-bold font-serif rounded-lg border ${activeTab === 'leaderboard' ? 'bg-yellow-500/20 border-yellow-400 text-yellow-300' : 'bg-black/30 border-white/5 text-slate-400'}`}>🏆 RANK</button>
              </div>

              {/* TAB 1: SHOP */}
              {activeTab === 'shop' && (
                <div className="flex-1 overflow-y-auto space-y-2 no-scrollbar pr-1">
                  {SHOP_ITEMS.map((item) => {
                    const count = gameState.shopCounts[item.id] || 0;
                    const cost = Math.floor(item.baseCost * Math.pow(1.5, count));
                    const canAfford = gameState.qi >= cost;
                    return (
                      <div key={item.id} onClick={() => canAfford && buyItem(item.id)}
                           className={`p-2.5 rounded-xl border transition-all flex justify-between items-center ${canAfford ? 'border-cyan-500/30 bg-cyan-500/10 active:scale-[0.98] cursor-pointer' : 'border-white/5 bg-black/40 opacity-40 cursor-not-allowed'}`}>
                        <div>
                          <h3 className="font-serif text-xs sm:text-sm text-cyan-300">{item.name}</h3>
                          <p className="text-[9px] sm:text-[10px] text-slate-400 leading-tight">{item.desc}</p>
                          <div className="text-[9px] font-mono text-cyan-400 mt-0.5">+{formatNumber(item.qpsBonus)} Qi/s</div>
                        </div>
                        <div className="text-right flex flex-col items-end">
                          <span className="text-yellow-400 font-mono text-xs font-bold">x{count}</span>
                          <span className="text-[9px] font-mono bg-black/60 px-1.5 py-0.5 rounded border border-white/10 mt-1">Giá: {formatNumber(cost)}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* TAB 2: TRẢM YÊU */}
              {activeTab === 'monster' && (
                <div className="flex-1 flex flex-col justify-between p-1">
                  <div className="flex justify-center gap-1.5 mb-1">
                    {MONSTERS.map((m, idx) => (
                      <button key={m.id} onClick={() => { setCurrentMonsterIdx(idx); setMonsterHp(m.hp); }}
                              className={`px-2.5 py-1 rounded text-xs border ${currentMonsterIdx === idx ? 'border-red-400 bg-red-500/20 text-red-300' : 'border-white/10 bg-black/30 text-slate-400'}`}>
                        {m.icon}
                      </button>
                    ))}
                  </div>

                  <div className="text-center my-auto">
                    <div className="text-4xl mb-1">{MONSTERS[currentMonsterIdx].icon}</div>
                    <h3 className="text-sm font-serif font-bold text-red-400">{MONSTERS[currentMonsterIdx].name}</h3>
                    <p className="text-[10px] text-slate-400">Đánh trả: <span className="text-red-400 font-bold">-{MONSTERS[currentMonsterIdx].atk} HP</span> | Thưởng: <span className="text-yellow-400 font-bold">+{formatNumber(MONSTERS[currentMonsterIdx].rewardQi)} Qi</span></p>

                    <div className="w-full bg-black/60 h-3.5 rounded-full border border-red-500/30 overflow-hidden relative my-2">
                      <div className="bg-gradient-to-r from-red-600 to-orange-500 h-full transition-all duration-150" style={{ width: `${Math.max(0, (monsterHp / MONSTERS[currentMonsterIdx].hp) * 100)}%` }} />
                      <div className="absolute inset-0 flex items-center justify-center text-[9px] font-mono font-bold text-white">HP: {formatNumber(monsterHp)} / {formatNumber(MONSTERS[currentMonsterIdx].hp)}</div>
                    </div>
                  </div>

                  <div className="grid grid-cols-3 gap-1.5">
                    <button onClick={() => attackMonster(1, 0)} disabled={isDead}
                            className={`py-2 text-[11px] font-bold rounded-lg border border-red-500/40 bg-red-500/20 text-red-300 active:scale-95 ${isDead ? 'opacity-40' : ''}`}>
                      ⚔️ Thường<br/><span className="text-[8px] font-normal">x1 Sức Mạnh</span>
                    </button>
                    <button onClick={() => attackMonster(equippedBook.multiplier, 1)} disabled={isDead || cdSkill1 > 0}
                            className={`py-2 text-[11px] font-bold rounded-lg border border-orange-500/40 bg-orange-500/20 text-orange-300 active:scale-95 ${isDead || cdSkill1 > 0 ? 'opacity-40' : ''}`}>
                      {equippedBook.icon} {equippedBook.skillName}<br/>
                      <span className="text-[8px] font-normal">{cdSkill1 > 0 ? `${cdSkill1}s` : `x${equippedBook.multiplier} DMG`}</span>
                    </button>
                    <button onClick={() => attackMonster(20, 2)} disabled={isDead || cdSkill2 > 0}
                            className={`py-2 text-[11px] font-bold rounded-lg border border-purple-500/40 bg-purple-500/20 text-purple-300 active:scale-95 ${isDead || cdSkill2 > 0 ? 'opacity-40' : ''}`}>
                      ⚡ Thiên Lôi<br/>
                      <span className="text-[8px] font-normal">{cdSkill2 > 0 ? `${cdSkill2}s` : `x20 DMG`}</span>
                    </button>
                  </div>
                </div>
              )}

              {/* TAB 3: TÚI ĐỒ */}
              {activeTab === 'inventory' && (
                <div className="flex-1 overflow-y-auto space-y-2 no-scrollbar pr-1">
                  {SKILL_BOOKS.map(book => {
                    const isOwned = gameState.inventory.includes(book.id);
                    const isEquipped = gameState.equippedSkillId === book.id;
                    return (
                      <div key={book.id} className="p-2.5 rounded-xl border border-white/10 bg-black/40 flex justify-between items-center">
                        <div className="flex items-center gap-2.5">
                          <span className="text-xl">{book.icon}</span>
                          <div>
                            <h4 className="font-serif text-xs text-purple-300">{book.name}</h4>
                            <p className="text-[9px] text-slate-400">{book.desc}</p>
                          </div>
                        </div>
                        {isEquipped ? (
                          <span className="text-[9px] font-bold text-green-400 bg-green-500/10 px-2 py-0.5 rounded border border-green-500/30">ĐANG DÙNG</span>
                        ) : isOwned ? (
                          <button onClick={() => setGameState(prev => ({ ...prev, equippedSkillId: book.id }))}
                                  className="text-[9px] font-bold text-purple-300 bg-purple-500/20 px-2.5 py-1 rounded border border-purple-400/40">
                            TRANG BỊ
                          </button>
                        ) : (
                          <span className="text-[9px] text-slate-500 italic">Khóa</span>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}

              {/* TAB 4: BẢNG PHONG THẦN */}
              {activeTab === 'leaderboard' && (
                <div className="flex-1 overflow-y-auto space-y-1 no-scrollbar pr-1">
                  {fullLeaderboard.map((item, index) => (
                    <div key={index} className={`p-1.5 rounded-lg border flex justify-between items-center text-[11px] ${item.isPlayer ? 'border-yellow-400 bg-yellow-500/20 font-bold' : 'border-white/5 bg-black/30'}`}>
                      <div className="flex items-center gap-2">
                        <span className={`w-5 h-5 flex items-center justify-center rounded-full text-[9px] ${index === 0 ? 'bg-yellow-400 text-black font-bold' : index === 1 ? 'bg-slate-300 text-black font-bold' : index === 2 ? 'bg-amber-600 text-white font-bold' : 'bg-white/10 text-slate-400'}`}>
                          {index + 1}
                        </span>
                        <span className={item.isPlayer ? 'text-yellow-300' : 'text-slate-200'}>{item.name}</span>
                      </div>
                      <span className={`font-serif ${item.isPlayer ? 'text-yellow-400' : 'text-cyan-400'}`}>{item.title}</span>
                    </div>
                  ))}
                </div>
              )}

            </div>

            {/* CỘT 3: NHẬT KÝ TU LUYỆN */}
            <div className="col-span-1 lg:col-span-3 bg-black/40 backdrop-blur-md rounded-xl border border-white/10 p-3 flex flex-col h-[200px] lg:h-[500px]">
              <h3 className="text-[11px] font-serif text-slate-400 tracking-widest mb-2 border-b border-white/10 pb-1.5 flex items-center gap-1">📜 NHẬT KÝ TU LUYỆN</h3>
              <div className="flex-1 overflow-y-auto space-y-1.5 no-scrollbar pr-1">
                {gameState.logs.map(log => (
                  <div key={log.id} className={`p-1.5 rounded text-[10px] leading-tight border ${log.type === 'breakthrough' ? 'bg-green-500/10 border-green-500/30 text-green-300' : log.type === 'fail' ? 'bg-red-500/10 border-red-500/30 text-red-300' : log.type === 'shop' ? 'bg-cyan-500/10 border-cyan-500/30 text-cyan-300' : 'bg-white/5 border-white/5 text-slate-400'}`}>
                    {log.text}
                  </div>
                ))}
              </div>
            </div>

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
