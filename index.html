    .no-scrollbar::-webkit-scrollbar { display: none; }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 25px rgba(168, 85, 247, 0.2), inset 0 0 15px rgba(6, 182, 212, 0.2); }
      50% { box-shadow: 0 0 45px rgba(168, 85, 247, 0.4), inset 0 0 25px rgba(6, 182, 212, 0.4); }
    }
    @keyframes tribPulse {
      0%, 100% { border-color: rgba(239, 68, 68, 0.6); box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
      50% { border-color: rgba(251, 191, 36, 0.9); box-shadow: 0 0 35px rgba(251, 191, 36, 0.6); }
    }
    .sect-glow { animation: pulseGlow 4s infinite ease-in-out; }

<body class="bg-[#050508] text-amber-50 min-h-screen font-sans selection:bg-purple-500 selection:text-white bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-purple-950/30 via-[#050508] to-black">
  <div id="root"></div>

  <script type="text/babel">
    const BIN_ID = "6a622390f5f4af5e29b6690d";
    const API_KEY = "$2a$10$GxWYKRP4h18Jqfy0NivGVufkdUfCApQGLYhaEMxs1S6bWwuYdlsZ.";
    const SAVE_KEY = "tu_tien_game_save_v19";

    async function fetchCloudData() {
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
          headers: { 
            'X-Master-Key': API_KEY,
            'X-Access-Key': API_KEY,
            'Cache-Control': 'no-cache'
          }
        });
        if (!res.ok) throw new Error("Network response was not ok");
        const data = await res.json();
        return data.record || { leaderboard: [], customSects: [], activeTribulations: {}, marketListings: [] };
      } catch (e) {
        return { leaderboard: [], customSects: [], activeTribulations: {}, marketListings: [] };
      }
    }

    async function updateCloudData(myEntry) {
      try {
        const current = await fetchCloudData();
        let list = current.leaderboard || [];

        const idx = list.findIndex(item => item.name === myEntry.name);
        
        if (idx >= 0) {
          list[idx] = {
            ...list[idx],
            totalQi: myEntry.totalQi,
            realm: myEntry.realm,
            lastOnline: Date.now()
          };
        } else {
          list.push({
            name: myEntry.name,
            totalQi: myEntry.totalQi,
            realm: myEntry.realm,
            lastOnline: Date.now()
          });
        }

        list.sort((a, b) => b.totalQi - a.totalQi);
        list = list.slice(0, 20);

        let sects = current.customSects || [];
        if (myEntry.newSect && !sects.some(s => s.id === myEntry.newSect.id)) {
          sects.push(myEntry.newSect);
        }

        let tribs = current.activeTribulations || {};
        if (myEntry.myTribulation !== undefined) {
          if (myEntry.myTribulation === null) {
            delete tribs[myEntry.name];
          } else {
            tribs[myEntry.name] = myEntry.myTribulation;
          }
        }

        let listings = current.marketListings || [];
        if (myEntry.overrideMarketListings !== undefined) {
          listings = myEntry.overrideMarketListings;
        } else if (myEntry.newListing) {
          if (!listings.some(l => l.listingId === myEntry.newListing.listingId)) {
            listings.push(myEntry.newListing);
          }
        }

        const payload = {
          leaderboard: list,
          customSects: sects,
          activeTribulations: tribs,
          marketListings: listings
        };

        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': API_KEY,
            'X-Access-Key': API_KEY
          },
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        return result.record || payload;
      } catch (e) {
        return null;
      }
    }

    const REALMS = [
      { name: "Phàm Nhân (Sơ Kỳ)", req: 0, isMajor: false },
      { name: "Phàm Nhân (Trung Kỳ)", req: 50, isMajor: false },
      { name: "Phàm Nhân (Hậu Kỳ)", req: 120, isMajor: false },
      { name: "Phàm Nhân (Viên Mãn)", req: 250, isMajor: false },
      { name: "Luyện Khí Kỳ (Sơ Kỳ)", req: 500, isMajor: true },
      { name: "Luyện Khí Kỳ (Trung Kỳ)", req: 900, isMajor: false },
      { name: "Luyện Khí Kỳ (Hậu Kỳ)", req: 1500, isMajor: false },
      { name: "Luyện Khí Kỳ (Viên Mãn)", req: 2500, isMajor: false },
      { name: "Trúc Cơ Kỳ (Sơ Kỳ)", req: 4000, isMajor: true },
      { name: "Trúc Cơ Kỳ (Trung Kỳ)", req: 6500, isMajor: false },
      { name: "Trúc Cơ Kỳ (Hậu Kỳ)", req: 10000, isMajor: false },
      { name: "Trúc Cơ Kỳ (Viên Mãn)", req: 16000, isMajor: false },
      { name: "Kim Đan Kỳ (Sơ Kỳ)", req: 25000, isMajor: true },
      { name: "Kim Đan Kỳ (Trung Kỳ)", req: 40000, isMajor: false },
      { name: "Kim Đan Kỳ (Hậu Kỳ)", req: 65000, isMajor: false },
      { name: "Kim Đan Kỳ (Viên Mãn)", req: 100000, isMajor: false },
      { name: "Nguyên Anh Kỳ (Sơ Kỳ)", req: 160000, isMajor: true },
      { name: "Nguyên Anh Kỳ (Trung Kỳ)", req: 250000, isMajor: false },
      { name: "Nguyên Anh Kỳ (Hậu Kỳ)", req: 400000, isMajor: false },
      { name: "Nguyên Anh Kỳ (Viên Mãn)", req: 650000, isMajor: false },
      { name: "Hóa Thần Kỳ (Sơ Kỳ)", req: 1000000, isMajor: true },
      { name: "Hóa Thần Kỳ (Trung Kỳ)", req: 1800000, isMajor: false },
      { name: "Hóa Thần Kỳ (Hậu Kỳ)", req: 3000000, isMajor: false },
      { name: "Hóa Thần Kỳ (Viên Mãn)", req: 5000000, isMajor: false },
      { name: "Đạo Tổ Cảnh", req: 10000000, isMajor: true }
    ];

    const DEFAULT_SECTS = [
      { id: 'thanh_van', name: 'Thanh Vân Môn', buff: 'Tăng +20% Tốc độ Thu Thập', desc: 'Kiếm đạo chính phái, linh khí uy nghiêm.', founder: 'Hệ Thống' },
      { id: 'am_duong', name: 'Âm Dương Cốc', buff: 'Giảm 20% Giá mua Đan Dược & Bảo Vật', desc: 'Hành sự cổ quái, pháp tắc huyền bí.', founder: 'Hệ Thống' },
      { id: 'huyet_dao', name: 'Huyết Đao Môn', buff: 'Tăng +50% Sát thương Trảm Yêu & Phá Trận', desc: 'Chuyên tu sát phạt, chiến lực kinh người.', founder: 'Hệ Thống' }
    ];

    const SHOP_ITEMS = [
      { id: 'linh_thach', name: 'Tụ Linh Trận', baseCost: 50, qps: 5, desc: 'Tự động hấp thu linh khí vi mô từ hư không.' },
      { id: 'duoc_vien', name: 'Dược Viên Đan Dược', baseCost: 350, qps: 30, desc: 'Trồng linh dược ngàn năm luyện hóa đan dược.' },
      { id: 'linh_tuyen', name: 'Linh Tuyền Nhãn', baseCost: 1800, qps: 150, desc: 'Mạch nước ngầm tinh thuần đậm đặc linh khí.' }
    ];

    const ALL_GEARS = [
      { id: 'gear_1', name: 'Thiết Kiếm Phàm Phí', tier: 'Phàm Phí', color: 'text-slate-400', clickBonus: 5, qpsBonus: 0, dropRate: 0.35, desc: 'Kiếm sắt đúc thô sơ của phàm nhân.' },
      { id: 'gear_2', name: 'Gỗ Đào Bùa Chú', tier: 'Phàm Phí', color: 'text-slate-400', clickBonus: 3, qpsBonus: 2, dropRate: 0.30, desc: 'Khúc gỗ đào khắc linh văn đơn giản.' },
      { id: 'gear_3', name: 'Thanh Cương Bảo Kiếm', tier: 'Hạ Phẩm', color: 'text-emerald-400', clickBonus: 25, qpsBonus: 10, dropRate: 0.18, desc: 'Kiếm đúc bằng thanh cương thạch.' },
      { id: 'gear_4', name: 'Bách Luyện Đao', tier: 'Hạ Phẩm', color: 'text-emerald-400', clickBonus: 35, qpsBonus: 5, dropRate: 0.15, desc: 'Đao được tôi luyện qua trăm lửa.' },
      { id: 'gear_5', name: 'Phá Thiên Thần Kiếm', tier: 'Trung Phẩm', color: 'text-cyan-400', clickBonus: 100, qpsBonus: 50, dropRate: 0.08, desc: 'Bảo vật trung cấp phát sáng xanh lam.' },
      { id: 'gear_6', name: 'Áo Giáp Huyền Thiết', tier: 'Trung Phẩm', color: 'text-cyan-400', clickBonus: 80, qpsBonus: 70, dropRate: 0.07, desc: 'Giáp trụ đúc từ huyền thiết nặng ngàn cân.' },
      { id: 'gear_7', name: 'Xích Huyết Thương', tier: 'Thượng Phẩm', color: 'text-purple-400', clickBonus: 250, qpsBonus: 150, dropRate: 0.03, desc: 'Ngọn giáo nhuốm máu đại yêu thượng cổ.' },
      { id: 'gear_8', name: 'Tử Kim Lô (Thu Nhỏ)', tier: 'Thượng Phẩm', color: 'text-purple-400', clickBonus: 200, qpsBonus: 300, dropRate: 0.025, desc: 'Lò luyện đan mô phỏng thượng cổ.' },
      { id: 'gear_9', name: 'Long Lân Kiếm', tier: 'Cực Phẩm', color: 'text-amber-400', clickBonus: 600, qpsBonus: 800, dropRate: 0.01, desc: 'Kiếm khảm vảy của Giao Long.' },
      { id: 'gear_10', name: 'Hỗn Nguyên Phù Đồ Tháp', tier: 'Tiên Thiên', color: 'text-red-500 animate-pulse', clickBonus: 1500, qpsBonus: 2500, dropRate: 0.003, desc: 'Tháp thu nhỏ chứa đạo vận hồng mông.' }
    ];

    const MONSTERS = [
      { id: 'yeu_thu', name: 'Yêu Lang Hoang Dã', hp: 100, reward: 50, icon: '🐺' },
      { id: 'quy_tuong', name: 'Quỷ Tướng Ngàn Năm', hp: 500, reward: 300, icon: '💀' },
      { id: 'giao_long', name: 'Giao Long Thượng Cổ', hp: 2500, reward: 1500, icon: '🐉' }
    ];

    const formatNumber = (num) => {
      if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
      if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
      return Math.floor(num).toString();
    };

    function App() {
      const [playerName, setPlayerName] = React.useState(() => {
        const saved = localStorage.getItem('tu_tien_player_name');
        if (saved) return saved;
        const randomName = 'ĐạoHữu_' + Math.floor(Math.random() * 9000 + 1000);
        localStorage.setItem('tu_tien_player_name', randomName);
        return randomName;
      });

      const [isEditingName, setIsEditingName] = React.useState(false);
      const [tempName, setTempName] = React.useState(playerName);

      const handleSaveName = () => {
        if (!tempName.trim()) return;
        const newName = tempName.trim();
        localStorage.setItem('tu_tien_player_name', newName);
        setPlayerName(newName);
        setIsEditingName(false);
        setGameState(prev => ({
          ...prev,
          logs: [{ id: Date.now().toString(), text: `[Đổi Đạo Hiệu]: Thành công cải danh thành "${newName}"!`, type: 'breakthrough', time: Date.now() }, ...prev.logs]
        }));
      };

      const [gameState, setGameState] = React.useState(() => {
        try {
          const savedState = localStorage.getItem(SAVE_KEY) || localStorage.getItem('tu_tien_game_save_v18');
          if (savedState) {
            const parsed = JSON.parse(savedState);
            if (!parsed.inventory) parsed.inventory = [];
            return parsed;
          }
        } catch (e) {}
        return {
          qi: 0,
          totalQi: 0,
          realmIdx: 0,
          joinedSectId: 'thanh_van',
          shopCounts: {},
          inventory: [],
          equippedGearId: null,
          logs: [{ id: '1', text: '[Đại Đạo]: Hệ thống Thiên Kiếp và hình phạt thất bại đã được củng cố!', type: 'breakthrough', time: Date.now() }]
        };
      });

      React.useEffect(() => {
        try { localStorage.setItem(SAVE_KEY, JSON.stringify(gameState)); } catch (e) {}
      }, [gameState]);

      const [activeTab, setActiveTab] = React.useState('shop');
      const [isBlackMarketModalOpen, setIsBlackMarketModalOpen] = React.useState(false);
      const [listingPriceInput, setListingPriceInput] = React.useState({});

      const [currentMonsterIdx, setCurrentMonsterIdx] = React.useState(0);
      const [monsterHp, setMonsterHp] = React.useState(MONSTERS[0].hp);
      const [isDead, setIsDead] = React.useState(false);
      
      const [cloudLeaderboard, setCloudLeaderboard] = React.useState([]);
      const [cloudCustomSects, setCloudCustomSects] = React.useState([]);
      const [activeTribulations, setActiveTribulations] = React.useState({});
      const [marketListings, setMarketListings] = React.useState([]);
      const [myTribulation, setMyTribulation] = React.useState(null);

      const [actedPlayers, setActedPlayers] = React.useState(new Set());
      const [actionLoading, setActionLoading] = React.useState(null);

      const [newSectName, setNewSectName] = React.useState('');
      const [newSectDesc, setNewSectDesc] = React.useState('');

      const [, setTick] = React.useState(0);
      React.useEffect(() => {
        const timer = setInterval(() => setTick(t => t + 1), 1000);
        return () => clearInterval(timer);
      }, []);

      const combatPower = React.useMemo(() => {
        let base = 1 + gameState.realmIdx * 3;
        gameState.inventory.forEach(item => {
          if (item.isEquipped) {
            const gear = ALL_GEARS.find(g => g.id === item.gearId);
            if (gear) base += gear.clickBonus;
          }
        });
        return base;
      }, [gameState.realmIdx, gameState.inventory]);

      const clickPower = combatPower;

      const qps = React.useMemo(() => {
        let total = 0;
        SHOP_ITEMS.forEach(item => {
          const count = gameState.shopCounts[item.id] || 0;
          total += count * item.qps;
        });
        gameState.inventory.forEach(item => {
          if (item.isEquipped) {
            const gear = ALL_GEARS.find(g => g.id === item.gearId);
            if (gear) total += gear.qpsBonus;
          }
        });
        if (gameState.joinedSectId === 'thanh_van') total *= 1.2;
        return total;
      }, [gameState.shopCounts, gameState.inventory, gameState.joinedSectId]);

      React.useEffect(() => {
        const interval = setInterval(() => {
          setGameState(prev => {
            const nextRealmObj = REALMS[prev.realmIdx + 1];
            if (!nextRealmObj) {
              const added = qps;
              if (added <= 0) return prev;
              return { ...prev, qi: prev.qi + added, totalQi: prev.totalQi + added };
            }

            if (prev.qi >= nextRealmObj.req) return prev;

            const added = qps;
            if (added <= 0) return prev;
            const newQi = Math.min(nextRealmObj.req, prev.qi + added);
            const actualAdded = newQi - prev.qi;

            return {
              ...prev,
              qi: newQi,
              totalQi: prev.totalQi + actualAdded
            };
          });
        }, 1000);
        return () => clearInterval(interval);
      }, [qps]);

      React.useEffect(() => {
        let isMounted = true;
        const doSync = async () => {
          const playerEntry = {
            name: playerName,
            totalQi: gameState.totalQi,
            realm: REALMS[gameState.realmIdx].name,
            myTribulation: myTribulation
          };

          const result = await updateCloudData(playerEntry);
          if (result && isMounted) {
            if (result.leaderboard) setCloudLeaderboard(result.leaderboard);
            if (result.customSects) setCloudCustomSects(result.customSects);
            if (result.marketListings) setMarketListings(result.marketListings);
            if (result.activeTribulations) {
              const now = Date.now();
              const cleanTribs = {};
              Object.entries(result.activeTribulations).forEach(([k, v]) => {
                if (v && v.endTime > now && v.hp > 0) cleanTribs[k] = v;
              });
              setActiveTribulations(cleanTribs);

              if (myTribulation && cleanTribs[playerName]) {
                const cloudHp = cleanTribs[playerName].hp;
                if (cloudHp !== myTribulation.hp) {
                  setMyTribulation(prev => prev ? { ...prev, hp: cloudHp } : null);
                }
              }
            }
          }
        };

        doSync();
        const syncInterval = setInterval(doSync, 3000);
        return () => {
          isMounted = false;
          clearInterval(syncInterval);
        };
      }, [gameState.totalQi, gameState.realmIdx, playerName, myTribulation]);

      const handleListMarketItem = async (uniqueId) => {
        const itemToSell = gameState.inventory.find(i => i.uniqueId === uniqueId);
        if (!itemToSell) return;

        const rawPrice = listingPriceInput[uniqueId] || 100;
        const price = parseInt(rawPrice, 10);
        if (isNaN(price) || price <= 0) {
          alert("Xin vui lòng nhập giá linh khí hợp lệ lớn hơn 0!");
          return;
        }

        const gearData = ALL_GEARS.find(g => g.id === itemToSell.gearId);
        if (!gearData) return;

        const updatedInventory = gameState.inventory.filter(i => i.uniqueId !== uniqueId);

        const newListing = {
          listingId: 'list_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7),
          sellerName: playerName,
          gearId: itemToSell.gearId,
          gearUniqueId: itemToSell.uniqueId,
          price: price,
          time: Date.now()
        };

        try {
          const currentData = await fetchCloudData();
          const updatedListings = [...(currentData.marketListings || []), newListing];

          const res = await updateCloudData({
            name: playerName,
            totalQi: gameState.totalQi,
            realm: REALMS[gameState.realmIdx].name,
            overrideMarketListings: updatedListings
          });

          if (res && res.marketListings) {
            setMarketListings(res.marketListings);
          }

          setGameState(prev => ({
            ...prev,
            inventory: updatedInventory,
            logs: [
              ...prev.logs,
              { id: Date.now().toString(), text: `[Hắc Thị]: Ký gửi thành công ${gearData.name} với giá ${formatNumber(price)} Qi!`, type: 'shop', time: Date.now() }
            ]
          }));
          alert("Ký gửi bảo vật lên Hắc Thị thành công!");
        } catch (e) {
          alert("Lỗi kết nối cloud khi ký gửi bảo vật!");
        }
      };

      const handleCancelMarketListing = async (listing) => {
        if (listing.sellerName !== playerName) return;

        try {
          const currentData = await fetchCloudData();
          const updatedListings = (currentData.marketListings || []).filter(l => l.listingId !== listing.listingId);

          const res = await updateCloudData({
            name: playerName,
            totalQi: gameState.totalQi,
            realm: REALMS[gameState.realmIdx].name,
            overrideMarketListings: updatedListings
          });

          if (res && res.marketListings) {
            setMarketListings(res.marketListings);
          }

          const returnedItem = {
            uniqueId: listing.gearUniqueId || ('item_' + Date.now()),
            gearId: listing.gearId,
            isEquipped: false
          };

          const gearData = ALL_GEARS.find(g => g.id === listing.gearId);

          setGameState(prev => ({
            ...prev,
            inventory: [...prev.inventory, returnedItem],
            logs: [
              ...prev.logs,
              { id: Date.now().toString(), text: `[Hắc Thị]: Gỡ bán thành công ${gearData?.name || 'Bảo Vật'} về túi đồ!`, type: 'shop', time: Date.now() }
            ]
          }));
        } catch (e) {
          alert("Lỗi khi gỡ bán bảo vật!");
        }
      };

      const handleBuyMarketItem = async (listing) => {
        if (listing.sellerName === playerName) {
          alert("Đạo hữu không thể tự mua vật phẩm do chính mình ký gửi!");
          return;
        }

        if (gameState.qi < listing.price) {
          alert("Linh khí bất túc, không đủ linh thạch để mua bảo vật này!");
          return;
        }

        const gearData = ALL_GEARS.find(g => g.id === listing.gearId);

        try {
          const currentData = await fetchCloudData();
          const targetListing = (currentData.marketListings || []).find(l => l.listingId === listing.listingId);
          if (!targetListing) {
            alert("Vật phẩm này đã được người khác mua mất hoặc đã bị chủ nhân gỡ!");
            return;
          }

          const updatedListings = (currentData.marketListings || []).filter(l => l.listingId !== listing.listingId);

          const res = await updateCloudData({
            name: playerName,
            totalQi: gameState.totalQi - listing.price,
            realm: REALMS[gameState.realmIdx].name,
            overrideMarketListings: updatedListings
          });

          if (res && res.marketListings) {
            setMarketListings(res.marketListings);
          }

          const purchasedItem = {
            uniqueId: 'item_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7),
            gearId: listing.gearId,
            isEquipped: false
          };

          setGameState(prev => ({
            ...prev,
            qi: prev.qi - listing.price,
            inventory: [...prev.inventory, purchasedItem],
            logs: [
              ...prev.logs,
              { id: Date.now().toString(), text: `[Hắc Thị]: Mua thành công ${gearData?.name || 'Bảo Vật'} từ đại năng ${listing.sellerName} với giá ${formatNumber(listing.price)} Qi!`, type: 'shop', time: Date.now() }
            ]
          }));

          alert(`Giao dịch thành công! Đã thu phục "${gearData?.name}" vào túi đồ.`);
        } catch (e) {
          alert("Giao dịch thất bại, xin vui lòng thử lại!");
        }
      };

      React.useEffect(() => {
        if (!myTribulation) return;
        const timer = setInterval(() => {
          const now = Date.now();
          if (now >= myTribulation.endTime || myTribulation.hp <= 0) {
            if (myTribulation.hp > 0) {
              const nextRealm = REALMS[gameState.realmIdx + 1];
              setGameState(prev => {
                const updatedState = {
                  ...prev,
                  qi: prev.qi - nextRealm.req,
                  realmIdx: prev.realmIdx + 1,
                  logs: [
                    { id: Date.now().toString(), text: `[Độ Kiếp Thành Công]: Chống chịu qua lôi kiếp, bước chân vào ${nextRealm.name}!`, type: 'breakthrough', time: Date.now() },
                    ...prev.logs
                  ]
                };
                updateCloudData({
                  name: playerName,
                  totalQi: updatedState.totalQi,
                  realm: REALMS[updatedState.realmIdx].name,
                  myTribulation: null
                }).then(res => {
                  if (res?.leaderboard) setCloudLeaderboard(res.leaderboard);
                });
                return updatedState;
              });
            } else {
              setGameState(prev => {
                const lostQi = Math.floor(prev.qi * 0.6);
                const lostTotalQi = Math.floor(prev.totalQi * 0.6);
                
                let updatedInventory = [...prev.inventory];
                let lostGearName = null;
                if (updatedInventory.length > 0) {
                  const randomIdx = Math.floor(Math.random() * updatedInventory.length);
                  const removedItem = updatedInventory.splice(randomIdx, 1)[0];
                  const foundGear = ALL_GEARS.find(g => g.id === removedItem.gearId);
                  if (foundGear) lostGearName = foundGear.name;
                }

                const penaltyText = lostGearName 
                  ? `[Thiên Kiếp Thất Bại]: Pháp trận bị công phá! Mất ${formatNumber(lostQi)} Qi và đánh rơi bảo vật "${lostGearName}"!`
                  : `[Thiên Kiếp Thất Bại]: Pháp trận bị công phá! Mất ${formatNumber(lostQi)} Qi!`;

                const updatedState = {
                  ...prev,
                  qi: Math.max(0, prev.qi - lostQi),
                  totalQi: Math.max(0, prev.totalQi - lostTotalQi),
                  inventory: updatedInventory,
                  logs: [{ id: Date.now().toString(), text: penaltyText, type: 'fail', time: Date.now() }, ...prev.logs]
                };

                updateCloudData({
                  name: playerName,
                  totalQi: updatedState.totalQi,
                  realm: REALMS[updatedState.realmIdx].name,
                  myTribulation: null
                });

                return updatedState;
              });
            }
            setMyTribulation(null);
          }
        }, 500);
        return () => clearInterval(timer);
      }, [myTribulation, gameState.realmIdx, playerName, gameState.totalQi, gameState.qi]);

      const handleBreakthrough = async () => {
        const nextRealm = REALMS[gameState.realmIdx + 1];
        if (!nextRealm) return;

        if (gameState.qi >= nextRealm.req) {
          if (nextRealm.isMajor) {
            const tribData = {
              targetRealm: nextRealm.name,
              hp: 1200,
              maxHp: 1200,
              endTime: Date.now() + 30000
            };
            setMyTribulation(tribData);
            setGameState(prev => ({
              ...prev,
              logs: [
                ...prev.logs,
                { id: Date.now().toString(), text: `[Thiên Kiếp Giáng Lâm]: Đạo hữu bắt đầu độ kiếp lên ${nextRealm.name}! Phải chống đỡ trong 30 giây!`, type: 'breakthrough', time: Date.now() }
              ]
            }));

            await updateCloudData({
              name: playerName,
              totalQi: gameState.totalQi,
              realm: REALMS[gameState.realmIdx].name,
              myTribulation: tribData
            });

          } else {
            const nextIdx = gameState.realmIdx + 1;
            const newQi = gameState.qi - nextRealm.req;
            setGameState(prev => ({
              ...prev,
              qi: newQi,
              realmIdx: nextIdx,
              logs: [
                ...prev.logs,
                { id: Date.now().toString(), text: `[Đột Phá]: Thành công tiến cấp lên ${nextRealm.name}!`, type: 'breakthrough', time: Date.now() }
              ]
            }));

            const res = await updateCloudData({
              name: playerName,
              totalQi: gameState.totalQi,
              realm: REALMS[nextIdx].name,
              myTribulation: null
            });
            if (res?.leaderboard) setCloudLeaderboard(res.leaderboard);
          }
        } else {
          setGameState(prev => ({
            ...prev,
            logs: [
              ...prev.logs,
              { id: Date.now().toString(), text: `[Tâm Ma]: Linh khí bất túc, xung kích ${nextRealm.name} thất bại!`, type: 'fail', time: Date.now() }
            ]
          }));
        }
      };

      const selectTribulationAction = async (targetPlayerName, actionType) => {
        setActionLoading(targetPlayerName);
        try {
          const data = await fetchCloudData();
          let tribs = data.activeTribulations || {};

          if (!tribs[targetPlayerName]) {
            setGameState(prev => ({
              ...prev,
              logs: [...prev.logs, { id: Date.now().toString(), text: `[Thiên Thư]: Độ kiếp của ${targetPlayerName} đã kết thúc!`, type: 'fail', time: Date.now() }]
            }));
            setActionLoading(null);
            return;
          }

          let power = combatPower * 20;
          if (actionType === 'attack' && gameState.joinedSectId === 'huyet_dao') power *= 1.5;

          const oldHp = tribs[targetPlayerName].hp;
          if (actionType === 'protect') {
            tribs[targetPlayerName].hp = Math.min(tribs[targetPlayerName].maxHp, oldHp + power);
          } else {
            tribs[targetPlayerName].hp = Math.max(0, oldHp - power);
          }
          const delta = Math.abs(tribs[targetPlayerName].hp - oldHp);

          const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'X-Master-Key': API_KEY,
              'X-Access-Key': API_KEY
            },
            body: JSON.stringify({
              leaderboard: data.leaderboard || [],
              customSects: data.customSects || [],
              activeTribulations: tribs,
              marketListings: data.marketListings || []
            })
          });
          const updated = await res.json();
          if (updated?.record?.activeTribulations) {
            setActiveTribulations(updated.record.activeTribulations);
          }

          setActedPlayers(prev => new Set([...prev, targetPlayerName]));

          const actionText = actionType === 'protect' ? `🛡️ Hộ Thủ (+${Math.floor(delta)} HP)` : `⚔️ Tấn Công (-${Math.floor(delta)} HP)`;
          setGameState(prev => ({
            ...prev,
            logs: [...prev.logs, { id: Date.now().toString(), text: `[Thiên Thư]: Thực thi ${actionText} cho ${targetPlayerName}!`, type: 'shop', time: Date.now() }]
          }));
        } catch (e) {}
        setActionLoading(null);
      };

      const buyItem = (itemId) => {
        const item = SHOP_ITEMS.find(i => i.id === itemId);
        if (!item) return;
        const count = gameState.shopCounts[itemId] || 0;
        let cost = Math.floor(item.baseCost * Math.pow(1.6, count));
        if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);
        if (gameState.qi >= cost) {
          setGameState(prev => ({
            ...prev,
            qi: prev.qi - cost,
            shopCounts: { ...prev.shopCounts, [itemId]: count + 1 },
            logs: [...prev.logs, { id: Date.now().toString(), text: `[Đan Phòng]: Mua thành công ${item.name}!`, type: 'shop', time: Date.now() }]
          }));
        }
      };

      const attackMonster = (multiplier = 1) => {
        if (isDead) return;
        let dmg = combatPower * multiplier;
        if (gameState.joinedSectId === 'huyet_dao') dmg *= 1.5;
        const monster = MONSTERS[currentMonsterIdx];
        const nextHp = monsterHp - dmg;

        if (nextHp <= 0) {
          let droppedItemsLogs = [];
          let newInventoryItems = [...gameState.inventory];

          ALL_GEARS.forEach(gear => {
            const roll = Math.random();
            if (roll <= gear.dropRate) {
              const uniqueId = 'item_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
              newInventoryItems.push({
                uniqueId: uniqueId,
                gearId: gear.id,
                isEquipped: false
              });
              droppedItemsLogs.push(gear.name);
            }
          });

          let dropLogText = droppedItemsLogs.length > 0 
            ? ` | Nhận được bảo vật: ${droppedItemsLogs.join(', ')}!` 
            : '';

          setGameState(prev => ({
            ...prev,
            qi: prev.qi + monster.reward,
            totalQi: prev.totalQi + monster.reward,
            inventory: newInventoryItems,
            logs: [
              ...prev.logs, 
              { id: Date.now().toString(), text: `[Trảm Yêu]: Tiêu diệt ${monster.name}, cướp đoạt +${monster.reward} Linh Khí${dropLogText}`, type: 'breakthrough', time: Date.now() }
            ]
          }));

          setIsDead(true);
          setTimeout(() => { setMonsterHp(MONSTERS[currentMonsterIdx].hp); setIsDead(false); }, 3000);
        } else {
          setMonsterHp(nextHp);
        }
      };

      const toggleEquipInventoryItem = (uniqueId) => {
        setGameState(prev => {
          const targetItem = prev.inventory.find(i => i.uniqueId === uniqueId);
          if (!targetItem) return prev;

          const willBeEquipped = !targetItem.isEquipped;
          const gearData = ALL_GEARS.find(g => g.id === targetItem.gearId);

          const updatedInventory = prev.inventory.map(item => {
            if (item.uniqueId === uniqueId) {
              return { ...item, isEquipped: willBeEquipped };
            }
            return item;
          });

          return {
            ...prev,
            inventory: updatedInventory,
            logs: [
              ...prev.logs,
              { id: Date.now().toString(), text: `[Túi Đồ]: ${willBeEquipped ? 'Đã trang bị' : 'Đã tháo'} pháp bảo ${gearData?.name || 'Vật Phẩm'}!`, type: 'shop', time: Date.now() }
            ]
          };
        });
      };

      const handleCreateSect = async (e) => {
        e.preventDefault();
        if (!newSectName.trim()) return;
        if (gameState.realmIdx < 8) {
          alert("Cần đạt cảnh giới Trúc Cơ Kỳ (Sơ Kỳ) trở lên mới có thể khai sơn lập phái!");
          return;
        }
        const newSect = {
          id: 'custom_' + Date.now(),
          name: newSectName.trim(),
          buff: 'Tăng +30% Tốc độ Thu Thập & Chiến Lực',
          desc: newSectDesc.trim() || 'Tông môn tự lập của đại năng.',
          founder: playerName
        };

        const currentData = await fetchCloudData();
        const updatedSects = [...(currentData.customSects || []), newSect];
        
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': API_KEY,
            'X-Access-Key': API_KEY
          },
          body: JSON.stringify({
            leaderboard: currentData.leaderboard || [],
            customSects: updatedSects,
            activeTribulations: currentData.activeTribulations || {},
            marketListings: currentData.marketListings || []
          })
        });

        setCloudCustomSects(updatedSects);
        setGameState(prev => ({
          ...prev,
          joinedSectId: newSect.id,
          logs: [...prev.logs, { id: Date.now().toString(), text: `[Khai Sơn]: Thành công khai lập tông môn "${newSect.name}"!`, type: 'breakthrough', time: Date.now() }]
        }));
        setNewSectName('');
        setNewSectDesc('');
      };

      const allSects = [...DEFAULT_SECTS, ...cloudCustomSects];
      const currentJoinedSect = allSects.find(s => s.id === gameState.joinedSectId) || DEFAULT_SECTS[0];
      const nextRealmObj = REALMS[gameState.realmIdx + 1];
      const progressPercent = nextRealmObj ? Math.min(100, (gameState.qi / nextRealmObj.req) * 100) : 100;
      const isMaxedOut = nextRealmObj && gameState.qi >= nextRealmObj.req;

      const fullLeaderboard = React.useMemo(() => {
        let list = [...cloudLeaderboard];
        const playerEntry = {
          name: playerName,
          totalQi: gameState.totalQi,
          realm: REALMS[gameState.realmIdx].name
        };

        const index = list.findIndex(item => item.name === playerName);
        if (index >= 0) {
          list[index] = {
            ...list[index],
            totalQi: Math.max(list[index].totalQi, gameState.totalQi),
            realm: REALMS[gameState.realmIdx].name
          };
        } else {
          list.push(playerEntry);
        }

        list.sort((a, b) => b.totalQi - a.totalQi);
        return list.slice(0, 20).map(item => ({
          ...item,
          isPlayer: item.name === playerName,
          title: item.realm || 'Phàm Nhân'
        }));
      }, [cloudLeaderboard, playerName, gameState.totalQi, gameState.realmIdx]);

      return (
        <div className="flex flex-col min-h-screen p-4 max-w-7xl mx-auto gap-4 relative">
          <header className="sect-glow bg-[#100c1c]/85 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-5 flex flex-col md:flex-row justify-between items-center gap-4 shadow-2xl relative overflow-hidden">
            <div className="absolute -top-12 -left-12 w-32 h-32 bg-purple-600/10 rounded-full blur-2xl pointer-events-none"></div>
            <div className="flex items-center gap-3 w-full md:w-auto">
              <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-600 to-indigo-800 flex items-center justify-center border border-purple-400/40 text-xl shadow-inner flex-shrink-0">🧘‍♂️</div>
              <div className="flex flex-col gap-1 flex-1">
                <div className="flex items-center justify-between gap-2">
                  <span className="text-[11px] font-mono text-cyan-400 tracking-wider uppercase">Đạo Hữu: <span className="text-amber-200 font-bold">{playerName}</span></span>
                  {!isEditingName ? (
                    <button onClick={() => { setTempName(playerName); setIsEditingName(true); }} className="text-[10px] font-mono px-2 py-0.5 bg-purple-600/30 hover:bg-purple-600/50 border border-purple-400/40 text-purple-200 rounded cursor-pointer transition-all">
                      ✏️ Đổi Tên
                    </button>
                  ) : (
                    <div className="flex items-center gap-1.5">
                      <input type="text" value={tempName} onChange={(e) => setTempName(e.target.value)}
                        className="bg-black/80 border border-amber-400/60 rounded px-2 py-0.5 text-xs text-amber-100 font-mono focus:outline-none w-28" />
                      <button onClick={handleSaveName} className="text-[10px] font-mono px-2 py-0.5 bg-emerald-600/40 hover:bg-emerald-600/60 border border-emerald-400/50 text-emerald-200 rounded cursor-pointer">Lưu</button>
                      <button onClick={() => setIsEditingName(false)} className="text-[10px] font-mono px-2 py-0.5 bg-red-600/40 hover:bg-red-600/60 border border-red-400/50 text-red-200 rounded cursor-pointer">Hủy</button>
                    </div>
                  )}
                </div>
                <h1 className="text-xl md:text-2xl font-serif font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-purple-300 to-cyan-300">
                  {REALMS[gameState.realmIdx]?.name || "Phàm Nhân (Sơ Kỳ)"}
                </h1>
              </div>
            </div>
            <div className="flex items-center gap-4 flex-wrap justify-end">
              <div className="flex items-center gap-4 font-mono bg-black/40 px-5 py-2.5 rounded-xl border border-white/10 flex-shrink-0">
                <div className="flex flex-col items-end">
                  <span className="text-slate-400 text-[10px]">Linh Khí (Qi)</span>
                  <span className="text-amber-400 font-bold text-base">{formatNumber(gameState.qi)}</span>
                </div>
                <div className="w-[1px] h-8 bg-white/10"></div>
                <div className="flex flex-col items-end">
                  <span className="text-slate-400 text-[10px]">Chiến Lực</span>
                  <span className="text-red-400 font-bold text-base">{formatNumber(combatPower)}</span>
                </div>
                <div className="w-[1px] h-8 bg-white/10"></div>
                <div className="flex flex-col items-end">
                  <span className="text-slate-400 text-[10px]">Tốc Độ Tụ Khí</span>
                  <span className="text-cyan-400 font-bold text-base">+{formatNumber(qps)}/s</span>
                </div>
              </div>
              <button onClick={() => setIsBlackMarketModalOpen(true)}
                className="px-4 py-3 bg-gradient-to-r from-amber-700/80 to-purple-800/80 hover:from-amber-600 hover:to-purple-700 border border-amber-400/50 rounded-xl text-xs font-serif font-bold text-amber-200 shadow-lg cursor-pointer flex items-center gap-2 animate-pulse">
                <span>🖤</span> Chợ Đen Trao Đổi
              </button>
            </div>
          </header>

          {Object.keys(activeTribulations).length > 0 && (
            <div className="flex flex-col gap-2">
              {Object.entries(activeTribulations).map(([pName, trib]) => {
                const timeLeft = Math.max(0, Math.ceil((trib.endTime - Date.now()) / 1000));
                const hasActed = actedPlayers.has(pName);
                const isLoading = actionLoading === pName;
                return (
                  <div key={pName} className="tribulation-banner bg-[#1a0808]/90 backdrop-blur-xl border-2 rounded-2xl p-4 flex flex-col md:flex-row justify-between items-center gap-4 shadow-2xl">
                    <div className="flex items-center gap-3">
                      <span className="text-3xl animate-bounce">⚡</span>
                      <div>
                        <div className="text-xs font-mono text-red-400 font-bold uppercase tracking-wider">
                          Kênh Thiên Kiếp Cảnh
                          <span className={`ml-2 px-2 py-0.5 rounded-full text-[11px] ${timeLeft <= 10 ? 'bg-red-600/50 text-red-200 animate-pulse' : 'bg-black/40 text-amber-300'}`}>
                            ⏱ {timeLeft}s
                          </span>
                        </div>
                        <div className="text-amber-200 font-serif font-bold text-sm">
                          Đạo hữu <span className="text-cyan-300">{pName}</span> đang độ kiếp lên <span className="text-amber-400">{trib.targetRealm}</span>!
                        </div>
                      </div>
                    </div>
                    <div className="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto">
                      <div className="w-full sm:w-48 bg-black/70 h-4 rounded-full border border-red-500/50 overflow-hidden relative p-0.5">
                        <div className="bg-gradient-to-r from-red-600 via-orange-500 to-amber-500 h-full rounded-full transition-all duration-500"
                          style={{ width: `${Math.max(0, (trib.hp / trib.maxHp) * 100)}%` }} />
                        <div className="absolute inset-0 flex items-center justify-center text-[10px] font-mono font-bold text-white drop-shadow">
                          HP: {Math.floor(trib.hp)} / {trib.maxHp}
                        </div>
                      </div>
                      {pName !== playerName ? (
                        <div className="flex gap-2 w-full sm:w-auto">
                          {isLoading ? (
                            <span className="text-xs font-mono text-yellow-300 bg-black/60 px-3 py-1.5 rounded-xl border border-yellow-500/40 animate-pulse">
                              ⚡ Đang gửi...
                            </span>
                          ) : hasActed ? (
                            <span className="text-xs font-mono text-emerald-300 bg-black/60 px-3 py-1.5 rounded-xl border border-emerald-500/40">
                              ✅ Đã tương tác
                            </span>
                          ) : (
                            <>
                              <button onClick={() => selectTribulationAction(pName, 'protect')}
                                className="flex-1 sm:flex-none px-3 py-1.5 bg-emerald-600/30 hover:bg-emerald-600/50 border border-emerald-400/40 rounded-xl text-xs font-serif font-bold text-emerald-200 transition-all cursor-pointer shadow">
                                🛡️ Hộ Thủ
                              </button>
                              <button onClick={() => selectTribulationAction(pName, 'attack')}
                                className="flex-1 sm:flex-none px-3 py-1.5 bg-red-600/30 hover:bg-red-600/50 border border-red-400/40 rounded-xl text-xs font-serif font-bold text-red-200 transition-all cursor-pointer shadow">
                                ⚔️ Tấn Công
                              </button>
                            </>
                          )}
                        </div>
                      ) : (
                        <span className="text-xs font-mono text-amber-300 animate-pulse">(Đang tĩnh tọa độ kiếp)</span>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          <main className="grid grid-cols-1 lg:grid-cols-12 gap-4 flex-1">
            <div className="col-span-1 lg:col-span-4 flex flex-col gap-4">
              <div className="bg-[#100c1c]/85 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-6 shadow-2xl flex flex-col items-center justify-center gap-5 relative">
                <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-purple-500/5 via-transparent to-transparent pointer-events-none"></div>
                <button
                  onClick={() => {
                    if (isMaxedOut) return;
                    const nextReq = nextRealmObj ? nextRealmObj.req : gameState.qi + clickPower;
                    const newQi = Math.min(nextReq, gameState.qi + clickPower);
                    const added = newQi - gameState.qi;
                    setGameState(prev => ({ ...prev, qi: newQi, totalQi: prev.totalQi + added }));
                  }}
                  className={`relative w-44 h-44 rounded-full bg-gradient-to-br from-purple-900/40 via-indigo-950/60 to-slate-900 border-2 transition-all flex flex-col items-center justify-center gap-1.5 group ${isMaxedOut ? 'border-amber-500/80 cursor-not-allowed opacity-90 shadow-[0_0_30px_rgba(245,158,11,0.3)] animate-pulse' : 'border-purple-500/50 hover:border-cyan-400 hover:scale-105 active:scale-95 shadow-[0_0_40px_rgba(168,85,247,0.2)] cursor-pointer'}`}>
                  <span className="text-4xl group-hover:scale-110 transition-transform">🌌</span>
                  <span className="font-serif font-bold text-xs tracking-wider text-amber-200">{isMaxedOut ? 'ĐÃ ĐẠT NGƯỠNG' : 'HẤP THU LINH KHÍ'}</span>
                  <span className="text-[10px] font-mono text-cyan-300">{isMaxedOut ? 'Cần Đột Phá Ngay!' : `+${clickPower} Qi / Nhấn`}</span>
                </button>
                <div className="w-full flex flex-col gap-2 mt-2">
                  <div className="flex justify-between text-xs font-mono text-slate-300">
                    <span className="text-purple-300">Tiến Cảnh Giới</span>
                    <span className="text-amber-300">{nextRealmObj ? `${formatNumber(gameState.qi)} / ${formatNumber(nextRealmObj.req)}` : 'Đã Đạt Đạo Tổ Cảnh'}</span>
                  </div>
                  <div className="w-full bg-black/60 h-3 rounded-full border border-purple-500/30 overflow-hidden p-0.5">
                    <div className="bg-gradient-to-r from-purple-600 via-indigo-500 to-cyan-400 h-full rounded-full transition-all duration-300 shadow-[0_0_10px_rgba(6,182,212,0.5)]"
                      style={{ width: `${progressPercent}%` }} />
                  </div>
                  {myTribulation ? (
                    <div className="mt-2 w-full py-3 bg-red-950/50 border border-red-500/50 rounded-xl text-xs font-serif font-bold text-red-300 text-center animate-pulse">
                      ⚡ Đang độ kiếp ({Math.max(0, Math.ceil((myTribulation.endTime - Date.now()) / 1000))}s) — HP: {Math.floor(myTribulation.hp)}/{myTribulation.maxHp}
                    </div>
                  ) : (
                    <button onClick={handleBreakthrough}
                      className={`mt-2 w-full py-3 border rounded-xl text-xs font-serif font-bold tracking-widest transition-all shadow-lg cursor-pointer ${isMaxedOut ? 'bg-gradient-to-r from-amber-600 to-red-600 hover:from-amber-500 hover:to-red-500 border-amber-300 text-white animate-bounce' : 'bg-gradient-to-r from-purple-700/40 to-indigo-700/40 hover:from-purple-600/60 hover:to-indigo-600/60 border-purple-400/40 text-amber-200'}`}>
                      ⚡ XUNG KÍCH ĐỘT PHÁ {nextRealmObj?.isMajor ? '(Mốc Lớn)' : ''}
                    </button>
                  )}
                </div>
              </div>

              <div className="bg-[#100c1c]/85 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-5 shadow-2xl flex flex-col gap-2">
                <h3 className="font-serif text-xs text-amber-300 font-bold tracking-widest flex items-center gap-2"><span>🏛️</span> TÔNG MÔN HIỆN TẠI</h3>
                <div className="p-3 rounded-xl border border-purple-500/40 bg-purple-950/30 flex flex-col gap-1">
                  <div className="font-bold text-xs text-amber-200 font-serif">{currentJoinedSect.name}</div>
                  <div className="text-[10px] text-cyan-300">{currentJoinedSect.buff}</div>
                  <div className="text-[9px] text-slate-400 font-mono">Sáng lập: {currentJoinedSect.founder || 'Hệ Thống'}</div>
                </div>
              </div>
            </div>

            <div className="col-span-1 lg:col-span-8 flex flex-col gap-4">
              <div className="flex gap-1.5 bg-[#100c1c]/85 p-1.5 rounded-2xl border border-purple-500/30 overflow-x-auto no-scrollbar shadow-xl">
                {[
                  { id: 'shop', name: '💊 Đan Phòng & Trận Pháp' },
                  { id: 'inventory', name: '🎒 Túi Đồ & Bảo Vật' },
                  { id: 'combat', name: '⚔️ Trảm Yêu Thử Luyện' },
                  { id: 'sect', name: '⛩️ Vạn Đạo Tông Môn' },
                  { id: 'leaderboard', name: '📜 Thiên Thư Bảng' }
                ].map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)}
                    className={`flex-1 py-2.5 px-4 rounded-xl text-xs font-serif font-bold whitespace-nowrap transition-all cursor-pointer ${activeTab === tab.id ? 'bg-gradient-to-r from-purple-700/60 to-indigo-700/60 text-amber-200 border border-purple-400/50 shadow-lg' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                    {tab.name}
                  </button>
                ))}
              </div>

              <div className="bg-[#100c1c]/85 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-6 shadow-2xl flex-1 flex flex-col min-h-[420px]">
                {activeTab === 'shop' && (
                  <div className="flex flex-col gap-4">
                    <div>
                      <h2 className="font-serif font-bold text-base text-amber-200">Đan Phòng & Tụ Linh Trận</h2>
                      <p className="text-xs text-slate-400">Xây dựng kiến trúc tu luyện để gia tăng tốc độ tích tụ linh khí tự động.</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                      {SHOP_ITEMS.map(item => {
                        const count = gameState.shopCounts[item.id] || 0;
                        let cost = Math.floor(item.baseCost * Math.pow(1.6, count));
                        if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);
                        const canBuy = gameState.qi >= cost;
                        return (
                          <div key={item.id} className="bg-black/50 border border-purple-500/20 rounded-xl p-4 flex flex-col justify-between gap-3">
                            <div className="flex flex-col gap-1">
                              <div className="flex justify-between items-center">
                                <span className="font-serif font-bold text-sm text-amber-200">{item.name}</span>
                                <span className="text-xs font-mono px-2 py-0.5 rounded bg-purple-900/40 text-purple-300 border border-purple-500/30">SL: {count}</span>
                              </div>
                              <p className="text-[11px] text-slate-400">{item.desc}</p>
                              <span className="text-[10px] font-mono text-cyan-400 mt-1">Hiệu quả: +{item.qps}/s</span>
                            </div>
                            <button onClick={() => buyItem(item.id)} disabled={!canBuy}
                              className={`w-full py-2 rounded-xl text-xs font-serif font-bold transition-all ${canBuy ? 'bg-purple-600/40 hover:bg-purple-600/60 border border-purple-400/50 text-amber-200 cursor-pointer shadow' : 'bg-slate-800/40 border border-slate-700 text-slate-500 cursor-not-allowed'}`}>
                              Luyện Hóa ({formatNumber(cost)} Qi)
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {activeTab === 'inventory' && (
                  <div className="flex flex-col gap-4">
                    <div>
                      <h2 className="font-serif font-bold text-base text-amber-200">Túi Đồ & Trang Bị Nhận Được</h2>
                      <p className="text-xs text-slate-400">Các pháp bảo thu phục từ Trảm Yêu Thử Luyện. Trang bị để khuếch đại chiến lực.</p>
                    </div>
                    {gameState.inventory.length === 0 ? (
                      <div className="flex flex-col items-center justify-center py-16 gap-2 text-slate-500 font-mono text-xs">
                        <span>🎒 Túi đồ trống rỗng...</span>
                        <span>Hãy đi đến mục "Trảm Yêu Thử Luyện" để tiêu diệt yêu thú và nhận trang bị!</span>
                      </div>
                    ) : (
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 max-h-[350px] overflow-y-auto no-scrollbar">
                        {gameState.inventory.map(item => {
                          const gear = ALL_GEARS.find(g => g.id === item.gearId);
                          if (!gear) return null;
                          return (
                            <div key={item.uniqueId} className={`p-3.5 rounded-xl border flex flex-col justify-between gap-3 ${item.isEquipped ? 'bg-amber-950/30 border-amber-500/50 shadow-lg' : 'bg-black/50 border-purple-500/20'}`}>
                              <div className="flex flex-col gap-1">
                                <div className="flex justify-between items-center">
                                  <span className={`font-serif font-bold text-sm ${gear.color}`}>{gear.name}</span>
                                  <span className="text-[10px] font-mono px-2 py-0.5 rounded bg-slate-800 text-slate-300 border border-slate-700">{gear.tier}</span>
                                </div>
                                <p className="text-[10px] text-slate-400">{gear.desc}</p>
                                <div className="text-[11px] font-mono text-cyan-300 mt-1">
                                  {gear.clickBonus > 0 && <div>+ {gear.clickBonus} Qi / Nhấn</div>}
                                  {gear.qpsBonus > 0 && <div>+ {gear.qpsBonus} Qi / giây</div>}
                                </div>
                              </div>
                              <button onClick={() => toggleEquipInventoryItem(item.uniqueId)}
                                className={`w-full py-2 rounded-xl text-xs font-serif font-bold transition-all cursor-pointer ${item.isEquipped ? 'bg-amber-600/40 border border-amber-400/50 text-amber-200' : 'bg-purple-600/30 border border-purple-400/40 text-purple-200 hover:bg-purple-600/50'}`}>
                                {item.isEquipped ? 'Đang Trang Bị' : 'Trang Bị'}
                              </button>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                )}

                {activeTab === 'combat' && (
                  <div className="flex flex-col gap-4">
                    <div className="flex justify-between items-center">
                      <div>
                        <h2 className="font-serif font-bold text-base text-amber-200">Trảm Yêu Thử Luyện</h2>
                        <p className="text-xs text-slate-400">Tiêu diệt yêu thú để nhận linh khí và rớt trang bị ngẫu nhiên.</p>
                      </div>
                      <div className="flex gap-2">
                        {MONSTERS.map((m, idx) => (
                          <button key={m.id} onClick={() => { setCurrentMonsterIdx(idx); setMonsterHp(m.hp); }}
                            className={`px-3 py-1 rounded-lg text-xs font-mono font-bold cursor-pointer ${currentMonsterIdx === idx ? 'bg-purple-600 text-white border border-purple-400' : 'bg-black/40 text-slate-400 border border-white/10'}`}>
                            {m.icon} {m.name}
                          </button>
                        ))}
                      </div>
                    </div>
                    <div className="flex-1 bg-black/50 border border-purple-500/20 rounded-2xl p-6 flex flex-col items-center justify-center gap-6">
                      <div className="text-6xl animate-bounce">{MONSTERS[currentMonsterIdx].icon}</div>
                      <div className="text-center">
                        <div className="font-serif font-bold text-lg text-amber-200">{MONSTERS[currentMonsterIdx].name}</div>
                        <div className="text-xs font-mono text-cyan-300 mt-1">Phần Thưởng: +{MONSTERS[currentMonsterIdx].reward} Linh Khí & Rơi Bảo Vật</div>
                      </div>
                      <div className="w-full max-w-md flex flex-col gap-2">
                        <div className="flex justify-between text-xs font-mono text-slate-300">
                          <span>Sinh Lực Yêu Thú</span>
                          <span className="text-red-400 font-bold">{Math.max(0, monsterHp)} / {MONSTERS[currentMonsterIdx].hp}</span>
                        </div>
                        <div className="w-full bg-black/80 h-4 rounded-full border border-red-500/40 overflow-hidden p-0.5">
                          <div className="bg-gradient-to-r from-red-600 to-orange-500 h-full rounded-full transition-all duration-200"
                            style={{ width: `${Math.max(0, (monsterHp / MONSTERS[currentMonsterIdx].hp) * 100)}%` }} />
                        </div>
                      </div>
                      <div className="flex gap-3 w-full max-w-md">
                        <button onClick={() => attackMonster(1)} disabled={isDead}
                          className={`flex-1 py-3 rounded-xl text-xs font-serif font-bold transition-all shadow-lg ${isDead ? 'bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed' : 'bg-red-950/60 hover:bg-red-900/80 border border-red-500/50 text-red-200 cursor-pointer'}`}>
                          ⚔️ Ra Đòn Cơ Bản
                        </button>
                        <button onClick={() => attackMonster(3)} disabled={isDead}
                          className={`flex-1 py-3 rounded-xl text-xs font-serif font-bold transition-all shadow-lg ${isDead ? 'bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed' : 'bg-gradient-to-r from-amber-700/60 to-red-700/60 hover:from-amber-600/80 hover:to-red-600/80 border border-amber-400/50 text-amber-200 cursor-pointer'}`}>
                          🔥 Tất Sát (3x)
                        </button>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'sect' && (
                  <div className="flex flex-col gap-4">
                    <div>
                      <h2 className="font-serif font-bold text-base text-amber-200">Vạn Đạo Tông Môn</h2>
                      <p className="text-xs text-slate-400">Gia nhập hoặc tự mình khai sơn lập phái để nhận thiên phú đặc quyền độc nhất.</p>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                      <div className="flex flex-col gap-3">
                        <h3 className="text-xs font-serif font-bold text-amber-300 uppercase tracking-wider">Danh Sách Tông Môn</h3>
                        <div className="flex flex-col gap-2 max-h-[300px] overflow-y-auto no-scrollbar">
                          {allSects.map(sect => {
                            const isJoined = gameState.joinedSectId === sect.id;
                            return (
                              <div key={sect.id} className={`p-4 rounded-xl border flex flex-col justify-between gap-2 ${isJoined ? 'bg-purple-950/40 border-purple-400/60 shadow-lg' : 'bg-black/50 border-purple-500/20'}`}>
                                <div className="flex justify-between items-center">
                                  <span className="font-serif font-bold text-sm text-amber-200">{sect.name}</span>
                                  <span className="text-[10px] font-mono text-slate-400">Sáng lập: {sect.founder || 'Hệ Thống'}</span>
                                </div>
                                <p className="text-[11px] text-cyan-300">{sect.buff}</p>
                                <p className="text-[10px] text-slate-400">{sect.desc}</p>
                                {!isJoined && (
                                  <button onClick={() => setGameState(prev => ({ ...prev, joinedSectId: sect.id, logs: [...prev.logs, { id: Date.now().toString(), text: `[Tông Môn]: Gia nhập "${sect.name}" thành công!`, type: 'shop', time: Date.now() }] }))}
                                    className="mt-1 py-1.5 px-3 bg-purple-600/30 hover:bg-purple-600/50 border border-purple-400/40 rounded-lg text-xs font-serif font-bold text-purple-200 transition-all cursor-pointer w-fit">
                                    Gia Nhập
                                  </button>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                      <div className="bg-black/50 border border-purple-500/20 rounded-2xl p-5 flex flex-col gap-3">
                        <h3 className="text-xs font-serif font-bold text-amber-300 uppercase tracking-wider">Khai Sơn Lập Phái</h3>
                        <p className="text-[11px] text-slate-400">Yêu cầu cảnh giới: <span className="text-cyan-400 font-bold">Trúc Cơ Kỳ (Sơ Kỳ)</span> trở lên.</p>
                        <form onSubmit={handleCreateSect} className="flex flex-col gap-3 mt-1">
                          <div className="flex flex-col gap-1">
                            <label className="text-[10px] font-mono text-slate-400">Tên Tông Môn</label>
                            <input type="text" value={newSectName} onChange={(e) => setNewSectName(e.target.value)}
                              placeholder="Ví dụ: Thiên Kiếm Tông..."
                              className="bg-black/80 border border-purple-500/30 rounded-xl px-3 py-2 text-xs text-amber-100 font-mono focus:outline-none focus:border-cyan-400" />
                          </div>
                          <div className="flex flex-col gap-1">
                            <label className="text-[10px] font-mono text-slate-400">Mô Tả Thế Lực</label>
                            <textarea value={newSectDesc} onChange={(e) => setNewSectDesc(e.target.value)}
                              placeholder="Mô tả về tôn chỉ tông môn..."
                              className="bg-black/80 border border-purple-500/30 rounded-xl px-3 py-2 text-xs text-amber-100 font-mono focus:outline-none focus:border-cyan-400 h-20 resize-none" />
                          </div>
                          <button type="submit"
                            className="mt-2 py-2.5 bg-gradient-to-r from-purple-700/60 to-indigo-700/60 hover:from-purple-600/80 hover:to-indigo-600/80 border border-purple-400/50 rounded-xl text-xs font-serif font-bold text-amber-200 transition-all cursor-pointer shadow">
                            Tạo Lập Tông Môn Mới
                          </button>
                        </form>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'leaderboard' && (
                  <div className="flex flex-col gap-4">
                    <div>
                      <h2 className="font-serif font-bold text-base text-amber-200">Thiên Thư Bảng</h2>
                      <p className="text-xs text-slate-400">Ghi danh những đại năng cường giả luôn bám trụ vĩnh viễn trên bảng xếp hạng.</p>
                    </div>
                    <div className="flex flex-col gap-2">
                      {fullLeaderboard.length === 0 ? (
                        <div className="text-center py-8 text-xs font-mono text-slate-500">Chưa có cao thủ nào ghi danh trên bảng xếp hạng.</div>
                      ) : (
                        fullLeaderboard.map((item, index) => (
                          <div key={item.name} className={`flex items-center justify-between p-3.5 rounded-xl border ${item.isPlayer ? 'bg-purple-950/40 border-purple-400/60 shadow-lg' : 'bg-black/50 border-purple-500/20'}`}>
                            <div className="flex items-center gap-3">
                              <span className={`w-6 h-6 rounded-full flex items-center justify-center font-mono text-xs font-bold ${index === 0 ? 'bg-amber-500 text-black' : index === 1 ? 'bg-slate-300 text-black' : index === 2 ? 'bg-amber-700 text-white' : 'bg-purple-900/50 text-purple-200 border border-purple-500/30'}`}>
                                {index + 1}
                              </span>
                              <div className="flex flex-col">
                                <span className="font-serif font-bold text-sm text-amber-200 flex items-center gap-2">
                                  {item.name} {item.isPlayer && <span className="text-[10px] font-mono px-1.5 bg-cyan-600/40 text-cyan-200 border border-cyan-400/50 rounded">Chính Mình</span>}
                                </span>
                                <span className="text-[10px] font-mono text-cyan-300">{item.title}</span>
                              </div>
                            </div>
                            <div className="flex flex-col items-end font-mono">
                              <span className="text-amber-400 font-bold text-xs">{formatNumber(item.totalQi)} Qi</span>
                              <span className="text-[10px] text-slate-400">Tích Lũy</span>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </main>

          {isBlackMarketModalOpen && (
            <div className="fixed inset-0 z-50 bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
              <div className="bg-[#120b22] border-2 border-amber-500/50 rounded-2xl w-full max-w-5xl p-6 flex flex-col gap-5 shadow-[0_0_50px_rgba(245,158,11,0.2)] max-h-[85vh]">
                <div className="flex justify-between items-center border-b border-purple-500/30 pb-4">
                  <div className="flex items-center gap-3">
                    <span className="text-2xl">🖤</span>
                    <div>
                      <h2 className="font-serif font-bold text-lg text-amber-200">Hắc Thị Chợ Đen — Ký Gửi & Giao Dịch Bảo Vật</h2>
                      <p className="text-xs text-slate-400">Treo bán pháp bảo vĩnh viễn trên Cloud JSONBin cho tới khi có đại năng khác mua hoặc chủ nhân gỡ xuống.</p>
                    </div>
                  </div>
                  <button onClick={() => setIsBlackMarketModalOpen(false)}
                    className="w-8 h-8 rounded-full bg-red-950/50 border border-red-500/50 flex items-center justify-center text-red-300 hover:bg-red-900 cursor-pointer text-sm font-bold">
                    ✕
                  </button>
                </div>
                
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 flex-1 overflow-y-auto no-scrollbar">
                  <div className="bg-black/50 border border-purple-500/20 rounded-xl p-4 flex flex-col gap-3">
                    <span className="text-xs font-serif font-bold text-amber-200">📦 Túi Đồ Của Bạn (Chọn bảo vật để ký gửi)</span>
                    <div className="flex flex-col gap-2.5 max-h-[320px] overflow-y-auto no-scrollbar">
                      {gameState.inventory.length === 0 ? (
                        <span className="text-xs text-slate-500 font-mono py-10 text-center">Không có bảo vật nào trong túi. Hãy đi Trảm Yêu!</span>
                      ) : (
                        gameState.inventory.map(item => {
                          const gear = ALL_GEARS.find(g => g.id === item.gearId);
                          if (!gear) return null;
                          return (
                            <div key={item.uniqueId} className="flex flex-col gap-2 p-3 bg-purple-950/20 border border-purple-500/20 rounded-xl">
                              <div className="flex justify-between items-center">
                                <span className={`font-serif font-bold text-xs ${gear.color}`}>{gear.name} ({gear.tier})</span>
                                <span className="text-[10px] font-mono text-cyan-300">+{gear.clickBonus} Qi/nhấn</span>
                              </div>
                              <div className="flex items-center gap-2">
                                <input type="number" placeholder="Nhập giá Qi..."
                                  value={listingPriceInput[item.uniqueId] || ''}
                                  onChange={(e) => setListingPriceInput(prev => ({ ...prev, [item.uniqueId]: e.target.value }))}
                                  className="bg-black/80 border border-amber-400/40 rounded-lg px-2.5 py-1 text-xs text-amber-100 font-mono focus:outline-none flex-1" />
                                <button onClick={() => handleListMarketItem(item.uniqueId)}
                                  className="px-3 py-1 bg-amber-600/40 hover:bg-amber-600/60 border border-amber-400/50 text-amber-200 rounded-lg cursor-pointer text-xs font-serif font-bold">
                                  Ký Gửi Bán
                                </button>
                              </div>
                            </div>
                          );
                        })
                      )}
                    </div>
                  </div>

                  <div className="bg-black/50 border border-purple-500/20 rounded-xl p-4 flex flex-col gap-3">
                    <span className="text-xs font-serif font-bold text-amber-200">🛒 Vật Phẩm Đang Rao Bán Trên Hắc Thị</span>
                    <div className="flex flex-col gap-2.5 max-h-[320px] overflow-y-auto no-scrollbar">
                      {marketListings.length === 0 ? (
                        <span className="text-xs text-slate-500 font-mono py-10 text-center">Hắc Thị hiện chưa có bảo vật nào được ký gửi.</span>
                      ) : (
                        marketListings.map(listing => {
                          const gear = ALL_GEARS.find(g => g.id === listing.gearId);
                          if (!gear) return null;
                          const isMyListing = listing.sellerName === playerName;
                          return (
                            <div key={listing.listingId} className="flex flex-col gap-2 p-3 bg-purple-950/30 border border-purple-500/30 rounded-xl">
                              <div className="flex justify-between items-center">
                                <span className={`font-serif font-bold text-xs ${gear.color}`}>{gear.name}</span>
                                <span className="text-[10px] font-mono text-amber-400 font-bold">{formatNumber(listing.price)} Qi</span>
                              </div>
                              <div className="flex justify-between items-center text-[10px] font-mono text-slate-400">
                                <span>Chủ nhân: <span className="text-cyan-300">{listing.sellerName}</span></span>
                                {isMyListing ? (
                                  <button onClick={() => handleCancelMarketListing(listing)}
                                    className="px-2.5 py-1 bg-red-600/30 hover:bg-red-600/50 border border-red-400/40 text-red-200 rounded cursor-pointer font-serif font-bold">
                                    Gỡ Bán
                                  </button>
                                ) : (
                                  <button onClick={() => handleBuyMarketItem(listing)}
                                    className="px-2.5 py-1 bg-emerald-600/40 hover:bg-emerald-600/60 border border-emerald-400/50 text-emerald-200 rounded cursor-pointer font-serif font-bold">
                                    Mua Lại
                                  </button>
                                )}
                              </div>
                            </div>
                          );
                        })
                      )}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
