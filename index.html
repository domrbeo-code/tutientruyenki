    function formatNumber(num) {
      if (num < 1000) return Math.floor(num).toString();
      if (num < 1000000) return (num / 1000).toFixed(1) + "k";
      if (num < 1000000000) return (num / 1000000).toFixed(2) + "M";
      if (num < 1000000000000) return (num / 1000000000).toFixed(2) + "B";
      return (num / 1000000000000).toFixed(2) + "T";
    }

    function ParticleBackground() {

      })), []);

      return (
        <div className="fixed inset-0 pointer-events-none overflow-hidden z-0">
          {particles.map(p => (
            <div key={p.id} className={`absolute bottom-0 rounded-full animate-float-up ${p.isGold ? 'bg-yellow-400/30' : 'bg-cyan-400/30'}`}
                 style={{ width: p.size, height: p.size, left: `${p.left}%`, animationDuration: `${p.duration}s`, animationDelay: `${p.delay}s` }} />
          ))}
        </div>
      );
    }

          const gear = BLACK_MARKET_GEARS.find(g => g.id === gameState.equippedGearId);

        }

            let successRate = randomNpc.realmIdx > 50 ? 0.15 : randomNpc.realmIdx > 30 ? 0.3 : 0.6;
            const isSuccess = Math.random() < successRate;
            let newLogs = [...prev.logs];

            const updatedNpcs = currentNpcs.map(npc => {
              if (npc.id === randomNpc.id) {
                if (isSuccess) {
                  newLogs = [{ id: Date.now().toString(), text: `[Đột Phá]: ${npc.name} tiến cấp ${REALMS[npc.realmIdx + 1].name}!`, type: 'breakthrough', time: Date.now() }, ...newLogs].slice(0, 30);
                  return { ...npc, realmIdx: npc.realmIdx + 1 };
                } else {
                  const drop = Math.random() < 0.4 && npc.realmIdx > 0 ? 1 : 0;
                  newLogs = [{ id: Date.now().toString(), text: drop ? `[Tẩu Hỏa]: ${npc.name} đột phá thất bại, bị rớt tầng!` : `[Bình Cảnh]: ${npc.name} thất bại khi đột phá!`, type: 'fail', time: Date.now() }, ...newLogs].slice(0, 30);
                  return { ...npc, realmIdx: Math.max(0, npc.realmIdx - drop) };
                }
              }
              return npc;
            });

            return { ...prev, npcData: updatedNpcs, logs: newLogs };
          });
        }, 9000);
        return () => clearInterval(npcTimer);
      }, []);

      useEffect(() => {
        const timer = setInterval(() => {
          setCdSkill1(prev => Math.max(0, prev - 1));
          setCdSkill2(prev => Math.max(0, prev - 1));
        }, 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => { setPlayerHp(maxPlayerHp); }, [maxPlayerHp]);

      useEffect(() => {
        const interval = setInterval(() => {
          const state = stateRef.current;
          let baseQps = SHOP_ITEMS.reduce((sum, item) => sum + (state.shopCounts[item.id] || 0) * item.qpsBonus, 0);
          
          if (state.equippedGearId) {
            const gear = BLACK_MARKET_GEARS.find(g => g.id === state.equippedGearId);
            if (gear) baseQps += gear.qpsBonus;
          }

          if (state.joinedSectId === 'dao_hoa') baseQps *= 1.5;

          const totalQps = baseQps * (1 + (state.immortalPoints || 0) * 0.5);
          if (totalQps > 0) setGameState(prev => ({ ...prev, qi: prev.qi + totalQps }));
        }, 1000);

        const saveInterval = setInterval(() => {
          localStorage.setItem('xianxia-save-blackmarket', JSON.stringify(stateRef.current));
        }, 5000);

        return () => { clearInterval(interval); clearInterval(saveInterval); };
      }, []);

      const handleCultivate = (e) => {
        const id = clickIdRef.current++;
        const clientX = e.clientX || (e.touches && e.touches[0].clientX) || window.innerWidth / 2;
        const clientY = e.clientY || (e.touches && e.touches[0].clientY) || window.innerHeight / 2;
        
        let pwr = currentClickPower;
        if (gameState.joinedSectId === 'thuc_son') pwr *= 2;

        setClicks(prev => [...prev, { id, x: clientX, y: clientY - 20, val: pwr }]);
        setTimeout(() => setClicks(prev => prev.filter(c => c.id !== id)), 800);
        setGameState(prev => ({ ...prev, qi: prev.qi + pwr }));
      };

      const handleBreakthrough = () => {
        if (Math.random() < 0.55) {
          setGameState(prev => {
            const nextRealm = prev.realmIndex + 1;
            return {
              ...prev, qi: 0, realmIndex: nextRealm, baseClickPower: Math.floor(prev.baseClickPower * 1.4),
              logs: [{ id: Date.now().toString(), text: `[Thành Công]: Vượt thiên kiếp, tiến cấp ${REALMS[nextRealm].name}!`, type: 'breakthrough', time: Date.now() }, ...prev.logs].slice(0, 30)
            };
          });
          setIsFlashing(true);
          setTimeout(() => setIsFlashing(false), 800);
        } else {
          setGameState(prev => ({
            ...prev, qi: prev.qi * 0.4,
            logs: [{ id: Date.now().toString(), text: `[Thiên Kiếp Tạch]: Đột phá thất bại, bị thiên lôi đánh tổn hại mất 60% Linh Khí!`, type: 'fail', time: Date.now() }, ...prev.logs].slice(0, 30)
          }));
        }
      };

      const handleReincarnate = () => {
        if (gameState.realmIndex < 9) return;
        const ptsGained = Math.floor(gameState.realmIndex);
        setGameState(prev => ({
          ...INITIAL_STATE,
          immortalPoints: (prev.immortalPoints || 0) + ptsGained,
          ownedGears: prev.ownedGears,
          equippedGearId: prev.equippedGearId,
          inventory: prev.inventory,
          equippedSkillId: prev.equippedSkillId,
          npcData: prev.npcData,
          joinedSectId: prev.joinedSectId,
          logs: [{ id: Date.now().toString(), text: `[Tái Sinh]: Chuyển thế thành công, nhận ${ptsGained} Điểm Trường Sinh.`, type: 'breakthrough', time: Date.now() }, ...prev.logs].slice(0, 30)
        }));
      };

      const buyItem = (itemId) => {
        setGameState(prev => {
          const item = SHOP_ITEMS.find(i => i.id === itemId);
          const count = prev.shopCounts[itemId] || 0;
          let cost = Math.floor(item.baseCost * Math.pow(1.6, count));
          if (prev.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);

          if (prev.qi >= cost) {
            return {
              ...prev, qi: prev.qi - cost, shopCounts: { ...prev.shopCounts, [itemId]: count + 1 },
              logs: [{ id: Date.now().toString(), text: `[Mua]: +1 ${item.name}`, type: 'shop', time: Date.now() }, ...prev.logs].slice(0, 30)
            };
          }
          return prev;
        });
      };

      const buyGear = (gear) => {
        setGameState(prev => {
          let cost = gear.cost;
          if (prev.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);

          if (prev.qi >= cost && !prev.ownedGears.includes(gear.id)) {
            return {
              ...prev, qi: prev.qi - cost, ownedGears: [...prev.ownedGears, gear.id],
              logs: [{ id: Date.now().toString(), text: `[Chợ Đen]: Mua thành công bảo vật ${gear.name} (${gear.tier})!`, type: 'shop', time: Date.now() }, ...prev.logs].slice(0, 30)
            };
          }
          return prev;
        });
      };

      const equipGear = (gearId) => {
        setGameState(prev => ({
          ...prev, equippedGearId: prev.equippedGearId === gearId ? null : gearId,
          logs: [{ id: Date.now().toString(), text: `[Trang Bị]: ${prev.equippedGearId === gearId ? 'Đã tháo trang bị.' : 'Đã trang bị pháp bảo mới!'}`, type: 'system', time: Date.now() }, ...prev.logs].slice(0, 30)
        }));
      };

      const attackMonster = (dmgMult = 1, skillType = 0) => {
        if (isDead) return;
        if (skillType === 1) setCdSkill1(5);
        if (skillType === 2) setCdSkill2(12);

        const monster = MONSTERS[currentMonsterIdx];
        let dmg = currentClickPower * dmgMult;
        if (gameState.joinedSectId === 'thien_dinh') dmg *= 1.3;

        const newMonsterHp = monsterHp - dmg;
        
        if (newMonsterHp <= 0) {
          setGameState(prev => ({
            ...prev, qi: prev.qi + monster.rewardQi,
            logs: [{ id: Date.now().toString(), text: `[Trảm Yêu]: Hạ ${monster.name}, cướp đoạt +${formatNumber(monster.rewardQi)} Qi!`, type: 'breakthrough', time: Date.now() }, ...prev.logs].slice(0, 30)
          }));
          setMonsterHp(monster.hp);
          setPlayerHp(maxPlayerHp);
        } else {
          setMonsterHp(newMonsterHp);
          const newPlayerHp = playerHp - monster.atk;
          if (newPlayerHp <= 0) {
            setPlayerHp(0);
            setIsDead(true);
            setGameState(prev => ({
              ...prev, logs: [{ id: Date.now().toString(), text: `[Trọng Thương]: Bị ${monster.name} đánh tơi bời phải quy ẩn hồi sức!`, type: 'fail', time: Date.now() }, ...prev.logs].slice(0, 30)
            }));
            setTimeout(() => { setPlayerHp(maxPlayerHp); setMonsterHp(monster.hp); setIsDead(false); }, 4000);
          } else {
            setPlayerHp(newPlayerHp);
          }
        }
      };

      const realm = REALMS[gameState.realmIndex];
      const isMaxRealm = gameState.realmIndex === REALMS.length - 1;
      const isBreakthrough = !isMaxRealm && gameState.qi >= realm.maxQi;
      
      let baseQpsCalc = SHOP_ITEMS.reduce((sum, item) => sum + (gameState.shopCounts[item.id] || 0) * item.qpsBonus, 0);
      if (gameState.equippedGearId) {
        const gear = BLACK_MARKET_GEARS.find(g => g.id === gameState.equippedGearId);
        if (gear) baseQpsCalc += gear.qpsBonus;
      }
      if (gameState.joinedSectId === 'dao_hoa') baseQpsCalc *= 1.5;
      const currentQps = baseQpsCalc * (1 + (gameState.immortalPoints || 0) * 0.5);

      const percent = isMaxRealm ? 100 : Math.min(100, (gameState.qi / realm.maxQi) * 100);
      const equippedBook = SKILL_BOOKS.find(b => b.id === gameState.equippedSkillId) || SKILL_BOOKS[0];

      const fullLeaderboard = useMemo(() => {
        const npcs = gameState.npcData || INITIAL_NPC_LEADERBOARD;
        const formattedNpcs = npcs.map(npc => ({ name: npc.name, realmIdx: npc.realmIdx, title: REALMS[Math.min(npc.realmIdx, REALMS.length - 1)].name, isPlayer: false }));
        const combined = [...formattedNpcs, { name: "BẠN", realmIdx: gameState.realmIndex, title: realm.name, isPlayer: true }];
        return combined.sort((a, b) => b.realmIdx - a.realmIdx);
      }, [gameState.npcData, gameState.realmIndex, realm.name]);

      return (
        <div className="min-h-screen relative flex flex-col font-sans overflow-x-hidden pb-6">
          <ParticleBackground />
          {isFlashing && <div className="fixed inset-0 bg-white z-[100] animate-flash pointer-events-none opacity-50" />}
          
          {clicks.map(click => (
            <div key={click.id} className="fixed pointer-events-none text-cyan-300 font-extrabold text-lg z-50 animate-float-fade" style={{ left: click.x, top: click.y }}>
              +{formatNumber(click.val)}
            </div>
          ))}

          {/* HEADER */}
          <header className="relative z-10 flex flex-col items-center justify-center p-3 border-b border-white/10 bg-black/60 backdrop-blur-md sticky top-0">
            <h1 className="font-serif text-xl sm:text-3xl font-bold tracking-widest text-yellow-400 uppercase text-center">{realm.name}</h1>
            <div className="flex items-center gap-2 text-[10px] sm:text-xs text-slate-400 font-mono mt-0.5">
              <span>Tầng {gameState.realmIndex + 1}/{REALMS.length} (Hardcore)</span>
              {gameState.joinedSectId && <span className="text-purple-400">| Tông: {SECTS.find(s=>s.id === gameState.joinedSectId)?.name}</span>}
            </div>
            
            <div className="w-full max-w-xs sm:max-w-md bg-black/80 h-3.5 rounded-full border border-green-500/30 overflow-hidden relative my-1.5">
              <div className="bg-gradient-to-r from-emerald-600 to-green-400 h-full transition-all duration-200" style={{ width: `${Math.max(0, (playerHp / maxPlayerHp) * 100)}%` }} />
              <div className="absolute inset-0 flex items-center justify-center text-[9px] font-mono font-bold text-white">❤️ HP: {playerHp}/{maxPlayerHp}</div>
            </div>

            <div className="text-lg sm:text-2xl font-mono text-cyan-400 font-bold">
              {formatNumber(gameState.qi)} <span className="text-slate-500 font-light text-sm">/</span> {isMaxRealm ? '∞' : formatNumber(realm.maxQi)}
            </div>
          </header>

          {/* MAIN CONTENT */}
          <main className="relative z-10 flex-1 w-full max-w-7xl mx-auto p-3 sm:p-4 grid grid-cols-1 lg:grid-cols-12 gap-4">
            
            {/* CỘT 1 */}
            <div className="col-span-1 lg:col-span-4 flex flex-col gap-3">
              <div className="bg-black/40 backdrop-blur-md rounded-xl border border-white/10 p-4 shadow-xl">
                <div className="flex justify-between items-center mb-2">
                  <span className="text-xs font-serif text-slate-300">TIẾN ĐỘ ĐỘT PHÁ</span>
                  <span className="text-xs font-mono font-bold text-cyan-400">{percent.toFixed(1)}%</span>
                </div>
                <div className="w-full h-2.5 rounded-full bg-black/60 overflow-hidden border border-white/10 mb-4">
                  <div className="h-full bg-gradient-to-r from-cyan-500 to-yellow-500 transition-all duration-300" style={{ width: `${percent}%` }} />
                </div>

                {isMaxRealm ? (
                  <div className="p-3 text-center border border-yellow-500/50 rounded-xl bg-yellow-500/10 text-yellow-400 font-serif text-sm">Đạo Tổ Vô Địch</div>
                ) : isBreakthrough ? (
                  <button onClick={handleBreakthrough} className="w-full py-4 text-sm sm:text-base font-bold font-serif rounded-xl breakthrough-pulse bg-black/80 cursor-pointer">
                    ⚡ ĐỘ KIẾP (55% Thành công) ⚡
                  </button>
                ) : (
                  <button onClick={handleCultivate} className="w-full py-5 text-lg font-bold font-serif text-cyan-400 border border-cyan-500/40 bg-cyan-500/10 active:bg-cyan-500/30 hover:bg-cyan-500/20 rounded-xl transition-all flex flex-col items-center justify-center gap-1 cursor-pointer">
                    <span>BẾ GIAO THU HOẠCH</span>
                    <span className="text-[10px] font-mono text-cyan-300 font-normal border border-cyan-500/30 px-2.5 py-0.5 rounded-full">
                      +{formatNumber(currentClickPower)} Qi/nhấn | +{formatNumber(currentQps)} Qi/s
                    </span>
                  </button>
                )}
              </div>

              {/* KHU VỰC TÔNG MÔN */}
              <div className="bg-black/40 backdrop-blur-md rounded-xl border border-white/10 p-4 shadow-xl">
                <h3 className="font-serif text-xs text-purple-400 mb-2 font-bold tracking-wider">THẾ LỰC TÔNG MÔN</h3>
                {gameState.joinedSectId ? (
                  <div className="flex flex-col gap-2">
                    <div className="p-2.5 rounded-lg border border-purple-500/30 bg-purple-500/10 flex justify-between items-center">
                      <div>
                        <div className="font-bold text-xs text-purple-300">{SECTS.find(s=>s.id===gameState.joinedSectId)?.name}</div>
                        <div className="text-[10px] text-slate-400">{SECTS.find(s=>s.id===gameState.joinedSectId)?.buff}</div>
                      </div>
                      <button onClick={()=>setGameState(prev=>({...prev, joinedSectId: null, logs: [{id:Date.now().toString(), text:'[Tông Môn]: Đã rời tông môn!', type:'fail', time:Date.now()}, ...prev.logs]}))} className="text-[10px] bg-red-500/20 text-red-300 px-2 py-1 rounded border border-red-500/30">Phản tông</button>
                    </div>
                  </div>
                ) : (
                  <div className="grid grid-cols-2 gap-2">
                    {SECTS.map(s => (
                      <button key={s.id} onClick={()=>setGameState(prev=>({...prev, joinedSectId: s.id, logs: [{id:Date.now().toString(), text:`[Gia Nhập]: Bái sư vào ${s.name}!`, type:'breakthrough', time:Date.now()}, ...prev.logs]}))} className="p-2 rounded-lg border border-white/10 bg-white/5 hover:bg-purple-500/20 hover:border-purple-500/40 text-left transition-all">
                        <div className="font-bold text-xs text-slate-200">{s.name}</div>
                        <div className="text-[9px] text-slate-400 line-clamp-1">{s.desc}</div>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* CỘT 2: TAB CHÍNH (SHOP, CHỢ ĐEN, TRẢM YÊU, BẢNG XẾP HẠNG) */}
            <div className="col-span-1 lg:col-span-8 flex flex-col gap-3">
              <div className="flex gap-1 bg-black/40 p-1 rounded-xl border border-white/10 overflow-x-auto no-scrollbar">
                {[
                  { id: 'shop', name: 'Đan Phác' },
                  { id: 'blackmarket', name: '🖤 Chợ Đen' },
                  { id: 'combat', name: '⚔️ Trảm Yêu' },
                  { id: 'leaderboard', name: '📜 Thiên Thư' }
                ].map(tab => (
                  <button key={tab.id} onClick={()=>setActiveTab(tab.id)} className={`flex-1 py-2 px-3 rounded-lg text-xs font-serif font-bold whitespace-nowrap transition-all ${activeTab === tab.id ? 'bg-cyan-500/20 text-cyan-300 border border-cyan-500/40' : 'text-slate-400 hover:text-white'}`}>
                    {tab.name}
                  </button>
                ))}
              </div>

              <div className="bg-black/40 backdrop-blur-md rounded-xl border border-white/10 p-4 shadow-xl min-h-[350px] max-h-[500px] overflow-y-auto no-scrollbar">
                
                {/* TAB SHOP */}
                {activeTab === 'shop' && (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {SHOP_ITEMS.map(item => {
                      const count = gameState.shopCounts[item.id] || 0;
                      let cost = Math.floor(item.baseCost * Math.pow(1.6, count));
                      if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);
                      return (
                        <div key={item.id} className="p-3 rounded-xl border border-white/10 bg-white/5 flex flex-col justify-between gap-2">
                          <div>
                            <div className="flex justify-between items-start">
                              <span className="font-bold text-xs text-slate-200">{item.name}</span>
                              <span className="text-[10px] font-mono text-cyan-400">Đã có: {count}</span>
                            </div>
                            <p className="text-[10px] text-slate-400 mt-0.5">{item.desc}</p>
                          </div>
                          <div className="flex justify-between items-center pt-2 border-t border-white/5">
                            <span className="text-xs font-mono text-yellow-400">{formatNumber(cost)} Qi</span>
                            <button onClick={()=>buyItem(item.id)} className="px-3 py-1 bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-300 border border-cyan-500/40 rounded-lg text-xs font-bold transition-all">Mua</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* TAB CHỢ ĐEN */}
                {activeTab === 'blackmarket' && (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {BLACK_MARKET_GEARS.map(gear => {
                      const isOwned = gameState.ownedGears.includes(gear.id);
                      const isEquipped = gameState.equippedGearId === gear.id;
                      let cost = gear.cost;
                      if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);

                      return (
                        <div key={gear.id} className={`p-3 rounded-xl border ${isEquipped ? 'border-yellow-500/60 bg-yellow-500/10' : 'border-white/10 bg-white/5'} flex flex-col justify-between gap-2`}>
                          <div>
                            <div className="flex justify-between items-start">
                              <span className={`font-bold text-xs ${gear.color}`}>{gear.name}</span>
                              <span className="text-[9px] px-2 py-0.5 rounded bg-black/50 border border-white/10 text-slate-300">{gear.tier}</span>
                            </div>
                            <div className="text-[10px] text-slate-400 mt-1">
                              {gear.clickBonus > 0 && <span>+{formatNumber(gear.clickBonus)} Click</span>}
                              {gear.qpsBonus > 0 && <span className="ml-2">+{formatNumber(gear.qpsBonus)} Qps</span>}
                            </div>
                          </div>
                          <div className="flex justify-between items-center pt-2 border-t border-white/5">
                            <span className="text-xs font-mono text-yellow-400">{isOwned ? 'Đã sở hữu' : `${formatNumber(cost)} Qi`}</span>
                            {isOwned ? (
                              <button onClick={()=>equipGear(gear.id)} className={`px-3 py-1 rounded-lg text-xs font-bold border transition-all ${isEquipped ? 'bg-red-500/20 text-red-300 border-red-500/40' : 'bg-green-500/20 text-green-300 border-green-500/40'}`}>
                                {isEquipped ? 'Tháo' : 'Trang Bị'}
                              </button>
                            ) : (
                              <button onClick={()=>buyGear(gear)} className="px-3 py-1 bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-300 border border-cyan-500/40 rounded-lg text-xs font-bold transition-all">Mua</button>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* TAB TRẢM YÊU */}
                {activeTab === 'combat' && (
                  <div className="flex flex-col gap-4 items-center justify-center py-2">
                    <div className="flex gap-2 overflow-x-auto w-full pb-2 no-scrollbar">
                      {MONSTERS.map((m, idx) => (
                        <button key={m.id} onClick={()=>{setCurrentMonsterIdx(idx); setMonsterHp(m.hp);}} className={`p-2 rounded-xl border flex flex-col items-center gap-1 min-w-[80px] ${currentMonsterIdx === idx ? 'border-cyan-400 bg-cyan-500/20' : 'border-white/10 bg-white/5'}`}>
                          <span className="text-xl">{m.icon}</span>
                          <span className="text-[10px] text-slate-300 font-bold">{m.name}</span>
                        </button>
                      ))}
                    </div>

                    <div className="w-full max-w-md p-4 rounded-xl border border-white/10 bg-white/5 flex flex-col items-center gap-3">
                      <div className="text-3xl">{MONSTERS[currentMonsterIdx].icon}</div>
                      <div className="font-serif font-bold text-sm text-yellow-400">{MONSTERS[currentMonsterIdx].name}</div>
                      <div className="w-full bg-black/80 h-3 rounded-full border border-red-500/30 overflow-hidden relative">
                        <div className="bg-gradient-to-r from-red-600 to-rose-400 h-full transition-all duration-200" style={{ width: `${Math.max(0, (monsterHp / MONSTERS[currentMonsterIdx].hp) * 100)}%` }} />
                        <div className="absolute inset-0 flex items-center justify-center text-[9px] font-mono font-bold text-white">HP: {monsterHp}/{MONSTERS[currentMonsterIdx].hp}</div>
                      </div>

                      <div className="grid grid-cols-3 gap-2 w-full mt-2">
                        <button disabled={isDead} onClick={()=>attackMonster(1, 0)} className="py-2.5 bg-cyan-500/20 hover:bg-cyan-500/30 border border-cyan-500/40 rounded-xl text-xs font-bold text-cyan-300 cursor-pointer">Chém Thường</button>
                        <button disabled={isDead || cdSkill1 > 0} onClick={()=>attackMonster(equippedBook.multiplier, 1)} className="py-2.5 bg-yellow-500/20 hover:bg-yellow-500/30 border border-yellow-500/40 rounded-xl text-xs font-bold text-yellow-300 cursor-pointer">
                          {cdSkill1 > 0 ? `CD (${cdSkill1}s)` : equippedBook.skillName}
                        </button>
                        <button disabled={isDead || cdSkill2 > 0} onClick={()=>attackMonster(25, 2)} className="py-2.5 bg-rose-500/20 hover:bg-rose-500/30 border border-rose-500/40 rounded-xl text-xs font-bold text-rose-300 cursor-pointer">
                          {cdSkill2 > 0 ? `CD (${cdSkill2}s)` : 'Tuyệt Kỹ'}
                        </button>
                      </div>
                      {isDead && <div className="text-xs text-red-400 animate-pulse font-mono">Đang trọng thương, hồi phục sau vài giây...</div>}
                    </div>
                  </div>
                )}

                {/* TAB BẢNG XẾP HẠNG */}
                {activeTab === 'leaderboard' && (
                  <div className="flex flex-col gap-1.5">
                    {fullLeaderboard.map((item, idx) => (
                      <div key={idx} className={`p-2.5 rounded-lg border flex justify-between items-center ${item.isPlayer ? 'border-yellow-500/50 bg-yellow-500/10 text-yellow-300' : 'border-white/10 bg-white/5 text-slate-300'}`}>
                        <div className="flex items-center gap-3">
                          <span className="font-mono text-xs font-bold w-5">#{idx + 1}</span>
                          <span className="text-xs font-bold">{item.name}</span>
                        </div>
                        <span className="text-[10px] font-mono px-2 py-0.5 rounded bg-black/40 border border-white/10">{item.title}</span>
                      </div>
                    ))}
                  </div>
                )}

              </div>
            </div>

          </main>

          {/* NHẬT KÝ HỆ THỐNG (LOGS) */}
          <footer className="relative z-10 w-full max-w-7xl mx-auto px-3 mt-2">
            <div className="bg-black/40 backdrop-blur-md rounded-xl border border-white/10 p-3 h-24 overflow-y-auto no-scrollbar font-mono text-[10px] flex flex-col gap-1">
              {gameState.logs.map(log => (
                <div key={log.id} className={`${log.type === 'breakthrough' ? 'text-yellow-400' : log.type === 'fail' ? 'text-red-400' : log.type === 'shop' ? 'text-green-400' : 'text-slate-400'}`}>
                  {log.text}
                </div>
              ))}
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
