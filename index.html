<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đại Đạo Tranh Phong - Tu Tiên Idle</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 25px rgba(168, 85, 247, 0.2), inset 0 0 15px rgba(6, 182, 212, 0.2); }
      50% { box-shadow: 0 0 45px rgba(168, 85, 247, 0.4), inset 0 0 25px rgba(6, 182, 212, 0.4); }
    }
    .sect-glow { animation: pulseGlow 4s infinite ease-in-out; }
  </style>
</head>
<body class="bg-[#050508] text-amber-50 min-h-screen font-sans selection:bg-purple-500 selection:text-white bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-purple-950/30 via-[#050508] to-black">
  <div id="root"></div>

  <script type="text/babel">
    const BIN_ID = "6a622390f5f4af5e29b6690d";
    const API_KEY = "$2a$10$GxWYKRP4h18Jqfy0NivGVufkdUfCApQGLYhaEMxs1S6bWwuYdlsZ.";

    async function fetchLeaderboard() {
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
          headers: { 'X-Master-Key': API_KEY }
        });
        const data = await res.json();
        return data.record?.leaderboard || [];
      } catch (e) {
        return [];
      }
    }

    async function updateLeaderboard(name, totalQi, realm) {
      try {
        let list = await fetchLeaderboard();
        const index = list.findIndex(item => item.name === name);
        if (index >= 0) {
          if (list[index].totalQi < totalQi) {
            list[index].totalQi = totalQi;
            list[index].realm = realm;
          }
        } else {
          list.push({ name, totalQi, realm });
        }
        list.sort((a, b) => b.totalQi - a.totalQi);
        list = list.slice(0, 10);

        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': API_KEY
          },
          body: JSON.stringify({ leaderboard: list })
        });
      } catch (e) {
        console.log("Lỗi đồng bộ mây");
      }
    }

    const REALMS = [
      // Phàm Nhân
      { name: "Phàm Nhân (Sơ Kỳ)", req: 0 },
      { name: "Phàm Nhân (Trung Kỳ)", req: 50 },
      { name: "Phàm Nhân (Hậu Kỳ)", req: 120 },
      { name: "Phàm Nhân (Viên Mãn)", req: 250 },
      // Luyện Khí Kỳ
      { name: "Luyện Khí Kỳ (Sơ Kỳ)", req: 500 },
      { name: "Luyện Khí Kỳ (Trung Kỳ)", req: 900 },
      { name: "Luyện Khí Kỳ (Hậu Kỳ)", req: 1500 },
      { name: "Luyện Khí Kỳ (Viên Mãn)", req: 2500 },
      // Trúc Cơ Kỳ
      { name: "Trúc Cơ Kỳ (Sơ Kỳ)", req: 4000 },
      { name: "Trúc Cơ Kỳ (Trung Kỳ)", req: 6500 },
      { name: "Trúc Cơ Kỳ (Hậu Kỳ)", req: 10000 },
      { name: "Trúc Cơ Kỳ (Viên Mãn)", req: 16000 },
      // Kim Đan Kỳ
      { name: "Kim Đan Kỳ (Sơ Kỳ)", req: 25000 },
      { name: "Kim Đan Kỳ (Trung Kỳ)", req: 40000 },
      { name: "Kim Đan Kỳ (Hậu Kỳ)", req: 65000 },
      { name: "Kim Đan Kỳ (Viên Mãn)", req: 100000 },
      // Nguyên Anh Kỳ
      { name: "Nguyên Anh Kỳ (Sơ Kỳ)", req: 160000 },
      { name: "Nguyên Anh Kỳ (Trung Kỳ)", req: 250000 },
      { name: "Nguyên Anh Kỳ (Hậu Kỳ)", req: 400000 },
      { name: "Nguyên Anh Kỳ (Viên Mãn)", req: 650000 },
      // Hóa Thần Kỳ
      { name: "Hóa Thần Kỳ (Sơ Kỳ)", req: 1000000 },
      { name: "Hóa Thần Kỳ (Trung Kỳ)", req: 1800000 },
      { name: "Hóa Thần Kỳ (Hậu Kỳ)", req: 3000000 },
      { name: "Hóa Thần Kỳ (Viên Mãn)", req: 5000000 },
      // Luyện Hư Kỳ
      { name: "Luyện Hư Kỳ (Sơ Kỳ)", req: 8000000 },
      { name: "Luyện Hư Kỳ (Trung Kỳ)", req: 13000000 },
      { name: "Luyện Hư Kỳ (Hậu Kỳ)", req: 21000000 },
      { name: "Luyện Hư Kỳ (Viên Mãn)", req: 35000000 },
      // Hợp Thể Kỳ
      { name: "Hợp Thể Kỳ (Sơ Kỳ)", req: 55000000 },
      { name: "Hợp Thể Kỳ (Trung Kỳ)", req: 85000000 },
      { name: "Hợp Thể Kỳ (Hậu Kỳ)", req: 130000000 },
      { name: "Hợp Thể Kỳ (Viên Mãn)", req: 200000000 },
      // Đại Thừa Kỳ
      { name: "Đại Thừa Kỳ (Sơ Kỳ)", req: 300000000 },
      { name: "Đại Thừa Kỳ (Trung Kỳ)", req: 450000000 },
      { name: "Đại Thừa Kỳ (Hậu Kỳ)", req: 700000000 },
      { name: "Đại Thừa Kỳ (Viên Mãn)", req: 1000000000 },
      // Độ Kiếp Kỳ
      { name: "Độ Kiếp Kỳ (Sơ Kỳ)", req: 1500000000 },
      { name: "Độ Kiếp Kỳ (Trung Kỳ)", req: 2200000000 },
      { name: "Độ Kiếp Kỳ (Hậu Kỳ)", req: 3200000000 },
      { name: "Độ Kiếp Kỳ (Viên Mãn)", req: 4500000000 },
      // Chân Tiên
      { name: "Chân Tiên (Sơ Kỳ)", req: 6000000000 },
      { name: "Chân Tiên (Trung Kỳ)", req: 8000000000 },
      { name: "Chân Tiên (Hậu Kỳ)", req: 11000000000 },
      { name: "Chân Tiên (Viên Mãn)", req: 15000000000 },
      // Kim Tiên
      { name: "Kim Tiên (Sơ Kỳ)", req: 20000000000 },
      { name: "Kim Tiên (Trung Kỳ)", req: 28000000000 },
      { name: "Kim Tiên (Hậu Kỳ)", req: 38000000000 },
      { name: "Kim Tiên (Viên Mãn)", req: 50000000000 },
      // Thái Ất Ngọc Tiên
      { name: "Thái Ất (Sơ Kỳ)", req: 70000000000 },
      { name: "Thái Ất (Trung Kỳ)", req: 95000000000 },
      { name: "Thái Ất (Hậu Kỳ)", req: 130000000000 },
      { name: "Thái Ất (Viên Mãn)", req: 180000000000 },
      // Đại罗 Tiên Tôn (Đại La)
      { name: "Đại La Tôn Giả (Sơ Kỳ)", req: 250000000000 },
      { name: "Đại La Tôn Giả (Trung Kỳ)", req: 350000000000 },
      { name: "Đại La Tôn Giả (Hậu Kỳ)", req: 500000000000 },
      { name: "Đại La Tôn Giả (Viên Mãn)", req: 700000000000 },
      // Tiên Vương / Tiên Đế
      { name: "Tiên Vương (Sơ Kỳ)", req: 1000000000000 },
      { name: "Tiên Đế (Viên Mãn)", req: 1500000000000 },
      // Đạo Tổ
      { name: "Đạo Tổ Cảnh", req: 3000000000000 }
    ];

    const SECTS = [
      { id: 'thanh_van', name: 'Thanh Vân Môn', buff: 'Tăng +20% Tốc độ Thu Thập', desc: 'Kiếm đạo chính phái, linh khí uy nghiêm.' },
      { id: 'am_duong', name: 'Âm Dương Cốc', buff: 'Giảm 20% Giá mua Đan Dược & Bảo Vật', desc: 'Hành sự cổ quái, pháp tắc huyền bí.' },
      { id: 'huyet_dao', name: 'Huyết Đao Môn', buff: 'Tăng +50% Sát thương Trảm Yêu', desc: 'Chuyên tu sát phạt, chiến lực kinh người.' }
    ];

    const SHOP_ITEMS = [
      { id: 'linh_thach', name: 'Tụ Linh Trận', baseCost: 50, qps: 5, desc: 'Tự động hấp thu linh khí vi mô từ hư không.' },
      { id: 'duoc_vien', name: 'Dược Viên Đan Dược', baseCost: 350, qps: 30, desc: 'Trồng linh dược ngàn năm luyện hóa đan dược.' },
      { id: 'linh_tuyen', name: 'Linh Tuyền Nhãn', baseCost: 1800, qps: 150, desc: 'Mạch nước ngầm tinh thuần đậm đặc linh khí.' }
    ];

    const BLACK_MARKET_GEARS = [
      { id: 'kiem_1', name: 'Thiết Kiếm Phàm Phí', tier: 'Phàm Phí', cost: 500, clickBonus: 5, qpsBonus: 0, color: 'text-slate-400' },
      { id: 'kiem_2', name: 'Thanh Cương Bảo Kiếm', tier: 'Hạ Phẩm', cost: 3000, clickBonus: 25, qpsBonus: 10, color: 'text-emerald-400' },
      { id: 'kiem_3', name: 'Phá Thiên Thần Kiếm', tier: 'Trung Phẩm', cost: 15000, clickBonus: 100, qpsBonus: 50, color: 'text-cyan-400' }
    ];

    const MONSTERS = [
      { id: 'yeu_thu', name: 'Yêu Lang Hoang Dã', hp: 100, reward: 50, icon: '🐺' },
      { id: 'quy_tuong', name: 'Quỷ Tướng Ngàn Năm', hp: 500, reward: 300, icon: '💀' },
      { id: 'giao_long', name: 'Giao Long Thượng Cổ', hp: 2500, reward: 1500, icon: '🐉' }
    ];

    const formatNumber = (num) => {
      if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
      if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
      return Math.floor(num).toString();
    };

    function App() {
      const [playerName] = React.useState(() => {
        const saved = localStorage.getItem('tu_tien_player_name');
        if (saved) return saved;
        const randomName = 'ĐạoHữu_' + Math.floor(Math.random() * 9000 + 1000);
        localStorage.setItem('tu_tien_player_name', randomName);
        return randomName;
      });

      const [gameState, setGameState] = React.useState({
        qi: 0,
        totalQi: 0,
        realmIdx: 0,
        joinedSectId: null,
        shopCounts: {},
        ownedGears: [],
        equippedGearId: null,
        logs: [{ id: '1', text: '[Đại Đạo]: Hệ thống cảnh giới từ Phàm Nhân đến Đạo Tổ đã được thiết lập!', type: 'breakthrough', time: Date.now() }]
      });

      const [activeTab, setActiveTab] = React.useState('shop');
      const [currentMonsterIdx, setCurrentMonsterIdx] = React.useState(0);
      const [monsterHp, setMonsterHp] = React.useState(MONSTERS[0].hp);
      const [isDead, setIsDead] = React.useState(false);
      const [cloudLeaderboard, setCloudLeaderboard] = React.useState([]);

      const clickPower = React.useMemo(() => {
        let base = 1;
        gameState.ownedGears.forEach(gearId => {
          const gear = BLACK_MARKET_GEARS.find(g => g.id === gearId);
          if (gear) base += gear.clickBonus;
        });
        return base;
      }, [gameState.ownedGears]);

      const qps = React.useMemo(() => {
        let total = 0;
        SHOP_ITEMS.forEach(item => {
          const count = gameState.shopCounts[item.id] || 0;
          total += count * item.qps;
        });
        if (gameState.joinedSectId === 'thanh_van') total *= 1.2;
        return total;
      }, [gameState.shopCounts, gameState.joinedSectId]);

      React.useEffect(() => {
        const interval = setInterval(() => {
          setGameState(prev => {
            const added = qps;
            if (added <= 0) return prev;
            return {
              ...prev,
              qi: prev.qi + added,
              totalQi: prev.totalQi + added
            };
          });
        }, 1000);
        return () => clearInterval(interval);
      }, [qps]);

      React.useEffect(() => {
        const syncToCloud = async () => {
          await updateLeaderboard(playerName, gameState.totalQi, REALMS[gameState.realmIdx].name);
        };
        const timer = setInterval(syncToCloud, 10000);
        return () => clearInterval(timer);
      }, [gameState.totalQi, gameState.realmIdx, playerName]);

      React.useEffect(() => {
        const loadLb = async () => {
          const data = await fetchLeaderboard();
          if (data && data.length > 0) setCloudLeaderboard(data);
        };
        loadLb();
        const timer = setInterval(loadLb, 15000);
        return () => clearInterval(timer);
      }, []);

      const handleTouchQi = () => {
        setGameState(prev => ({
          ...prev,
          qi: prev.qi + clickPower,
          totalQi: prev.totalQi + clickPower
        }));
      };

      const handleBreakthrough = () => {
        const nextRealm = REALMS[gameState.realmIdx + 1];
        if (!nextRealm) return;

        if (gameState.qi >= nextRealm.req) {
          setGameState(prev => {
            const newRealmIdx = prev.realmIdx + 1;
            updateLeaderboard(playerName, prev.totalQi, REALMS[newRealmIdx].name);
            return {
              ...prev,
              qi: prev.qi - nextRealm.req,
              realmIdx: newRealmIdx,
              logs: [
                { id: Date.now().toString(), text: `[Thiên Kiếp]: Lôi kiếp giáng lâm! Đạo hữu đã đột phá thành công lên ${nextRealm.name}!`, type: 'breakthrough', time: Date.now() },
                ...prev.logs
              ]
            };
          });
        } else {
          setGameState(prev => ({
            ...prev,
            logs: [
              { id: Date.now().toString(), text: `[Tâm Ma]: Linh khí bất túc, xung kích ${nextRealm.name} thất bại!`, type: 'fail', time: Date.now() },
              ...prev.logs
            ]
          }));
        }
      };

      const buyItem = (itemId) => {
        const item = SHOP_ITEMS.find(i => i.id === itemId);
        if (!item) return;
        const count = gameState.shopCounts[itemId] || 0;
        let cost = Math.floor(item.baseCost * Math.pow(1.6, count));
        if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);

        if (gameState.qi >= cost) {
          setGameState(prev => ({
            ...prev,
            qi: prev.qi - cost,
            shopCounts: { ...prev.shopCounts, [itemId]: count + 1 },
            logs: [
              { id: Date.now().toString(), text: `[Đan Phòng]: Mua thành công ${item.name}!`, type: 'shop', time: Date.now() },
              ...prev.logs
            ]
          }));
        }
      };

      const buyGear = (gear) => {
        let cost = gear.cost;
        if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);

        if (gameState.qi >= cost && !gameState.ownedGears.includes(gear.id)) {
          setGameState(prev => ({
            ...prev,
            qi: prev.qi - cost,
            ownedGears: [...prev.ownedGears, gear.id],
            equippedGearId: prev.equippedGearId || gear.id,
            logs: [
              { id: Date.now().toString(), text: `[Bảo Khố]: Thu phục thành công pháp bảo ${gear.name}!`, type: 'shop', time: Date.now() },
              ...prev.logs
            ]
          }));
        }
      };

      const equipGear = (gearId) => {
        setGameState(prev => ({
          ...prev,
          equippedGearId: prev.equippedGearId === gearId ? null : gearId
        }));
      };

      const attackMonster = (multiplier = 1) => {
        if (isDead) return;
        let dmg = clickPower * multiplier;
        if (gameState.joinedSectId === 'huyet_dao') dmg *= 1.5;

        const monster = MONSTERS[currentMonsterIdx];
        const nextHp = monsterHp - dmg;

        if (nextHp <= 0) {
          setGameState(prev => ({
            ...prev,
            qi: prev.qi + monster.reward,
            totalQi: prev.totalQi + monster.reward,
            logs: [
              { id: Date.now().toString(), text: `[Trảm Yêu]: Tiêu diệt ${monster.name}, cướp đoạt +${monster.reward} Linh Khí!`, type: 'breakthrough', time: Date.now() },
              ...prev.logs
            ]
          }));
          setIsDead(true);
          setTimeout(() => {
            setMonsterHp(MONSTERS[currentMonsterIdx].hp);
            setIsDead(false);
          }, 3000);
        } else {
          setMonsterHp(nextHp);
        }
      };

      const nextRealmObj = REALMS[gameState.realmIdx + 1];
      const progressPercent = nextRealmObj ? Math.min(100, (gameState.qi / nextRealmObj.req) * 100) : 100;
      const equippedBook = BLACK_MARKET_GEARS.find(g => g.id === gameState.equippedGearId) || { multiplier: 3, name: 'Kiếm Khí' };

      const fullLeaderboard = cloudLeaderboard.length > 0 ? cloudLeaderboard.map(item => ({
        ...item,
        isPlayer: item.name === playerName,
        title: item.realm || 'Phàm Nhân'
      })) : [{ name: playerName, totalQi: gameState.totalQi, realm: REALMS[gameState.realmIdx].name, isPlayer: true, title: REALMS[gameState.realmIdx].name }];

      return (
        <div className="flex flex-col min-h-screen p-4 max-w-7xl mx-auto gap-4">
          <header className="sect-glow bg-[#100c1c]/80 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-5 flex flex-col md:flex-row justify-between items-center gap-4 shadow-2xl relative overflow-hidden">
            <div className="absolute -top-12 -left-12 w-32 h-32 bg-purple-600/10 rounded-full blur-2xl pointer-events-none"></div>
            <div className="flex items-center gap-3">
              <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-600 to-indigo-800 flex items-center justify-center border border-purple-400/40 text-xl shadow-inner">🧘‍♂️</div>
              <div>
                <div className="text-[11px] font-mono text-cyan-400 tracking-wider uppercase">Đạo Hữu: <span className="text-amber-200 font-bold">{playerName}</span></div>
                <h1 className="text-xl md:text-2xl font-serif font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-purple-300 to-cyan-300">
                  {REALMS[gameState.realmIdx].name}
                </h1>
              </div>
            </div>

            <div className="flex items-center gap-6 font-mono bg-black/40 px-5 py-2.5 rounded-xl border border-white/10">
              <div className="flex flex-col items-end">
                <span className="text-slate-400 text-[10px]">Linh Khí (Qi)</span>
                <span className="text-amber-400 font-bold text-base">{formatNumber(gameState.qi)}</span>
              </div>
              <div className="w-[1px] h-8 bg-white/10"></div>
              <div className="flex flex-col items-end">
                <span className="text-slate-400 text-[10px]">Tốc Độ Tụ Khí (x5)</span>
                <span className="text-cyan-400 font-bold text-base">+{formatNumber(qps)}/s</span>
              </div>
            </div>
          </header>

          <main className="grid grid-cols-1 lg:grid-cols-12 gap-4 flex-1">
            <div className="col-span-1 lg:col-span-4 flex flex-col gap-4">
              <div className="bg-[#100c1c]/80 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-6 shadow-2xl flex flex-col items-center justify-center gap-5 relative">
                <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-purple-500/5 via-transparent to-transparent pointer-events-none"></div>
                
                <button 
                  onClick={handleTouchQi}
                  className="relative w-44 h-44 rounded-full bg-gradient-to-br from-purple-900/40 via-indigo-950/60 to-slate-900 border-2 border-purple-500/50 hover:border-cyan-400 hover:scale-105 active:scale-95 transition-all shadow-[0_0_40px_rgba(168,85,247,0.2)] flex flex-col items-center justify-center gap-1.5 cursor-pointer group">
                  <span className="text-4xl group-hover:scale-110 transition-transform">🌌</span>
                  <span className="font-serif font-bold text-sm tracking-wider text-amber-200">HẤP THU LINH KHÍ</span>
                  <span className="text-[11px] font-mono text-cyan-300">+{clickPower} Qi / Nhấn</span>
                </button>

                <div className="w-full flex flex-col gap-2 mt-2">
                  <div className="flex justify-between text-xs font-mono text-slate-300">
                    <span className="text-purple-300">Tiến Cảnh Giới</span>
                    <span className="text-amber-300">{nextRealmObj ? `${formatNumber(gameState.qi)} / ${formatNumber(nextRealmObj.req)}` : 'Đã Đạt Đạo Tổ Cảnh'}</span>
                  </div>
                  <div className="w-full bg-black/60 h-3 rounded-full border border-purple-500/30 overflow-hidden p-0.5">
                    <div className="bg-gradient-to-r from-purple-600 via-indigo-500 to-cyan-400 h-full rounded-full transition-all duration-300 shadow-[0_0_10px_rgba(6,182,212,0.5)]" style={{ width: `${progressPercent}%` }} />
                  </div>
                  <button 
                    onClick={handleBreakthrough}
                    className="mt-2 w-full py-3 bg-gradient-to-r from-purple-700/40 to-indigo-700/40 hover:from-purple-600/60 hover:to-indigo-600/60 border border-purple-400/40 rounded-xl text-xs font-serif font-bold text-amber-200 tracking-widest transition-all shadow-lg cursor-pointer">
                    ⚡ XUNG KÍCH ĐỘT PHÁ
                  </button>
                </div>
              </div>

              <div className="bg-[#100c1c]/80 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-5 shadow-2xl">
                <h3 className="font-serif text-xs text-amber-300 mb-3 font-bold tracking-widest flex items-center gap-2">
                  <span>🏛️</span> TÔNG MÔN THẾ LỰC
                </h3>
                {gameState.joinedSectId ? (
                  <div className="p-3 rounded-xl border border-purple-500/40 bg-purple-950/30 flex justify-between items-center">
                    <div>
                      <div className="font-bold text-xs text-amber-200 font-serif">{SECTS.find(s=>s.id===gameState.joinedSectId)?.name}</div>
                      <div className="text-[10px] text-cyan-300 mt-0.5">{SECTS.find(s=>s.id===gameState.joinedSectId)?.buff}</div>
                    </div>
                    <button onClick={()=>setGameState(prev=>({...prev, joinedSectId: null, logs: [{id:Date.now().toString(), text:'[Tông Môn]: Đã phản tông, tự lập môn hộ!', type:'fail', time:Date.now()}, ...prev.logs]}))} className="text-[10px] bg-red-500/20 hover:bg-red-500/30 text-red-300 px-2.5 py-1.5 rounded-lg border border-red-500/40 transition-all cursor-pointer font-mono">Phản Tông</button>
                  </div>
                ) : (
                  <div className="grid grid-cols-1 gap-2">
                    {SECTS.map(s => (
                      <button key={s.id} onClick={()=>setGameState(prev=>({...prev, joinedSectId: s.id, logs: [{id:Date.now().toString(), text:`[Bái Sư]: Thành công gia nhập ${s.name}!`, type:'breakthrough', time:Date.now()}, ...prev.logs]}))} className="p-2.5 rounded-xl border border-white/10 bg-white/5 hover:bg-purple-900/30 hover:border-purple-500/40 text-left transition-all cursor-pointer group">
                        <div className="font-bold text-xs text-amber-100 group-hover:text-amber-300">{s.name}</div>
                        <div className="text-[10px] text-cyan-400/80">{s.buff}</div>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>

            <div className="col-span-1 lg:col-span-8 flex flex-col gap-4">
              <div className="flex gap-1.5 bg-[#100c1c]/80 p-1.5 rounded-2xl border border-purple-500/30 overflow-x-auto no-scrollbar shadow-xl">
                {[
                  { id: 'shop', name: '💊 Đan Phòng & Trận Pháp' },
                  { id: 'blackmarket', name: '🖤 Chợ Đen Pháp Bảo' },
                  { id: 'combat', name: '⚔️ Trảm Yêu Thử Luyện' },
                  { id: 'leaderboard', name: '📜 Thiên Thư Bảng' }
                ].map(tab => (
                  <button key={tab.id} onClick={()=>setActiveTab(tab.id)} className={`flex-1 py-2.5 px-4 rounded-xl text-xs font-serif font-bold whitespace-nowrap transition-all cursor-pointer ${activeTab === tab.id ? 'bg-gradient-to-r from-purple-700/60 to-indigo-700/60 text-amber-200 border border-purple-400/50 shadow-lg' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                    {tab.name}
                  </button>
                ))}
              </div>

              <div className="bg-[#100c1c]/80 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-5 shadow-2xl min-h-[380px] max-h-[500px] overflow-y-auto no-scrollbar">
                {activeTab === 'shop' && (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {SHOP_ITEMS.map(item => {
                      const count = gameState.shopCounts[item.id] || 0;
                      let cost = Math.floor(item.baseCost * Math.pow(1.6, count));
                      if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);
                      return (
                        <div key={item.id} className="p-4 rounded-xl border border-purple-500/20 bg-purple-950/20 flex flex-col justify-between gap-3 hover:border-purple-500/40 transition-all">
                          <div>
                            <div className="flex justify-between items-start">
                              <span className="font-serif font-bold text-xs text-amber-200">{item.name}</span>
                              <span className="text-[10px] font-mono px-2 py-0.5 rounded bg-black/50 border border-purple-500/30 text-cyan-300">Sở hữu: {count}</span>
                            </div>
                            <p className="text-[11px] text-slate-300 mt-1 leading-relaxed">{item.desc} <span className="text-cyan-300 font-mono font-bold">(+{item.qps}/s)</span></p>
                          </div>
                          <div className="flex justify-between items-center pt-2.5 border-t border-purple-500/20">
                            <span className="text-xs font-mono text-amber-400 font-bold">{formatNumber(cost)} Qi</span>
                            <button onClick={()=>buyItem(item.id)} className="px-3.5 py-1.5 bg-purple-600/30 hover:bg-purple-600/50 text-purple-200 border border-purple-400/40 rounded-lg text-xs font-bold transition-all cursor-pointer shadow-md">Đổi Lấy</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {activeTab === 'blackmarket' && (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {BLACK_MARKET_GEARS.map(gear => {
                      const isOwned = gameState.ownedGears.includes(gear.id);
                      const isEquipped = gameState.equippedGearId === gear.id;
                      let cost = gear.cost;
                      if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);

                      return (
                        <div key={gear.id} className={`p-4 rounded-xl border ${isEquipped ? 'border-amber-400/80 bg-amber-500/10' : 'border-purple-500/20 bg-purple-950/20'} flex flex-col justify-between gap-3`}>
                          <div>
                            <div className="flex justify-between items-start">
                              <span className={`font-serif font-bold text-xs ${gear.color}`}>{gear.name}</span>
                              <span className="text-[10px] px-2 py-0.5 rounded bg-black/60 border border-white/10 text-slate-300">{gear.tier}</span>
                            </div>
                            <div className="text-[11px] font-mono text-cyan-300 mt-1.5 flex gap-3">
                              {gear.clickBonus > 0 && <span>+{formatNumber(gear.clickBonus)} Click</span>}
                              {gear.qpsBonus > 0 && <span>+{formatNumber(gear.qpsBonus)} Qps</span>}
                            </div>
                          </div>
                          <div className="flex justify-between items-center pt-2.5 border-t border-purple-500/20">
                            <span className="text-xs font-mono text-amber-400 font-bold">{isOwned ? 'Đã Thu Phục' : `${formatNumber(cost)} Qi`}</span>
                            {isOwned ? (
                              <button onClick={()=>equipGear(gear.id)} className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all cursor-pointer ${isEquipped ? 'bg-red-500/20 text-red-300 border-red-500/40' : 'bg-emerald-500/20 text-emerald-300 border-emerald-500/40'}`}>
                                {isEquipped ? 'Thu Hồi' : 'Sử Dụng'}
                              </button>
                            ) : (
                              <button onClick={()=>buyGear(gear)} className="px-3.5 py-1.5 bg-purple-600/30 hover:bg-purple-600/50 text-purple-200 border border-purple-400/40 rounded-lg text-xs font-bold transition-all cursor-pointer shadow-md">Mua Lại</button>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {activeTab === 'combat' && (
                  <div className="flex flex-col gap-4 items-center justify-center py-2">
                    <div className="flex gap-2.5 overflow-x-auto w-full pb-2 no-scrollbar justify-center">
                      {MONSTERS.map((m, idx) => (
                        <button key={m.id} onClick={()=>{setCurrentMonsterIdx(idx); setMonsterHp(m.hp);}} className={`p-3 rounded-xl border flex flex-col items-center gap-1.5 min-w-[100px] cursor-pointer transition-all ${currentMonsterIdx === idx ? 'border-amber-400 bg-amber-500/10 shadow-[0_0_15px_rgba(251,191,36,0.2)]' : 'border-purple-500/20 bg-purple-950/20'}`}>
                          <span className="text-2xl">{m.icon}</span>
                          <span className="text-[11px] text-amber-100 font-serif font-bold text-center">{m.name}</span>
                        </button>
                      ))}
                    </div>

                    <div className="w-full max-w-md p-5 rounded-2xl border border-purple-500/30 bg-black/50 flex flex-col items-center gap-4 relative overflow-hidden shadow-inner">
                      <div className="text-4xl animate-pulse">{MONSTERS[currentMonsterIdx].icon}</div>
                      <div className="font-serif font-bold text-sm text-amber-200 tracking-wider">{MONSTERS[currentMonsterIdx].name}</div>
                      <div className="w-full bg-black/80 h-3.5 rounded-full border border-red-500/40 overflow-hidden relative p-0.5">
                        <div className="bg-gradient-to-r from-red-600 via-rose-500 to-amber-500 h-full rounded-full transition-all duration-200 shadow-[0_0_10px_rgba(239,68,68,0.5)]" style={{ width: `${Math.max(0, (monsterHp / MONSTERS[currentMonsterIdx].hp) * 100)}%` }} />
                        <div className="absolute inset-0 flex items-center justify-center text-[10px] font-mono font-bold text-white drop-shadow">HP: {monsterHp} / {MONSTERS[currentMonsterIdx].hp}</div>
                      </div>

                      <div className="grid grid-cols-2 gap-3 w-full mt-2">
                        <button disabled={isDead} onClick={()=>attackMonster(1)} className="py-3 bg-purple-700/30 hover:bg-purple-700/50 border border-purple-400/40 rounded-xl text-xs font-serif font-bold text-purple-200 cursor-pointer shadow-md transition-all">⚔️ Xuất Kiếm</button>
                        <button disabled={isDead} onClick={()=>attackMonster(equippedBook.multiplier || 3)} className="py-3 bg-amber-600/30 hover:bg-amber-600/50 border border-amber-400/40 rounded-xl text-xs font-serif font-bold text-amber-200 cursor-pointer shadow-md transition-all">✨ {equippedBook.name || 'Kiếm Khí'}</button>
                      </div>
                      {isDead && <div className="text-xs text-red-400 animate-pulse font-mono tracking-wider">Yêu thú đã ngã xuống, đang ngưng tụ lại...</div>}
                    </div>
                  </div>
                )}

                {activeTab === 'leaderboard' && (
                  <div className="flex flex-col gap-2">
                    <div className="text-[11px] text-cyan-300 font-mono mb-1 flex items-center gap-1.5">
                      <span>🌐</span> Bảng xếp hạng đồng bộ trực tuyến thời gian thực qua JSONBin
                    </div>
                    {fullLeaderboard.map((item, idx) => (
                      <div key={idx} className={`p-3 rounded-xl border flex justify-between items-center transition-all ${item.isPlayer ? 'border-amber-400/60 bg-amber-500/10 shadow-[0_0_15px_rgba(251,191,36,0.1)]' : 'border-purple-500/20 bg-purple-950/20'}`}>
                        <div className="flex items-center gap-3.5">
                          <span className={`font-mono text-xs font-bold w-6 text-center ${idx === 0 ? 'text-amber-400 text-sm' : idx === 1 ? 'text-slate-300' : idx === 2 ? 'text-amber-600' : 'text-slate-500'}`}>#{idx + 1}</span>
                          <span className="text-xs font-serif font-bold text-amber-100">{item.name}</span>
                        </div>
                        <div className="flex items-center gap-3">
                          <span className="text-xs font-mono text-amber-400 font-bold">{formatNumber(item.totalQi || 0)} Qi</span>
                          <span className="text-[10px] font-mono px-2.5 py-1 rounded-lg bg-black/50 border border-purple-500/30 text-purple-300">{item.title}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </main>

          <footer className="w-full">
            <div className="bg-[#100c1c]/80 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-4 h-28 overflow-y-auto no-scrollbar font-mono text-[11px] flex flex-col gap-1.5 shadow-2xl">
              <div className="text-purple-400 font-bold mb-0.5 tracking-wider uppercase text-[10px]">📜 Nhật Ký Tu Chân Thiên Đạo</div>
              {gameState.logs.map(log => (
                <div key={log.id} className={`${log.type === 'breakthrough' ? 'text-amber-300 font-bold' : log.type === 'fail' ? 'text-red-400' : log.type === 'shop' ? 'text-emerald-300' : 'text-slate-300'}`}>
                  {log.text}
                </div>
              ))}
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
