<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đại Đạo Tranh Phong - Tu Tiên Idle (Kiếp Phạt Tranh Đoạt)</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 25px rgba(168, 85, 247, 0.2), inset 0 0 15px rgba(6, 182, 212, 0.2); }
      50% { box-shadow: 0 0 45px rgba(168, 85, 247, 0.4), inset 0 0 25px rgba(6, 182, 212, 0.4); }
    }
    @keyframes tribPulse {
      0%, 100% { border-color: rgba(239, 68, 68, 0.6); box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
      50% { border-color: rgba(251, 191, 36, 0.9); box-shadow: 0 0 35px rgba(251, 191, 36, 0.6); }
    }
    .sect-glow { animation: pulseGlow 4s infinite ease-in-out; }
    .tribulation-banner { animation: tribPulse 2s infinite ease-in-out; }
  </style>
</head>
<body class="bg-[#050508] text-amber-50 min-h-screen font-sans selection:bg-purple-500 selection:text-white bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-purple-950/30 via-[#050508] to-black">
  <div id="root"></div>

  <script type="text/babel">
    const BIN_ID = "6a622390f5f4af5e29b6690d";
    const API_KEY = "$2a$10$GxWYKRP4h18Jqfy0NivGVufkdUfCApQGLYhaEMxs1S6bWwuYdlsZ.";

    async function fetchCloudData() {
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
          headers: { 'X-Master-Key': API_KEY }
        });
        const data = await res.json();
        return data.record || { leaderboard: [], customSects: [], activeTribulations: {} };
      } catch (e) {
        return { leaderboard: [], customSects: [], activeTribulations: {} };
      }
    }

    async function updateCloudData(newData) {
      try {
        const current = await fetchCloudData();
        const merged = { ...current, ...newData };
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'X-Master-Key': API_KEY
          },
          body: JSON.stringify(merged)
        });
      } catch (e) {
        console.log("Lỗi đồng bộ mây");
      }
    }

    const REALMS = [
      { name: "Phàm Nhân (Sơ Kỳ)", req: 0, isMajor: false },
      { name: "Phàm Nhân (Trung Kỳ)", req: 50, isMajor: false },
      { name: "Phàm Nhân (Hậu Kỳ)", req: 120, isMajor: false },
      { name: "Phàm Nhân (Viên Mãn)", req: 250, isMajor: false },
      { name: "Luyện Khí Kỳ (Sơ Kỳ)", req: 500, isMajor: true }, // Mốc lớn
      { name: "Luyện Khí Kỳ (Trung Kỳ)", req: 900, isMajor: false },
      { name: "Luyện Khí Kỳ (Hậu Kỳ)", req: 1500, isMajor: false },
      { name: "Luyện Khí Kỳ (Viên Mãn)", req: 2500, isMajor: false },
      { name: "Trúc Cơ Kỳ (Sơ Kỳ)", req: 4000, isMajor: true }, // Mốc lớn
      { name: "Trúc Cơ Kỳ (Trung Kỳ)", req: 6500, isMajor: false },
      { name: "Trúc Cơ Kỳ (Hậu Kỳ)", req: 10000, isMajor: false },
      { name: "Trúc Cơ Kỳ (Viên Mãn)", req: 16000, isMajor: false },
      { name: "Kim Đan Kỳ (Sơ Kỳ)", req: 25000, isMajor: true }, // Mốc lớn
      { name: "Kim Đan Kỳ (Trung Kỳ)", req: 40000, isMajor: false },
      { name: "Kim Đan Kỳ (Hậu Kỳ)", req: 65000, isMajor: false },
      { name: "Kim Đan Kỳ (Viên Mãn)", req: 100000, isMajor: false },
      { name: "Nguyên Anh Kỳ (Sơ Kỳ)", req: 160000, isMajor: true },
      { name: "Nguyên Anh Kỳ (Trung Kỳ)", req: 250000, isMajor: false },
      { name: "Nguyên Anh Kỳ (Hậu Kỳ)", req: 400000, isMajor: false },
      { name: "Nguyên Anh Kỳ (Viên Mãn)", req: 650000, isMajor: false },
      { name: "Hóa Thần Kỳ (Sơ Kỳ)", req: 1000000, isMajor: true },
      { name: "Hóa Thần Kỳ (Trung Kỳ)", req: 1800000, isMajor: false },
      { name: "Hóa Thần Kỳ (Hậu Kỳ)", req: 3000000, isMajor: false },
      { name: "Hóa Thần Kỳ (Viên Mãn)", req: 5000000, isMajor: false },
      { name: "Đạo Tổ Cảnh", req: 10000000, isMajor: true }
    ];

    const DEFAULT_SECTS = [
      { id: 'thanh_van', name: 'Thanh Vân Môn', buff: 'Tăng +20% Tốc độ Thu Thập', desc: 'Kiếm đạo chính phái, linh khí uy nghiêm.', founder: 'Hệ Thống' },
      { id: 'am_duong', name: 'Âm Dương Cốc', buff: 'Giảm 20% Giá mua Đan Dược & Bảo Vật', desc: 'Hành sự cổ quái, pháp tắc huyền bí.', founder: 'Hệ Thống' },
      { id: 'huyet_dao', name: 'Huyết Đao Môn', buff: 'Tăng +50% Sát thương Trảm Yêu & Phá Trận', desc: 'Chuyên tu sát phạt, chiến lực kinh người.', founder: 'Hệ Thống' }
    ];

    const SHOP_ITEMS = [
      { id: 'linh_thach', name: 'Tụ Linh Trận', baseCost: 50, qps: 5, desc: 'Tự động hấp thu linh khí vi mô từ hư không.' },
      { id: 'duoc_vien', name: 'Dược Viên Đan Dược', baseCost: 350, qps: 30, desc: 'Trồng linh dược ngàn năm luyện hóa đan dược.' },
      { id: 'linh_tuyen', name: 'Linh Tuyền Nhãn', baseCost: 1800, qps: 150, desc: 'Mạch nước ngầm tinh thuần đậm đặc linh khí.' }
    ];

    const BLACK_MARKET_GEARS = [
      { id: 'kiem_1', name: 'Thiết Kiếm Phàm Phí', tier: 'Phàm Phí', cost: 500, clickBonus: 5, qpsBonus: 0, color: 'text-slate-400' },
      { id: 'kiem_2', name: 'Thanh Cương Bảo Kiếm', tier: 'Hạ Phẩm', cost: 3000, clickBonus: 25, qpsBonus: 10, color: 'text-emerald-400' },
      { id: 'kiem_3', name: 'Phá Thiên Thần Kiếm', tier: 'Trung Phẩm', cost: 15000, clickBonus: 100, qpsBonus: 50, color: 'text-cyan-400' }
    ];

    const MONSTERS = [
      { id: 'yeu_thu', name: 'Yêu Lang Hoang Dã', hp: 100, reward: 50, icon: '🐺' },
      { id: 'quy_tuong', name: 'Quỷ Tướng Ngàn Năm', hp: 500, reward: 300, icon: '💀' },
      { id: 'giao_long', name: 'Giao Long Thượng Cổ', hp: 2500, reward: 1500, icon: '🐉' }
    ];

    const formatNumber = (num) => {
      if (num >= 1e12) return (num / 1e12).toFixed(2) + 'T';
      if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
      return Math.floor(num).toString();
    };

    function App() {
      const [playerName] = React.useState(() => {
        const saved = localStorage.getItem('tu_tien_player_name');
        if (saved) return saved;
        const randomName = 'ĐạoHữu_' + Math.floor(Math.random() * 9000 + 1000);
        localStorage.setItem('tu_tien_player_name', randomName);
        return randomName;
      });

      const [gameState, setGameState] = React.useState(() => {
        try {
          const savedState = localStorage.getItem('tu_tien_game_state_v3');
          if (savedState) return JSON.parse(savedState);
        } catch (e) {}
        return {
          qi: 0,
          totalQi: 0,
          realmIdx: 0,
          joinedSectId: 'thanh_van',
          shopCounts: {},
          ownedGears: [],
          equippedGearId: null,
          logs: [{ id: '1', text: '[Đại Đạo]: Hệ thống lôi kiếp tranh đoạt đã kích hoạt!', type: 'breakthrough', time: Date.now() }]
        };
      });

      React.useEffect(() => {
        try {
          localStorage.setItem('tu_tien_game_state_v3', JSON.stringify(gameState));
        } catch (e) {}
      }, [gameState]);

      const [activeTab, setActiveTab] = React.useState('shop');
      const [currentMonsterIdx, setCurrentMonsterIdx] = React.useState(0);
      const [monsterHp, setMonsterHp] = React.useState(MONSTERS[0].hp);
      const [isDead, setIsDead] = React.useState(false);
      const [cloudLeaderboard, setCloudLeaderboard] = React.useState([]);
      const [cloudCustomSects, setCloudCustomSects] = React.useState([]);
      const [activeTribulations, setActiveTribulations] = React.useState({});
      
      // Trạng thái khi chính mình đang độ kiếp mốc lớn
      const [myTribulation, setMyTribulation] = React.useState(null); // { targetRealm, hp, maxHp, endTime }

      const [newSectName, setNewSectName] = React.useState('');
      const [newSectDesc, setNewSectDesc] = React.useState('');

      const clickPower = React.useMemo(() => {
        let base = 1;
        gameState.ownedGears.forEach(gearId => {
          const gear = BLACK_MARKET_GEARS.find(g => g.id === gearId);
          if (gear) base += gear.clickBonus;
        });
        return base;
      }, [gameState.ownedGears]);

      const qps = React.useMemo(() => {
        let total = 0;
        SHOP_ITEMS.forEach(item => {
          const count = gameState.shopCounts[item.id] || 0;
          total += count * item.qps;
        });
        if (gameState.joinedSectId === 'thanh_van') total *= 1.2;
        return total;
      }, [gameState.shopCounts, gameState.joinedSectId]);

      // Tụ khí mỗi giây
      React.useEffect(() => {
        const interval = setInterval(() => {
          setGameState(prev => {
            const added = qps;
            if (added <= 0) return prev;
            return { ...prev, qi: prev.qi + added, totalQi: prev.totalQi + added };
          });
        }, 1000);
        return () => clearInterval(interval);
      }, [qps]);

      // Đồng bộ cloud liên tục (Bảng xếp hạng & Lôi kiếp đang diễn ra)
      React.useEffect(() => {
        const syncCloud = async () => {
          const data = await fetchCloudData();
          
          // 1. Cập nhật bảng xếp hạng
          let list = data.leaderboard || [];
          const index = list.findIndex(item => item.name === playerName);
          if (index >= 0) {
            if (list[index].totalQi < gameState.totalQi) {
              list[index].totalQi = gameState.totalQi;
              list[index].realm = REALMS[gameState.realmIdx].name;
            }
          } else {
            list.push({ name: playerName, totalQi: gameState.totalQi, realm: REALMS[gameState.realmIdx].name });
          }
          list.sort((a, b) => b.totalQi - a.totalQi);
          list = list.slice(0, 10);

          // 2. Đồng bộ lôi kiếp của chính mình nếu đang độ kiếp
          let tribs = data.activeTribulations || {};
          if (myTribulation) {
            tribs[playerName] = {
              targetRealm: myTribulation.targetRealm,
              hp: myTribulation.hp,
              maxHp: myTribulation.maxHp,
              endTime: myTribulation.endTime
            };
          } else {
            // Nếu hết thời gian hoặc hoàn thành, xóa tên mình khỏi danh sách lôi kiếp trên cloud
            if (tribs[playerName]) {
              delete tribs[playerName];
            }
          }

          // Dọn dẹp các lôi kiếp đã hết giờ ở các người chơi khác
          const now = Date.now();
          Object.keys(tribs).forEach(pKey => {
            if (tribs[pKey].endTime < now || tribs[pKey].hp <= 0) {
              delete tribs[pKey];
            }
          });

          await updateCloudData({ leaderboard: list, activeTribulations: tribs });
          setActiveTribulations(tribs);
          if (data.customSects) setCloudCustomSects(data.customSects);
          if (data.leaderboard) setCloudLeaderboard(data.leaderboard);
        };

        syncCloud();
        const timer = setInterval(syncCloud, 4000);
        return () => clearInterval(timer);
      }, [gameState.totalQi, gameState.realmIdx, playerName, myTribulation]);

      // Xử lý đếm ngược độ kiếp của bản thân
      React.useEffect(() => {
        if (!myTribulation) return;
        const timer = setInterval(() => {
          const now = Date.now();
          if (now >= myTribulation.endTime || myTribulation.hp <= 0) {
            // Hết giờ hoặc còn máu -> Kiểm tra kết quả
            if (myTribulation.hp > 0) {
              // Hộ đạo thành công / Vượt qua lôi kiếp!
              const nextRealm = REALMS[gameState.realmIdx + 1];
              setGameState(prev => ({
                ...prev,
                qi: prev.qi - nextRealm.req,
                realmIdx: prev.realmIdx + 1,
                logs: [
                  { id: Date.now().toString(), text: `[Độ Kiếp Thành Công]: Chống chịu thiên kiếp, bước chân vào ${nextRealm.name}!`, type: 'breakthrough', time: Date.now() },
                  ...prev.logs
                ]
              }));
            } else {
              // Bị phá nát độ kiếp -> Thất bại
              setGameState(prev => ({
                ...prev,
                logs: [
                  { id: Date.now().toString(), text: `[Thiên Kiếp Thất Bại]: Bị ngoại lực công phá hoặc chống đỡ không nổi, độ kiếp tiêu tan!`, type: 'fail', time: Date.now() },
                  ...prev.logs
                ]
              }));
            }
            setMyTribulation(null);
          }
        }, 1000);
        return () => clearInterval(timer);
      }, [myTribulation, gameState.realmIdx]);

      const handleBreakthrough = () => {
        const nextRealm = REALMS[gameState.realmIdx + 1];
        if (!nextRealm) return;

        if (gameState.qi >= nextRealm.req) {
          if (nextRealm.isMajor) {
            // Nếu là mốc lớn (Luyện Khí, Trúc Cơ, Kim Đan...): Kích hoạt Lôi Kiếp Realtime cho mọi người thấy!
            setMyTribulation({
              targetRealm: nextRealm.name,
              hp: 500, // Thanh máu độ kiếp cần bảo vệ
              maxHp: 500,
              endTime: Date.now() + 20000 // 20 giây sinh tử
            });
            setGameState(prev => ({
              ...prev,
              logs: [
                { id: Date.now().toString(), text: `[Thiên Kiếp Giáng Lâm]: Đạo hữu bắt đầu độ kiếp lên ${nextRealm.name}! Cần bảo vệ pháp trận trong 20 giây!`, type: 'breakthrough', time: Date.now() },
                ...prev.logs
              ]
            }));
          } else {
            // Cảnh giới nhỏ đột phá ngay lập tức
            setGameState(prev => ({
              ...prev,
              qi: prev.qi - nextRealm.req,
              realmIdx: prev.realmIdx + 1,
              logs: [
                { id: Date.now().toString(), text: `[Đột Phá]: Thành công tiến cấp lên ${nextRealm.name}!`, type: 'breakthrough', time: Date.now() },
                ...prev.logs
              ]
            }));
          }
        } else {
          setGameState(prev => ({
            ...prev,
            logs: [
              { id: Date.now().toString(), text: `[Tâm Ma]: Linh khí bất túc, xung kích ${nextRealm.name} thất bại!`, type: 'fail', time: Date.now() },
              ...prev.logs
            ]
          }));
        }
      };

      // Tương tác với Lôi Kiếp của người chơi khác (Bảo Vệ hoặc Tấn Công)
      const interactTribulation = async (targetPlayerName, actionType) => {
        const data = await fetchCloudData();
        let tribs = data.activeTribulations || {};
        if (!tribs[targetPlayerName]) {
          alert("Lôi kiếp của đạo hữu này đã kết thúc hoặc không tồn tại!");
          return;
        }

        let power = clickPower;
        if (actionType === 'attack' && gameState.joinedSectId === 'huyet_dao') power *= 1.5;

        if (actionType === 'protect') {
          tribs[targetPlayerName].hp = Math.min(tribs[targetPlayerName].maxHp, tribs[targetPlayerName].hp + power * 5);
          setGameState(prev => ({
            ...prev,
            logs: [{ id: Date.now().toString(), text: `[Hộ Đạo]: Ra tay tương trợ, hồi phục +${power * 5} HP độ kiếp cho ${targetPlayerName}!`, type: 'shop', time: Date.now() }, ...prev.logs]
          }));
        } else {
          tribs[targetPlayerName].hp = Math.max(0, tribs[targetPlayerName].hp - power * 5);
          setGameState(prev => ({
            ...prev,
            logs: [{ id: Date.now().toString(), text: `[Phá Trận]: Công kích lôi kiếp của ${targetPlayerName}, gây ra -${power * 5} HP!`, type: 'fail', time: Date.now() }, ...prev.logs]
          }));
        }

        await updateCloudData({ activeTribulations: tribs });
        setActiveTribulations(tribs);
      };

      const buyItem = (itemId) => {
        const item = SHOP_ITEMS.find(i => i.id === itemId);
        if (!item) return;
        const count = gameState.shopCounts[itemId] || 0;
        let cost = Math.floor(item.baseCost * Math.pow(1.6, count));
        if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);

        if (gameState.qi >= cost) {
          setGameState(prev => ({
            ...prev,
            qi: prev.qi - cost,
            shopCounts: { ...prev.shopCounts, [itemId]: count + 1 },
            logs: [{ id: Date.now().toString(), text: `[Đan Phòng]: Mua thành công ${item.name}!`, type: 'shop', time: Date.now() }, ...prev.logs]
          }));
        }
      };

      const buyGear = (gear) => {
        let cost = gear.cost;
        if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);

        if (gameState.qi >= cost && !gameState.ownedGears.includes(gear.id)) {
          setGameState(prev => ({
            ...prev,
            qi: prev.qi - cost,
            ownedGears: [...prev.ownedGears, gear.id],
            equippedGearId: prev.equippedGearId || gear.id,
            logs: [{ id: Date.now().toString(), text: `[Bảo Khố]: Thu phục thành công pháp bảo ${gear.name}!`, type: 'shop', time: Date.now() }, ...prev.logs]
          }));
        }
      };

      const equipGear = (gearId) => {
        setGameState(prev => ({
          ...prev,
          equippedGearId: prev.equippedGearId === gearId ? null : gearId
        }));
      };

      const attackMonster = (multiplier = 1) => {
        if (isDead) return;
        let dmg = clickPower * multiplier;
        if (gameState.joinedSectId === 'huyet_dao') dmg *= 1.5;

        const monster = MONSTERS[currentMonsterIdx];
        const nextHp = monsterHp - dmg;

        if (nextHp <= 0) {
          setGameState(prev => ({
            ...prev,
            qi: prev.qi + monster.reward,
            totalQi: prev.totalQi + monster.reward,
            logs: [{ id: Date.now().toString(), text: `[Trảm Yêu]: Tiêu diệt ${monster.name}, cướp đoạt +${monster.reward} Linh Khí!`, type: 'breakthrough', time: Date.now() }, ...prev.logs]
          }));
          setIsDead(true);
          setTimeout(() => {
            setMonsterHp(MONSTERS[currentMonsterIdx].hp);
            setIsDead(false);
          }, 3000);
        } else {
          setMonsterHp(nextHp);
        }
      };

      const handleCreateSect = async (e) => {
        e.preventDefault();
        if (!newSectName.trim()) return;
        if (gameState.realmIdx < 8) {
          alert("Cần đạt cảnh giới Trúc Cơ Kỳ (Sơ Kỳ) trở lên mới có thể khai sơn lập phái!");
          return;
        }

        const newSect = {
          id: 'custom_' + Date.now(),
          name: newSectName.trim(),
          buff: 'Tăng +30% Tốc độ Thu Thập & Chiến Lực',
          desc: newSectDesc.trim() || 'Tông môn tự lập của đại năng.',
          founder: playerName
        };

        const currentData = await fetchCloudData();
        const updatedSects = [...(currentData.customSects || []), newSect];
        await updateCloudData({ customSects: updatedSects });

        setCloudCustomSects(updatedSects);
        setGameState(prev => ({
          ...prev,
          joinedSectId: newSect.id,
          logs: [{ id: Date.now().toString(), text: `[Khai Sơn]: Đạo hữu đã thành công khai lập tông môn "${newSect.name}"!`, type: 'breakthrough', time: Date.now() }, ...prev.logs]
        }));
        setNewSectName('');
        setNewSectDesc('');
      };

      const allSects = [...DEFAULT_SECTS, ...cloudCustomSects];
      const currentJoinedSect = allSects.find(s => s.id === gameState.joinedSectId) || DEFAULT_SECTS[0];

      const nextRealmObj = REALMS[gameState.realmIdx + 1];
      const progressPercent = nextRealmObj ? Math.min(100, (gameState.qi / nextRealmObj.req) * 100) : 100;
      const equippedBook = BLACK_MARKET_GEARS.find(g => g.id === gameState.equippedGearId) || { multiplier: 3, name: 'Kiếm Khí' };

      const fullLeaderboard = cloudLeaderboard.length > 0 ? cloudLeaderboard.map(item => ({
        ...item,
        isPlayer: item.name === playerName,
        title: item.realm || 'Phàm Nhân'
      })) : [{ name: playerName, totalQi: gameState.totalQi, realm: REALMS[gameState.realmIdx].name, isPlayer: true, title: REALMS[gameState.realmIdx].name }];

      return (
        <div className="flex flex-col min-h-screen p-4 max-w-7xl mx-auto gap-4">
          <header className="sect-glow bg-[#100c1c]/85 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-5 flex flex-col md:flex-row justify-between items-center gap-4 shadow-2xl relative overflow-hidden">
            <div className="absolute -top-12 -left-12 w-32 h-32 bg-purple-600/10 rounded-full blur-2xl pointer-events-none"></div>
            <div className="flex items-center gap-3">
              <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-600 to-indigo-800 flex items-center justify-center border border-purple-400/40 text-xl shadow-inner">🧘‍♂️</div>
              <div>
                <div className="text-[11px] font-mono text-cyan-400 tracking-wider uppercase">Đạo Hữu: <span className="text-amber-200 font-bold">{playerName}</span></div>
                <h1 className="text-xl md:text-2xl font-serif font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-purple-300 to-cyan-300">
                  {REALMS[gameState.realmIdx]?.name || "Phàm Nhân (Sơ Kỳ)"}
                </h1>
              </div>
            </div>

            <div className="flex items-center gap-6 font-mono bg-black/40 px-5 py-2.5 rounded-xl border border-white/10">
              <div className="flex flex-col items-end">
                <span className="text-slate-400 text-[10px]">Linh Khí (Qi)</span>
                <span className="text-amber-400 font-bold text-base">{formatNumber(gameState.qi)}</span>
              </div>
              <div className="w-[1px] h-8 bg-white/10"></div>
              <div className="flex flex-col items-end">
                <span className="text-slate-400 text-[10px]">Tốc Độ Tụ Khí</span>
                <span className="text-cyan-400 font-bold text-base">+{formatNumber(qps)}/s</span>
              </div>
            </div>
          </header>

          {/* KHU VỰC THÔNG BÁO LÔI KIẾP REALTIME (NẾU CÓ NGƯỜI ĐỘ KIẾP) */}
          {Object.keys(activeTribulations).length > 0 && (
            <div className="flex flex-col gap-2">
              {Object.entries(activeTribulations).map(([pName, trib]) => (
                <div key={pName} className="tribulation-banner bg-[#1a0808]/90 backdrop-blur-xl border-2 rounded-2xl p-4 flex flex-col md:flex-row justify-between items-center gap-4 shadow-2xl">
                  <div className="flex items-center gap-3">
                    <span className="text-3xl animate-bounce">⚡</span>
                    <div>
                      <div className="text-xs font-mono text-red-400 font-bold uppercase tracking-wider">Kênh Thiên Kiếp Cảnh</div>
                      <div className="text-amber-200 font-serif font-bold text-sm">
                        Đạo hữu <span className="text-cyan-300">{pName}</span> đang độ kiếp lên <span className="text-amber-400">{trib.targetRealm}</span>!
                      </div>
                    </div>
                  </div>

                  <div className="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto">
                    {/* Thanh máu độ kiếp */}
                    <div className="w-full sm:w-48 bg-black/70 h-4 rounded-full border border-red-500/50 overflow-hidden relative p-0.5">
                      <div className="bg-gradient-to-r from-red-600 via-orange-500 to-amber-500 h-full rounded-full transition-all duration-300" style={{ width: `${Math.max(0, (trib.hp / trib.maxHp) * 100)}%` }} />
                      <div className="absolute inset-0 flex items-center justify-center text-[10px] font-mono font-bold text-white drop-shadow">HP: {Math.floor(trib.hp)} / {trib.maxHp}</div>
                    </div>

                    {/* Nút hành động Hộ Đạo / Tấn Công */}
                    {pName !== playerName ? (
                      <div className="flex gap-2 w-full sm:w-auto">
                        <button onClick={() => interactTribulation(pName, 'protect')} className="flex-1 sm:flex-none px-3 py-1.5 bg-emerald-600/30 hover:bg-emerald-600/50 border border-emerald-400/40 rounded-xl text-xs font-serif font-bold text-emerald-200 transition-all cursor-pointer shadow">
                          🛡️ Hộ Đạo
                        </button>
                        <button onClick={() => interactTribulation(pName, 'attack')} className="flex-1 sm:flex-none px-3 py-1.5 bg-red-600/30 hover:bg-red-600/50 border border-red-400/40 rounded-xl text-xs font-serif font-bold text-red-200 transition-all cursor-pointer shadow">
                          ⚔️ Phá Trận
                        </button>
                      </div>
                    ) : (
                      <span className="text-xs font-mono text-amber-300 animate-pulse">(Độ kiếp của chính bạn!)</span>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}

          <main className="grid grid-cols-1 lg:grid-cols-12 gap-4 flex-1">
            <div className="col-span-1 lg:col-span-4 flex flex-col gap-4">
              <div className="bg-[#100c1c]/85 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-6 shadow-2xl flex flex-col items-center justify-center gap-5 relative">
                <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-purple-500/5 via-transparent to-transparent pointer-events-none"></div>
                
                <button 
                  onClick={() => {
                    setGameState(prev => ({
                      ...prev,
                      qi: prev.qi + clickPower,
                      totalQi: prev.totalQi + clickPower
                    }));
                  }}
                  className="relative w-44 h-44 rounded-full bg-gradient-to-br from-purple-900/40 via-indigo-950/60 to-slate-900 border-2 border-purple-500/50 hover:border-cyan-400 hover:scale-105 active:scale-95 transition-all shadow-[0_0_40px_rgba(168,85,247,0.2)] flex flex-col items-center justify-center gap-1.5 cursor-pointer group">
                  <span className="text-4xl group-hover:scale-110 transition-transform">🌌</span>
                  <span className="font-serif font-bold text-sm tracking-wider text-amber-200">HẤP THU LINH KHÍ</span>
                  <span className="text-[11px] font-mono text-cyan-300">+{clickPower} Qi / Nhấn</span>
                </button>

                <div className="w-full flex flex-col gap-2 mt-2">
                  <div className="flex justify-between text-xs font-mono text-slate-300">
                    <span className="text-purple-300">Tiến Cảnh Giới</span>
                    <span className="text-amber-300">{nextRealmObj ? `${formatNumber(gameState.qi)} / ${formatNumber(nextRealmObj.req)}` : 'Đã Đạt Đạo Tổ Cảnh'}</span>
                  </div>
                  <div className="w-full bg-black/60 h-3 rounded-full border border-purple-500/30 overflow-hidden p-0.5">
                    <div className="bg-gradient-to-r from-purple-600 via-indigo-500 to-cyan-400 h-full rounded-full transition-all duration-300 shadow-[0_0_10px_rgba(6,182,212,0.5)]" style={{ width: `${progressPercent}%` }} />
                  </div>
                  
                  {myTribulation ? (
                    <div className="mt-2 w-full py-3 bg-red-950/50 border border-red-500/50 rounded-xl text-xs font-serif font-bold text-red-300 text-center animate-pulse">
                      ⚡ ĐANG CHỐNG CHỊU THIÊN KIẾP... ({Math.floor((myTribulation.endTime - Date.now())/1000)}s)
                    </div>
                  ) : (
                    <button 
                      onClick={handleBreakthrough}
                      className="mt-2 w-full py-3 bg-gradient-to-r from-purple-700/40 to-indigo-700/40 hover:from-purple-600/60 hover:to-indigo-600/60 border border-purple-400/40 rounded-xl text-xs font-serif font-bold text-amber-200 tracking-widest transition-all shadow-lg cursor-pointer">
                      ⚡ XUNG KÍCH ĐỘT PHÁ {nextRealmObj?.isMajor ? '(Mốc Lớn)' : ''}
                    </button>
                  )}
                </div>
              </div>

              <div className="bg-[#100c1c]/85 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-5 shadow-2xl flex flex-col gap-2">
                <h3 className="font-serif text-xs text-amber-300 font-bold tracking-widest flex items-center gap-2">
                  <span>🏛️</span> TÔNG MÔN HIỆN TẠI
                </h3>
                <div className="p-3 rounded-xl border border-purple-500/40 bg-purple-950/30 flex flex-col gap-1">
                  <div className="font-bold text-xs text-amber-200 font-serif">{currentJoinedSect.name}</div>
                  <div className="text-[10px] text-cyan-300">{currentJoinedSect.buff}</div>
                  <div className="text-[9px] text-slate-400 font-mono">Sáng lập: {currentJoinedSect.founder || 'Hệ Thống'}</div>
                </div>
              </div>
            </div>

            <div className="col-span-1 lg:col-span-8 flex flex-col gap-4">
              <div className="flex gap-1.5 bg-[#100c1c]/85 p-1.5 rounded-2xl border border-purple-500/30 overflow-x-auto no-scrollbar shadow-xl">
                {[
                  { id: 'shop', name: '💊 Đan Phòng & Trận Pháp' },
                  { id: 'blackmarket', name: '🖤 Chợ Đen Pháp Bảo' },
                  { id: 'combat', name: '⚔️ Trảm Yêu Thử Luyện' },
                  { id: 'sect', name: '⛩️ Vạn Đạo Tông Môn' },
                  { id: 'leaderboard', name: '📜 Thiên Thư Bảng' }
                ].map(tab => (
                  <button key={tab.id} onClick={()=>setActiveTab(tab.id)} className={`flex-1 py-2.5 px-4 rounded-xl text-xs font-serif font-bold whitespace-nowrap transition-all cursor-pointer ${activeTab === tab.id ? 'bg-gradient-to-r from-purple-700/60 to-indigo-700/60 text-amber-200 border border-purple-400/50 shadow-lg' : 'text-slate-400 hover:text-white hover:bg-white/5'}`}>
                    {tab.name}
                  </button>
                ))}
              </div>

              <div className="bg-[#100c1c]/85 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-5 shadow-2xl min-h-[380px] max-h-[500px] overflow-y-auto no-scrollbar">
                {activeTab === 'shop' && (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {SHOP_ITEMS.map(item => {
                      const count = gameState.shopCounts[item.id] || 0;
                      let cost = Math.floor(item.baseCost * Math.pow(1.6, count));
                      if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);
                      return (
                        <div key={item.id} className="p-4 rounded-xl border border-purple-500/20 bg-purple-950/20 flex flex-col justify-between gap-3 hover:border-purple-500/40 transition-all">
                          <div>
                            <div className="flex justify-between items-start">
                              <span className="font-serif font-bold text-xs text-amber-200">{item.name}</span>
                              <span className="text-[10px] font-mono px-2 py-0.5 rounded bg-black/50 border border-purple-500/30 text-cyan-300">Sở hữu: {count}</span>
                            </div>
                            <p className="text-[11px] text-slate-300 mt-1 leading-relaxed">{item.desc} <span className="text-cyan-300 font-mono font-bold">(+{item.qps}/s)</span></p>
                          </div>
                          <div className="flex justify-between items-center pt-2.5 border-t border-purple-500/20">
                            <span className="text-xs font-mono text-amber-400 font-bold">{formatNumber(cost)} Qi</span>
                            <button onClick={()=>buyItem(item.id)} className="px-3.5 py-1.5 bg-purple-600/30 hover:bg-purple-600/50 text-purple-200 border border-purple-400/40 rounded-lg text-xs font-bold transition-all cursor-pointer shadow-md">Đổi Lấy</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {activeTab === 'blackmarket' && (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {BLACK_MARKET_GEARS.map(gear => {
                      const isOwned = gameState.ownedGears.includes(gear.id);
                      const isEquipped = gameState.equippedGearId === gear.id;
                      let cost = gear.cost;
                      if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);

                      return (
                        <div key={gear.id} className={`p-4 rounded-xl border ${isEquipped ? 'border-amber-400/80 bg-amber-500/10' : 'border-purple-500/20 bg-purple-950/20'} flex flex-col justify-between gap-3`}>
                          <div>
                            <div className="flex justify-between items-start">
                              <span className={`font-serif font-bold text-xs ${gear.color}`}>{gear.name}</span>
                              <span className="text-[10px] px-2 py-0.5 rounded bg-black/60 border border-white/10 text-slate-300">{gear.tier}</span>
                            </div>
                            <div className="text-[11px] font-mono text-cyan-300 mt-1.5 flex gap-3">
                              {gear.clickBonus > 0 && <span>+{formatNumber(gear.clickBonus)} Click</span>}
                              {gear.qpsBonus > 0 && <span>+{formatNumber(gear.qpsBonus)} Qps</span>}
                            </div>
                          </div>
                          <div className="flex justify-between items-center pt-2.5 border-t border-purple-500/20">
                            <span className="text-xs font-mono text-amber-400 font-bold">{isOwned ? 'Đã Thu Phục' : `${formatNumber(cost)} Qi`}</span>
                            {isOwned ? (
                              <button onClick={()=>equipGear(gear.id)} className={`px-3 py-1.5 rounded-lg text-xs font-bold border transition-all cursor-pointer ${isEquipped ? 'bg-red-500/20 text-red-300 border-red-500/40' : 'bg-emerald-500/20 text-emerald-300 border-emerald-500/40'}`}>
                                {isEquipped ? 'Thu Hồi' : 'Sử Dụng'}
                              </button>
                            ) : (
                              <button onClick={()=>buyGear(gear)} className="px-3.5 py-1.5 bg-purple-600/30 hover:bg-purple-600/50 text-purple-200 border border-purple-400/40 rounded-lg text-xs font-bold transition-all cursor-pointer shadow-md">Mua Lại</button>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {activeTab === 'combat' && (
                  <div className="flex flex-col gap-4 items-center justify-center py-2">
                    <div className="flex gap-2.5 overflow-x-auto w-full pb-2 no-scrollbar justify-center">
                      {MONSTERS.map((m, idx) => (
                        <button key={m.id} onClick={()=>{setCurrentMonsterIdx(idx); setMonsterHp(m.hp);}} className={`p-3 rounded-xl border flex flex-col items-center gap-1.5 min-w-[100px] cursor-pointer transition-all ${currentMonsterIdx === idx ? 'border-amber-400 bg-amber-500/10 shadow-[0_0_15px_rgba(251,191,36,0.2)]' : 'border-purple-500/20 bg-purple-950/20'}`}>
                          <span className="text-2xl">{m.icon}</span>
                          <span className="text-[11px] text-amber-100 font-serif font-bold text-center">{m.name}</span>
                        </button>
                      ))}
                    </div>

                    <div className="w-full max-w-md p-5 rounded-2xl border border-purple-500/30 bg-black/50 flex flex-col items-center gap-4 relative overflow-hidden shadow-inner">
                      <div className="text-4xl animate-pulse">{MONSTERS[currentMonsterIdx].icon}</div>
                      <div className="font-serif font-bold text-sm text-amber-200 tracking-wider">{MONSTERS[currentMonsterIdx].name}</div>
                      <div className="w-full bg-black/80 h-3.5 rounded-full border border-red-500/40 overflow-hidden relative p-0.5">
                        <div className="bg-gradient-to-r from-red-600 via-rose-500 to-amber-500 h-full rounded-full transition-all duration-200 shadow-[0_0_10px_rgba(239,68,68,0.5)]" style={{ width: `${Math.max(0, (monsterHp / MONSTERS[currentMonsterIdx].hp) * 100)}%` }} />
                        <div className="absolute inset-0 flex items-center justify-center text-[10px] font-mono font-bold text-white drop-shadow">HP: {monsterHp} / {MONSTERS[currentMonsterIdx].hp}</div>
                      </div>

                      <div className="grid grid-cols-2 gap-3 w-full mt-2">
                        <button disabled={isDead} onClick={()=>attackMonster(1)} className="py-3 bg-purple-700/30 hover:bg-purple-700/50 border border-purple-400/40 rounded-xl text-xs font-serif font-bold text-purple-200 cursor-pointer shadow-md transition-all">⚔️ Xuất Kiếm</button>
                        <button disabled={isDead} onClick={()=>attackMonster(equippedBook.multiplier || 3)} className="py-3 bg-amber-600/30 hover:bg-amber-600/50 border border-amber-400/40 rounded-xl text-xs font-serif font-bold text-amber-200 cursor-pointer shadow-md transition-all">✨ {equippedBook.name || 'Kiếm Khí'}</button>
                      </div>
                      {isDead && <div className="text-xs text-red-400 animate-pulse font-mono tracking-wider">Yêu thú đã ngã xuống, đang ngưng tụ lại...</div>}
                    </div>
                  </div>
                )}

                {activeTab === 'sect' && (
                  <div className="flex flex-col gap-5">
                    {gameState.realmIdx >= 8 && (
                      <form onSubmit={handleCreateSect} className="p-4 rounded-xl border border-amber-500/30 bg-amber-500/5 flex flex-col gap-3">
                        <div className="font-serif font-bold text-xs text-amber-300 flex items-center gap-1.5">
                          <span>✨</span> Khai Sơn Lập Phái (Yêu cầu: Trúc Cơ Kỳ Sơ Kỳ+)
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                          <input 
                            type="text" 
                            placeholder="Tên Tông Môn (VD: Nghịch Thiên Tông)" 
                            value={newSectName}
                            onChange={(e)=>setNewSectName(e.target.value)}
                            className="bg-black/60 border border-purple-500/30 rounded-xl px-3 py-2 text-xs text-amber-100 focus:outline-none focus:border-amber-400 font-mono"
                          />
                          <input 
                            type="text" 
                            placeholder="Mô tả / Slogan tông môn" 
                            value={newSectDesc}
                            onChange={(e)=>setNewSectDesc(e.target.value)}
                            className="bg-black/60 border border-purple-500/30 rounded-xl px-3 py-2 text-xs text-amber-100 focus:outline-none focus:border-amber-400 font-mono"
                          />
                        </div>
                        <button type="submit" className="py-2.5 bg-gradient-to-r from-amber-600/40 to-purple-600/40 hover:from-amber-600/60 hover:to-purple-600/60 border border-amber-400/40 rounded-xl text-xs font-serif font-bold text-amber-200 transition-all cursor-pointer shadow-md">
                          🏛️ Xác Nhận Khai Sơn
                        </button>
                      </form>
                    )}

                    <div className="flex flex-col gap-2.5">
                      <div className="text-[11px] text-cyan-300 font-mono flex items-center gap-1.5">
                        <span>🌐</span> Danh sách Tông Môn trên đại lục (Mọi cảnh giới đều có thể bái nhập tự do)
                      </div>
                      {allSects.map(s => {
                        const isJoined = gameState.joinedSectId === s.id;
                        return (
                          <div key={s.id} className={`p-4 rounded-xl border flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 transition-all ${isJoined ? 'border-amber-400/80 bg-amber-500/10 shadow-[0_0_15px_rgba(251,191,36,0.15)]' : 'border-purple-500/20 bg-purple-950/20'}`}>
                            <div>
                              <div className="flex items-center gap-2">
                                <span className="font-serif font-bold text-xs text-amber-200">{s.name}</span>
                                <span className="text-[9px] font-mono px-2 py-0.5 rounded bg-black/60 border border-white/10 text-slate-300">Sáng lập: {s.founder || 'Hệ Thống'}</span>
                              </div>
                              <p className="text-[11px] text-cyan-300 mt-1">{s.buff}</p>
                              <p className="text-[10px] text-slate-400 mt-0.5">{s.desc}</p>
                            </div>
                            <button 
                              onClick={()=>setGameState(prev=>({...prev, joinedSectId: s.id, logs: [{id:Date.now().toString(), text:`[Bái Sư]: Thành công gia nhập ${s.name}!`, type:'breakthrough', time:Date.now()}, ...prev.logs]}))}
                              className={`px-4 py-2 rounded-xl text-xs font-serif font-bold transition-all cursor-pointer border whitespace-nowrap ${isJoined ? 'bg-amber-500/20 text-amber-300 border-amber-400/40 shadow-md' : 'bg-purple-600/20 hover:bg-purple-600/40 text-purple-200 border-purple-400/30'}`}>
                              {isJoined ? 'Đang Nhập Môn' : 'Bái Sư Nhập Môn'}
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {activeTab === 'leaderboard' && (
                  <div className="flex flex-col gap-2">
                    <div className="text-[11px] text-cyan-300 font-mono mb-1 flex items-center gap-1.5">
                      <span>🌐</span> Bảng xếp hạng đồng bộ trực tuyến thời gian thực qua JSONBin
                    </div>
                    {fullLeaderboard.map((item, idx) => (
                      <div key={idx} className={`p-3 rounded-xl border flex justify-between items-center transition-all ${item.isPlayer ? 'border-amber-400/60 bg-amber-500/10 shadow-[0_0_15px_rgba(251,191,36,0.1)]' : 'border-purple-500/20 bg-purple-950/20'}`}>
                        <div className="flex items-center gap-3.5">
                          <span className={`font-mono text-xs font-bold w-6 text-center ${idx === 0 ? 'text-amber-400 text-sm' : idx === 1 ? 'text-slate-300' : idx === 2 ? 'text-amber-600' : 'text-slate-500'}`}>#{idx + 1}</span>
                          <span className="text-xs font-serif font-bold text-amber-100">{item.name}</span>
                        </div>
                        <div className="flex items-center gap-3">
                          <span className="text-xs font-mono text-amber-400 font-bold">{formatNumber(item.totalQi || 0)} Qi</span>
                          <span className="text-[10px] font-mono px-2.5 py-1 rounded-lg bg-black/50 border border-purple-500/30 text-purple-300">{item.title}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </main>

          <footer className="w-full">
            <div className="bg-[#100c1c]/85 backdrop-blur-xl border border-purple-500/30 rounded-2xl p-4 h-28 overflow-y-auto no-scrollbar font-mono text-[11px] flex flex-col gap-1.5 shadow-2xl">
              <div className="text-purple-400 font-bold mb-0.5 tracking-wider uppercase text-[10px]">📜 Nhật Ký Tu Chân Thiên Đạo</div>
              {gameState.logs.map(log => (
                <div key={log.id} className={`${log.type === 'breakthrough' ? 'text-amber-300 font-bold' : log.type === 'fail' ? 'text-red-400' : log.type === 'shop' ? 'text-emerald-300' : 'text-slate-300'}`}>
                  {log.text}
                </div>
              ))}
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
