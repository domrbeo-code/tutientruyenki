<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu Tiên Giả - Idle Clicker</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel để dịch JSX trực tiếp trên trình duyệt -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase SDKs (Compat version cho dễ tích hợp trực tiếp) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    /* Ẩn thanh cuộn nhưng vẫn scroll được */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans selection:bg-cyan-500 selection:text-white">
  <div id="root"></div>

  <script type="text/babel">
    // --- CẤU HÌNH FIREBASE ---
    // (Ông có thể thay thế bằng config từ project Firebase của riêng mình)
    const firebaseConfig = {
      apiKey: "AIzaSyDummyKeyForDemoPurposeOnly12345",
      authDomain: "tu-tien-idle.firebaseapp.com",
      projectId: "tu-tien-idle",
      storageBucket: "tu-tien-idle.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef"
    };

    // Khởi tạo Firebase (Kiểm tra nếu chưa init thì chạy)
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // --- DỮ LIỆU TRÒ CHƠI ---
    const REALMS = [
      { name: "Luyện Khí Kỳ", req: 0 },
      { name: "Trúc Cơ Kỳ", req: 1000 },
      { name: "Kim Đan Kỳ", req: 25000 },
      { name: "Nguyên Anh Kỳ", req: 500000 },
      { name: "Hóa Thần Kỳ", req: 10000000 },
      { name: "Luyện Hư Kỳ", req: 250000000 },
      { name: "Độ Kiếp Kỳ", req: 5000000000 }
    ];

    const SECTS = [
      { id: 'thanh_van', name: 'Thanh Vân Môn', buff: '+20% tốc độ Qps', desc: 'Tông môn kiếm đạo chính phái.' },
      { id: 'am_duong', name: 'Âm Dương Cốc', buff: 'Giảm 20% giá mua vật phẩm', desc: 'Hành sự cổ quái, độc dược uy lực.' },
      { id: 'huyet_dao', name: 'Huyết Đao Môn', buff: '+50% sát thương Trảm Yêu', desc: 'Chuyên tu chiến đấu sát phạt.' }
    ];

    const SHOP_ITEMS = [
      { id: 'linh_thach', name: 'Tụ Linh Trận', baseCost: 50, qps: 1, desc: 'Tự động hấp thu linh khí thiên địa.' },
      { id: 'duoc_vien', name: 'Dược Viên Đan Dược', baseCost: 350, qps: 6, desc: 'Trồng linh dược gia tăng tốc độ tu luyện.' },
      { id: 'linh_tuyen', name: 'Linh Tuyền Nhãn', baseCost: 1800, qps: 30, desc: 'Nguồn nước linh khí tinh thuần.' }
    ];

    const BLACK_MARKET_GEARS = [
      { id: 'kiem_1', name: 'Thiết Kiếm', tier: 'Phàm Phí', cost: 500, clickBonus: 5, qpsBonus: 0, color: 'text-slate-300' },
      { id: 'kiem_2', name: 'Thanh Cương Kiếm', tier: 'Hạ Phẩm', cost: 3000, clickBonus: 25, qpsBonus: 10, color: 'text-green-400' },
      { id: 'kiem_3', name: 'Phá Thiên Kiếm', tier: 'Trung Phẩm', cost: 15000, clickBonus: 100, qpsBonus: 50, color: 'text-cyan-400' }
    ];

    const MONSTERS = [
      { id: 'yeu_thu', name: 'Yêu Lang Hoang Dã', hp: 100, reward: 50, icon: '🐺' },
      { id: 'quy_tuong', name: 'Quỷ Tướng Ngàn Năm', hp: 500, reward: 300, icon: '💀' },
      { id: 'giao_long', name: 'Giao Long Thượng Cổ', hp: 2500, reward: 1500, icon: '🐉' }
    ];

    const formatNumber = (num) => {
      if (num >= 1e9) return (num / 1e9).toFixed(2) + 'B';
      if (num >= 1e6) return (num / 1e6).toFixed(2) + 'M';
      if (num >= 1e3) return (num / 1e3).toFixed(2) + 'K';
      return Math.floor(num).toString();
    };

    function App() {
      // Khởi tạo tên đạo hữu ngẫu nhiên nếu chưa có
      const [playerName] = React.useState(() => {
        const saved = localStorage.getItem('tu_tien_player_name');
        if (saved) return saved;
        const randomName = 'ĐạoHữu_' + Math.floor(Math.random() * 9000 + 1000);
        localStorage.setItem('tu_tien_player_name', randomName);
        return randomName;
      });

      const [gameState, setGameState] = React.useState({
        qi: 0,
        totalQi: 0,
        realmIdx: 0,
        joinedSectId: null,
        shopCounts: {},
        ownedGears: [],
        equippedGearId: null,
        logs: [{ id: '1', text: '[Hệ Thống]: Chào mừng đạo hữu bước chân vào con đường tu tiên!', type: 'breakthrough', time: Date.now() }]
      });

      const [activeTab, setActiveTab] = React.useState('shop');
      const [currentMonsterIdx, setCurrentMonsterIdx] = React.useState(0);
      const [monsterHp, setMonsterHp] = React.useState(MONSTERS[0].hp);
      const [isDead, setIsDead] = React.useState(false);
      const [cdSkill1, setCdSkill1] = React.useState(0);
      const [cdSkill2, setCdSkill2] = React.useState(0);
      const [cloudLeaderboard, setCloudLeaderboard] = React.useState([]);

      // Tính toán chỉ số dựa trên trang bị & tông môn
      const clickPower = React.useMemo(() => {
        let base = 1;
        gameState.ownedGears.forEach(gearId => {
          const gear = BLACK_MARKET_GEARS.find(g => g.id === gearId);
          if (gear) base += gear.clickBonus;
        });
        return base;
      }, [gameState.ownedGears]);

      const qps = React.useMemo(() => {
        let total = 0;
        SHOP_ITEMS.forEach(item => {
          const count = gameState.shopCounts[item.id] || 0;
          total += count * item.qps;
        });
        if (gameState.joinedSectId === 'thanh_van') total *= 1.2;
        return total;
      }, [gameState.shopCounts, gameState.joinedSectId]);

      // Vòng lặp tu luyện tự động (Idle tick mỗi giây)
      React.useEffect(() => {
        const interval = setInterval(() => {
          setGameState(prev => {
            const added = qps;
            if (added <= 0) return prev;
            return {
              ...prev,
              qi: prev.qi + added,
              totalQi: prev.totalQi + added
            };
          });
        }, 1000);
        return () => clearInterval(interval);
      }, [qps]);

      // Đồng bộ điểm số lên Firebase Firestore định kỳ (mỗi 10 giây)
      React.useEffect(() => {
        const syncToCloud = async () => {
          try {
            await db.collection('leaderboard').doc(playerName).set({
              name: playerName,
              totalQi: gameState.totalQi,
              realm: REALMS[gameState.realmIdx].name,
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
          } catch (e) {
            console.log("Lỗi đồng bộ cloud (có thể do cấu hình mạng/API key demo):", e);
          }
        };

        const timer = setInterval(syncToCloud, 10000);
        return () => clearInterval(timer);
      }, [gameState.totalQi, gameState.realmIdx, playerName]);

      // Lấy bảng xếp hạng từ Firestore realtime
      React.useEffect(() => {
        const unsubscribe = db.collection('leaderboard')
          .orderBy('totalQi', 'desc')
          .limit(10)
          .onSnapshot(snapshot => {
            const list = [];
            snapshot.forEach(doc => {
              list.push(doc.data());
            });
            setCloudLeaderboard(list);
          }, error => {
            // Fallback hiển thị player hiện tại nếu chưa kết nối được Firestore thật
            setCloudLeaderboard([{ name: playerName, totalQi: gameState.totalQi, realm: REALMS[gameState.realmIdx].name }]);
          });

        return () => unsubscribe();
      }, [gameState.totalQi, gameState.realmIdx, playerName]);

      // Hành động Click tu luyện thủ công
      const handleTouchQi = () => {
        setGameState(prev => ({
          ...prev,
          qi: prev.qi + clickPower,
          totalQi: prev.totalQi + clickPower
        }));
      };

      // Đột phá cảnh giới
      const handleBreakthrough = () => {
        const currentRealm = REALMS[gameState.realmIdx];
        const nextRealm = REALMS[gameState.realmIdx + 1];
        if (!nextRealm) return;

        if (gameState.qi >= nextRealm.req) {
          setGameState(prev => ({
            ...prev,
            qi: prev.qi - nextRealm.req,
            realmIdx: prev.realmIdx + 1,
            logs: [
              { id: Date.now().toString(), text: `[Đột Phá]: Chúc mừng đạo hữu đã bước vào ${nextRealm.name}!`, type: 'breakthrough', time: Date.now() },
              ...prev.logs
            ]
          }));
        } else {
          setGameState(prev => ({
            ...prev,
            logs: [
              { id: Date.now().toString(), text: `[Thất Bại]: Linh khí chưa đủ để xung kích ${nextRealm.name}!`, type: 'fail', time: Date.now() },
              ...prev.logs
            ]
          }));
        }
      };

      // Mua vật phẩm Shop
      const buyItem = (itemId) => {
        const item = SHOP_ITEMS.find(i => i.id === itemId);
        if (!item) return;

        const count = gameState.shopCounts[itemId] || 0;
        let cost = Math.floor(item.baseCost * Math.pow(1.6, count));
        if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);

        if (gameState.qi >= cost) {
          setGameState(prev => ({
            ...prev,
            qi: prev.qi - cost,
            shopCounts: { ...prev.shopCounts, [itemId]: count + 1 },
            logs: [
              { id: Date.now().toString(), text: `[Đan Phác]: Đã mua thành công ${item.name}!`, type: 'shop', time: Date.now() },
              ...prev.logs
            ]
          }));
        }
      };

      // Mua trang bị Chợ Đen
      const buyGear = (gear) => {
        let cost = gear.cost;
        if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);

        if (gameState.qi >= cost && !gameState.ownedGears.includes(gear.id)) {
          setGameState(prev => ({
            ...prev,
            qi: prev.qi - cost,
            ownedGears: [...prev.ownedGears, gear.id],
            equippedGearId: prev.equippedGearId || gear.id,
            logs: [
              { id: Date.now().toString(), text: `[Chợ Đen]: Đã sở hữu bảo vật ${gear.name}!`, type: 'shop', time: Date.now() },
              ...prev.logs
            ]
          }));
        }
      };

      // Trang bị / Tháo bảo vật
      const equipGear = (gearId) => {
        setGameState(prev => ({
          ...prev,
          equippedGearId: prev.equippedGearId === gearId ? null : gearId
        }));
      };

      // Tấn công yêu thú
      const attackMonster = (multiplier = 1, skillType = 0) => {
        if (isDead) return;
        let dmg = clickPower * multiplier;
        if (gameState.joinedSectId === 'huyet_dao') dmg *= 1.5;

        const monster = MONSTERS[currentMonsterIdx];
        const nextHp = monsterHp - dmg;

        if (skillType === 1) setCdSkill1(5);
        if (skillType === 2) setCdSkill2(15);

        if (nextHp <= 0) {
          setGameState(prev => ({
            ...prev,
            qi: prev.qi + monster.reward,
            totalQi: prev.totalQi + monster.reward,
            logs: [
              { id: Date.now().toString(), text: `[Trảm Yêu]: Tiêu diệt ${monster.name}, nhận +${monster.reward} Qi!`, type: 'breakthrough', time: Date.now() },
              ...prev.logs
            ]
          }));
          setIsDead(true);
          setTimeout(() => {
            setMonsterHp(MONSTERS[currentMonsterIdx].hp);
            setIsDead(false);
          }, 3000);
        } else {
          setMonsterHp(nextHp);
        }
      };

      const nextRealmObj = REALMS[gameState.realmIdx + 1];
      const progressPercent = nextRealmObj ? Math.min(100, (gameState.qi / nextRealmObj.req) * 100) : 100;
      const equippedBook = BLACK_MARKET_GEARS.find(g => g.id === gameState.equippedGearId) || { multiplier: 3, skillName: 'Kiếm Khí' };

      // Kết hợp leaderboard local và cloud
      const fullLeaderboard = cloudLeaderboard.length > 0 ? cloudLeaderboard.map(item => ({
        ...item,
        isPlayer: item.name === playerName,
        title: item.realm || 'Luyện Khí Kỳ'
      })) : [{ name: playerName, totalQi: gameState.totalQi, realm: REALMS[gameState.realmIdx].name, isPlayer: true, title: REALMS[gameState.realmIdx].name }];

      return (
        <div className="flex flex-col min-h-screen bg-gradient-to-br from-slate-950 via-purple-950/20 to-slate-900 p-3 select-none">
          {/* HEADER THÔNG TIN ĐẠO HỮU */}
          <header className="relative z-10 w-full max-w-7xl mx-auto bg-black/40 backdrop-blur-md rounded-2xl border border-white/10 p-4 mb-3 shadow-2xl flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
              <div className="text-[10px] text-cyan-400 font-mono tracking-widest uppercase">Đạo Hiệu: {playerName}</div>
              <h1 className="text-xl font-serif font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400">
                {REALMS[gameState.realmIdx].name}
              </h1>
            </div>
            
            <div className="flex items-center gap-6 font-mono text-xs">
              <div className="flex flex-col items-end">
                <span className="text-slate-400 text-[10px]">Linh Khí (Qi)</span>
                <span className="text-yellow-400 font-bold text-sm">{formatNumber(gameState.qi)}</span>
              </div>
              <div className="flex flex-col items-end">
                <span className="text-slate-400 text-[10px]">Tốc độ thu thập</span>
                <span className="text-cyan-400 font-bold text-sm">+{formatNumber(qps)}/s</span>
              </div>
            </div>
          </header>

          {/* NỘI DUNG CHÍNH (2 CỘT) */}
          <main className="relative z-10 w-full max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-3 flex-1">
            
            {/* CỘT 1: KHU VỰC TƯƠNG TÁC & ĐỘT PHÁ */}
            <div className="col-span-1 lg:col-span-4 flex flex-col gap-3">
              <div className="bg-black/40 backdrop-blur-md rounded-xl border border-white/10 p-5 shadow-xl flex flex-col items-center justify-center gap-4 min-h-[250px]">
                <button 
                  onClick={handleTouchQi}
                  className="w-36 h-36 rounded-full bg-gradient-to-br from-cyan-500/20 via-purple-500/20 to-cyan-500/10 border-2 border-cyan-500/40 hover:border-cyan-400 hover:scale-105 active:scale-95 transition-all shadow-[0_0_30px_rgba(6,182,212,0.15)] flex flex-col items-center justify-center gap-1 cursor-pointer group">
                  <span className="text-3xl group-hover:animate-bounce">🧘‍♂️</span>
                  <span className="font-serif font-bold text-sm text-cyan-300">Hấp Thu</span>
                  <span className="text-[10px] font-mono text-cyan-400/80">+{clickPower} Qi/click</span>
                </button>

                {/* Thanh tiến trình đột phá */}
                <div className="w-full flex flex-col gap-1.5 mt-2">
                  <div className="flex justify-between text-[10px] font-mono text-slate-300">
                    <span>Tiến Cảnh Giới</span>
                    <span>{nextRealmObj ? `${formatNumber(gameState.qi)} / ${formatNumber(nextRealmObj.req)}` : 'Đại Viên Mãn'}</span>
                  </div>
                  <div className="w-full bg-black/60 h-2.5 rounded-full border border-white/10 overflow-hidden">
                    <div className="bg-gradient-to-r from-cyan-500 to-purple-500 h-full transition-all duration-300" style={{ width: `${progressPercent}%` }} />
                  </div>
                  <button 
                    onClick={handleBreakthrough}
                    className="mt-2 w-full py-2 bg-gradient-to-r from-purple-600/30 to-cyan-600/30 hover:from-purple-600/50 hover:to-cyan-600/50 border border-purple-500/40 rounded-xl text-xs font-serif font-bold text-purple-200 transition-all shadow-lg cursor-pointer">
                    Xung Kích Đột Phá
                  </button>
                </div>
              </div>

              {/* TÔNG MÔN */}
              <div className="bg-black/40 backdrop-blur-md rounded-xl border border-white/10 p-4 shadow-xl">
                <h3 className="font-serif text-xs text-purple-400 mb-2 font-bold tracking-wider">THẾ LỰC TÔNG MÔN</h3>
                {gameState.joinedSectId ? (
                  <div className="flex flex-col gap-2">
                    <div className="p-2.5 rounded-lg border border-purple-500/30 bg-purple-500/10 flex justify-between items-center">
                      <div>
                        <div className="font-bold text-xs text-purple-300">{SECTS.find(s=>s.id===gameState.joinedSectId)?.name}</div>
                        <div className="text-[10px] text-slate-400">{SECTS.find(s=>s.id===gameState.joinedSectId)?.buff}</div>
                      </div>
                      <button onClick={()=>setGameState(prev=>({...prev, joinedSectId: null, logs: [{id:Date.now().toString(), text:'[Tông Môn]: Đã rời tông môn!', type:'fail', time:Date.now()}, ...prev.logs]}))} className="text-[10px] bg-red-500/20 text-red-300 px-2 py-1 rounded border border-red-500/30 cursor-pointer">Phản tông</button>
                    </div>
                  </div>
                ) : (
                  <div className="grid grid-cols-2 gap-2">
                    {SECTS.map(s => (
                      <button key={s.id} onClick={()=>setGameState(prev=>({...prev, joinedSectId: s.id, logs: [{id:Date.now().toString(), text:`[Gia Nhập]: Bái sư vào ${s.name}!`, type:'breakthrough', time:Date.now()}, ...prev.logs]}))} className="p-2 rounded-lg border border-white/10 bg-white/5 hover:bg-purple-500/20 hover:border-purple-500/40 text-left transition-all cursor-pointer">
                        <div className="font-bold text-xs text-slate-200">{s.name}</div>
                        <div className="text-[9px] text-slate-400 line-clamp-1">{s.desc}</div>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {/* CỘT 2: TAB CHÍNH (SHOP, CHỢ ĐEN, TRẢM YÊU, BẢNG XẾP HẠNG) */}
            <div className="col-span-1 lg:col-span-8 flex flex-col gap-3">
              <div className="flex gap-1 bg-black/40 p-1 rounded-xl border border-white/10 overflow-x-auto no-scrollbar">
                {[
                  { id: 'shop', name: 'Đan Phác' },
                  { id: 'blackmarket', name: '🖤 Chợ Đen' },
                  { id: 'combat', name: '⚔️ Trảm Yêu' },
                  { id: 'leaderboard', name: '📜 Thiên Thư' }
                ].map(tab => (
                  <button key={tab.id} onClick={()=>setActiveTab(tab.id)} className={`flex-1 py-2 px-3 rounded-lg text-xs font-serif font-bold whitespace-nowrap transition-all cursor-pointer ${activeTab === tab.id ? 'bg-cyan-500/20 text-cyan-300 border border-cyan-500/40' : 'text-slate-400 hover:text-white'}`}>
                    {tab.name}
                  </button>
                ))}
              </div>

              <div className="bg-black/40 backdrop-blur-md rounded-xl border border-white/10 p-4 shadow-xl min-h-[350px] max-h-[500px] overflow-y-auto no-scrollbar">
                
                {/* TAB SHOP */}
                {activeTab === 'shop' && (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {SHOP_ITEMS.map(item => {
                      const count = gameState.shopCounts[item.id] || 0;
                      let cost = Math.floor(item.baseCost * Math.pow(1.6, count));
                      if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);
                      return (
                        <div key={item.id} className="p-3 rounded-xl border border-white/10 bg-white/5 flex flex-col justify-between gap-2">
                          <div>
                            <div className="flex justify-between items-start">
                              <span className="font-bold text-xs text-slate-200">{item.name}</span>
                              <span className="text-[10px] font-mono text-cyan-400">Đã có: {count}</span>
                            </div>
                            <p className="text-[10px] text-slate-400 mt-0.5">{item.desc}</p>
                          </div>
                          <div className="flex justify-between items-center pt-2 border-t border-white/5">
                            <span className="text-xs font-mono text-yellow-400">{formatNumber(cost)} Qi</span>
                            <button onClick={()=>buyItem(item.id)} className="px-3 py-1 bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-300 border border-cyan-500/40 rounded-lg text-xs font-bold transition-all cursor-pointer">Mua</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* TAB CHỢ ĐEN */}
                {activeTab === 'blackmarket' && (
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    {BLACK_MARKET_GEARS.map(gear => {
                      const isOwned = gameState.ownedGears.includes(gear.id);
                      const isEquipped = gameState.equippedGearId === gear.id;
                      let cost = gear.cost;
                      if (gameState.joinedSectId === 'am_duong') cost = Math.floor(cost * 0.8);

                      return (
                        <div key={gear.id} className={`p-3 rounded-xl border ${isEquipped ? 'border-yellow-500/60 bg-yellow-500/10' : 'border-white/10 bg-white/5'} flex flex-col justify-between gap-2`}>
                          <div>
                            <div className="flex justify-between items-start">
                              <span className={`font-bold text-xs ${gear.color}`}>{gear.name}</span>
                              <span className="text-[9px] px-2 py-0.5 rounded bg-black/50 border border-white/10 text-slate-300">{gear.tier}</span>
                            </div>
                            <div className="text-[10px] text-slate-400 mt-1">
                              {gear.clickBonus > 0 && <span>+{formatNumber(gear.clickBonus)} Click</span>}
                              {gear.qpsBonus > 0 && <span className="ml-2">+{formatNumber(gear.qpsBonus)} Qps</span>}
                            </div>
                          </div>
                          <div className="flex justify-between items-center pt-2 border-t border-white/5">
                            <span className="text-xs font-mono text-yellow-400">{isOwned ? 'Đã sở hữu' : `${formatNumber(cost)} Qi`}</span>
                            {isOwned ? (
                              <button onClick={()=>equipGear(gear.id)} className={`px-3 py-1 rounded-lg text-xs font-bold border transition-all cursor-pointer ${isEquipped ? 'bg-red-500/20 text-red-300 border-red-500/40' : 'bg-green-500/20 text-green-300 border-green-500/40'}`}>
                                {isEquipped ? 'Tháo' : 'Trang Bị'}
                              </button>
                            ) : (
                              <button onClick={()=>buyGear(gear)} className="px-3 py-1 bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-300 border border-cyan-500/40 rounded-lg text-xs font-bold transition-all cursor-pointer">Mua</button>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* TAB TRẢM YÊU */}
                {activeTab === 'combat' && (
                  <div className="flex flex-col gap-4 items-center justify-center py-2">
                    <div className="flex gap-2 overflow-x-auto w-full pb-2 no-scrollbar">
                      {MONSTERS.map((m, idx) => (
                        <button key={m.id} onClick={()=>{setCurrentMonsterIdx(idx); setMonsterHp(m.hp);}} className={`p-2 rounded-xl border flex flex-col items-center gap-1 min-w-[80px] cursor-pointer ${currentMonsterIdx === idx ? 'border-cyan-400 bg-cyan-500/20' : 'border-white/10 bg-white/5'}`}>
                          <span className="text-xl">{m.icon}</span>
                          <span className="text-[10px] text-slate-300 font-bold">{m.name}</span>
                        </button>
                      ))}
                    </div>

                    <div className="w-full max-w-md p-4 rounded-xl border border-white/10 bg-white/5 flex flex-col items-center gap-3">
                      <div className="text-3xl">{MONSTERS[currentMonsterIdx].icon}</div>
                      <div className="font-serif font-bold text-sm text-yellow-400">{MONSTERS[currentMonsterIdx].name}</div>
                      <div className="w-full bg-black/80 h-3 rounded-full border border-red-500/30 overflow-hidden relative">
                        <div className="bg-gradient-to-r from-red-600 to-rose-400 h-full transition-all duration-200" style={{ width: `${Math.max(0, (monsterHp / MONSTERS[currentMonsterIdx].hp) * 100)}%` }} />
                        <div className="absolute inset-0 flex items-center justify-center text-[9px] font-mono font-bold text-white">HP: {monsterHp}/{MONSTERS[currentMonsterIdx].hp}</div>
                      </div>

                      <div className="grid grid-cols-3 gap-2 w-full mt-2">
                        <button disabled={isDead} onClick={()=>attackMonster(1, 0)} className="py-2.5 bg-cyan-500/20 hover:bg-cyan-500/30 border border-cyan-500/40 rounded-xl text-xs font-bold text-cyan-300 cursor-pointer">Chém Thường</button>
                        <button disabled={isDead || cdSkill1 > 0} onClick={()=>attackMonster(equippedBook.multiplier, 1)} className="py-2.5 bg-yellow-500/20 hover:bg-yellow-500/30 border border-yellow-500/40 rounded-xl text-xs font-bold text-yellow-300 cursor-pointer">
                          {cdSkill1 > 0 ? `CD (${cdSkill1}s)` : equippedBook.skillName}
                        </button>
                        <button disabled={isDead || cdSkill2 > 0} onClick={()=>attackMonster(25, 2)} className="py-2.5 bg-rose-500/20 hover:bg-rose-500/30 border border-rose-500/40 rounded-xl text-xs font-bold text-rose-300 cursor-pointer">
                          {cdSkill2 > 0 ? `CD (${cdSkill2}s)` : 'Tuyệt Kỹ'}
                        </button>
                      </div>
                      {isDead && <div className="text-xs text-red-400 animate-pulse font-mono">Đang trọng thương, hồi phục sau vài giây...</div>}
                    </div>
                  </div>
                )}

                {/* TAB BẢNG XẾP HẠNG (THIÊN THƯ CLOUD) */}
                {activeTab === 'leaderboard' && (
                  <div className="flex flex-col gap-1.5">
                    <div className="text-[10px] text-cyan-400 font-mono mb-1">✨ Đồng bộ trực tuyến qua Firebase Cloud Firestore</div>
                    {fullLeaderboard.map((item, idx) => (
                      <div key={idx} className={`p-2.5 rounded-lg border flex justify-between items-center ${item.isPlayer ? 'border-yellow-500/50 bg-yellow-500/10 text-yellow-300' : 'border-white/10 bg-white/5 text-slate-300'}`}>
                        <div className="flex items-center gap-3">
                          <span className="font-mono text-xs font-bold w-5">#{idx + 1}</span>
                          <span className="text-xs font-bold">{item.name}</span>
                        </div>
                        <div className="flex items-center gap-2">
                          <span className="text-[10px] font-mono text-yellow-400">{formatNumber(item.totalQi || 0)} Qi</span>
                          <span className="text-[10px] font-mono px-2 py-0.5 rounded bg-black/40 border border-white/10">{item.title}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

              </div>
            </div>

          </main>

          {/* NHẬT KÝ HỆ THỐNG (LOGS) */}
          <footer className="relative z-10 w-full max-w-7xl mx-auto px-3 mt-2">
            <div className="bg-black/40 backdrop-blur-md rounded-xl border border-white/10 p-3 h-24 overflow-y-auto no-scrollbar font-mono text-[10px] flex flex-col gap-1">
              {gameState.logs.map(log => (
                <div key={log.id} className={`${log.type === 'breakthrough' ? 'text-yellow-400' : log.type === 'fail' ? 'text-red-400' : log.type === 'shop' ? 'text-green-400' : 'text-slate-400'}`}>
                  {log.text}
                </div>
              ))}
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
